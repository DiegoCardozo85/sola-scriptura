"O único texto do AT que usa a palavra \"odeia\" sobre o divorcio -- ainda que o texto hebraico seja debatido. A logica teológica: o divorcio viola o pacto que tem Deus como testemunha. Infidelidade matrimonial e infidelidade a Deus."},{"t":"Profanação do pacto pela casamento com idolatras (2:10-12)","d":"Homens de Juda casando com mulheres que adoravam deuses estrangeiros -- a mesma questão de Esdras e Neemias. A infidelidade religiosa e a infidelidade conjugal estao interligadas: ambas envolvem violacao de pacto."},{"t":"A conexao entre fidelidade conjugal e fidelidade espiritual","d":"Malaquias estabelece o princípio que Paulo desenvolve em Ef 5: o casamento e espelho do relacionamento com Deus. A saude espiritual de uma comunidade pode ser diagnosticada pela saude de seus casamentos."}]},{"id":"men","order":5,"label":"O Mensageiro e o Dia do SENHOR","color":"#185FA5","nodes":[{"t":"\"Eis que eu envio o meu mensageiro\" (3:1)","d":"\"Eis que eu envio o meu mensageiro, que preparara o caminho diante de mim; e de repente virá ao seu templo o Senhor que buscais.\" Jesus cita este texto em Mt 11:10 identificando João Batista como o mensageiro -- cumprimento preciso do papel de preparador do caminho."},{"t":"O fogo do refinador e o saboeiro (3:2-3)","d":"\"Quem poderá suportar o dia da sua vinda? Porque ele será como o fogo do refinador e como o saboeiro... e purificara os filhos de Levi.\" A vinda do mensageiro não e meramente confortante -- e purificadora e exigente. O fogo que refina, não destroi."},{"t":"\"Eis que eu mandarei o profeta Elias\" (4:5-6)","d":"\"Eis que eu vos mandarei o profeta Elias antes que venha o grande e terrivel Dia do SENHOR.\" As últimas palavras do AT -- apontando para a preparação futura antes do evento escatológico definitivo. João Batista vem \"no espírito e poder de Elias\" (Lc 1:17)."},{"t":"O Sol de Justica com cura nas asas (4:2)","d":"\"Para vos, que temeis o meu nome, nascera o Sol de Justica, com cura nas suas asas.\" O Sol de Justica como título messiânico -- associado a cura e bênção para os fieis. Titulo cristológico que a tradição da Igreja aplica diretamente a Cristo."}]},{"id":"tipos13","order":6,"label":"Tipos e Apontamentos para Cristo","color":"#533AB7","nodes":[{"t":"O mensageiro preparando o caminho -> João Batista","d":"\"Eis que eu envio o meu mensageiro que preparara o caminho diante de mim\" (3:1) -- Jesus em Mt 11:10 e Mc 1:2 identifica explicitamente João Batista como o cumprimento desta profecia. A última promessa do AT antes do silêncio apontou para o precursor de Cristo."},{"t":"Elias antes do Dia do SENHOR -> João Batista no espírito de Elias","d":"\"Eis que eu vos mandarei o profeta Elias\" (4:5) -- Jesus em Mt 11:14 e 17:12 identifica João Batista como o \"Elias\" que devia vir. Nao reencarnação literal, mas ministério no \"espírito e poder de Elias\" (Lc 1:17)."},{"t":"O refinador -> a obra purificadora de Cristo e do Espírito","d":"O fogo refinador que purifica os levitas (3:2-3) prefigura a obra purificadora de Cristo que \"batizara com o Espírito Santo e com fogo\" (Mt 3:11) -- não destruindo o povo, mas purificando-o de tudo que não e ouro."},{"t":"O Sol de Justica -> Cristo, a luz do mundo","d":"\"Nascera o Sol de Justica com cura nas suas asas\" (4:2) -- título cristológico que a Igreja aplicou a Cristo desde cedo. Jesus: \"Eu sou a luz do mundo\" (Jo 8:12). Zacarias 6:12 o chamou \"Ramo\"; Malaquias 4:2 o chama \"Sol de Justica\" -- duas metaforas convergentes do Messias."}]}],"revelation":{"preceding":["Esdras e Neemias: o contexto histórico da comunidade pós-exílica que Malaquias diagnostica espiritualmente -- mesmo povo, um século depois","Zacarias: a última grande visão profética; Malaquias e o eco final que confronta o presente antes do silêncio","Elias em 1 Reis 17-19: o profeta cujo retorno Malaquias promete -- conexao com a maior crise de apostasia da história de Israel"],"advances":["Formula a última promessa profética do AT: o mensageiro que preparara o caminho do SENHOR (3:1)","Promete o \"Elias\" que viria antes do Dia do SENHOR -- completando o arco profético antes do silêncio","Anuncia o \"Sol de Justica\" como título messiânico -- luz e cura como caracteristicas do Messias","Diagnostica com precisao os pecados que permanecem 400 anos depois, até a vinda de Cristo","Fecha o AT apontando simultaneamente para tras (lei de Moisés) e para frente (Elias/João Batista)"],"points_to":["O mensageiro (3:1) aponta para João Batista como preparador do caminho de Cristo (Mt 11:10)","\"Elias\" (4:5) aponta para João Batista que veio no espírito e poder de Elias (Lc 1:17; Mt 17:12)","O Sol de Justica (4:2) aponta para Cristo como a luz do mundo que traz cura e vida (Jo 8:12)","O fogo refinador (3:2-3) aponta para o batismo do Espírito e fogo que Cristo inaugurou (Mt 3:11)","\"Meu nome e grande entre as nações\" (1:11) aponta para a Igreja global como cumpridora desta promessa"],"fulfilled_in":["Mt 11:10: Jesus identificando João Batista como o mensageiro de Ml 3:1","Lc 1:17: João Batista viria \"no espírito e poder de Elias\" -- cumprimento de Ml 4:5","Mt 3:11: \"batizara com o Espírito Santo e com fogo\" -- cumprimento do refinador de Ml 3:2-3","Ap 7:9: multidao de todas as nações adorando -- cumprimento de \"meu nome e grande entre as nações\" (Ml 1:11)","Jo 8:12: \"Eu sou a luz do mundo\" -- Cristo cumprindo o título \"Sol de Justica\" de Ml 4:2"]},"nt_refs":[{"ot":"Ml 1:2-3","nt":"Rm 9:13","theme":"Jacó amei, Esaú odiei -- eleição soberana de Deus"},{"ot":"Ml 1:11","nt":"1Tm 2:8; Jo 4:21-23","theme":"Adoracao universal em todo lugar -- cumprida na Igreja global"},{"ot":"Ml 2:14-16","nt":"Mt 19:6; Ef 5:25","theme":"Casamento como pacto -- Deus odeia o repudio"},{"ot":"Ml 3:1","nt":"Mt 11:10; Mc 1:2; Lc 7:27","theme":"O mensageiro preparando o caminho -- João Batista"},{"ot":"Ml 3:10","nt":"2Co 9:6-8","theme":"Dar generosamente -- a logica da bênção divina em resposta a fidelidade"},{"ot":"Ml 4:2","nt":"Lc 1:78-79; Jo 8:12","theme":"Sol de Justica -- Cristo como luz e cura"},{"ot":"Ml 4:5-6","nt":"Mt 11:14; 17:12; Lc 1:17","theme":"\"Elias\" que viria -- cumprido em João Batista"}],"timeline":[{"ref":"Ml 1:1-5","event":"Primeira disputa: o amor de Deus questionado","desc":"\"Eu vos amei, diz o SENHOR.\" \"Em que nos amaste?\" Deus responde: na eleição soberana de Jacó sobre Esaú. O amor de Deus e evidenciado na graça que escolhe, não no merecimento que conquista. A primeira palavra de Deus no último livro do AT e amor."},{"ref":"Ml 1:6-2:9","event":"Segunda disputa: sacerdotes desonrando o nome de Deus","desc":"\"Se eu sou pai, onde esta a minha honra?\" Os sacerdotes ofereciam animais cegos, coxos e doentes -- inaceitaveis até para um governador humano. O culto corrompido denuncia o coração que não teme a Deus. \"Meu nome e grande entre as nações\" -- contraste com o culto corrupto presente."},{"ref":"Ml 2:10-16","event":"Terceira disputa: infidelidade no casamento","desc":"\"O SENHOR foi testemunha entre ti e a mulher da tua mocidade, contra quem procedeste traicoeiramente.\" O casamento como pacto com Deus como testemunha. \"O SENHOR odeia o repudio.\" Infidelidade conjugal como infidelidade ao Deus do pacto."},{"ref":"Ml 2:17-3:5","event":"Quarta disputa: \"onde esta o Deus da justiça?\"","desc":"\"Vos o tendes cansado com as vossas palavras. E perguntais: Em que o cansamos? Quando dizeis: Todo o que faz o mal e bom aos olhos do SENHOR... Onde esta o Deus da justiça?\" Ceticismo sobre a providência divina respondido com a promessa do Mensageiro que virá purificar."},{"ref":"Ml 3:6-12","event":"Quinta disputa: \"roubara o homem a Deus?\" -- os dízimos","desc":"\"Poderia o homem roubar a Deus? Todavia vos me roubais. E dizeis: Em que te roubamos? Nos dízimos e nas ofertas.\" Chamado a testar a fidelidade de Deus: \"Trazei todos os dízimos para o celeiro... e vede se eu não abrirei para vos as janelas do ceu.\""},{"ref":"Ml 3:13-4:3","event":"Sexta disputa: \"e vao servir a Deus?\"","desc":"\"As vossas palavras foram duras contra mim, diz o SENHOR. Dizeis: E vao servir a Deus; que proveito temos em guardar as suas ordenancas?\" O ceticismo utilitario confrontado com a distincao entre os que servem a Deus e os que não servem -- revelada no Dia do Julgamento."},{"ref":"Ml 4:1-3","event":"O Dia ardente e o Sol de Justica","desc":"\"Eis que o dia vem, ardendo como uma fornalha... Para vos, porém, que temeis o meu nome, nascera o Sol de Justica com cura nas suas asas.\" A mesma realidade -- o Dia do SENHOR -- traz destruição aos soberbos e cura aos que temem a Deus."},{"ref":"Ml 4:4-6","event":"O fechamento do AT: lei de Moisés e Elias vindouro","desc":"\"Lembrai-vos da lei de Moisés, meu servo... Eis que eu vos mandarei o profeta Elias antes que venha o grande e terrivel Dia do SENHOR. E ele tornará o coração dos pais para os filhos, e o coração dos filhos para seus pais.\" As últimas palavras do AT -- 400 anos de silêncio profético começam aqui."}]},"MT":{"chapters":28,"testament":"NT","context":{"quando":"c. 50-70 d.C., provavelmente antes da destruição de Jerusalém em 70 d.C.","paraquem":"Primariamente cristãos de origem judaica, mas com escopo universal na Grande Comissão final","historico":"Mateus escreve para demonstrar que Jesus é o cumprimento de toda a esperança messiânica do AT. Usa fórmulas de cumprimento (\"isto aconteceu para que se cumprisse o que foi dito pelo profeta\") com maior frequência que qualquer outro Evangelho, construindo o caso de que o Messias prometido chegou."},"summary":"O Evangelho do Rei e do Reino. Mateus apresenta Jesus como o Filho de Davi prometido, o novo Moisés, o verdadeiro Israel — que cumpre em Si mesmo toda a história e esperança do AT. Estruturado em cinco grandes discursos (ecoando o Pentateuco), o clímax é a Grande Comissão: toda a autoridade foi dada ao Rei ressurreto, e Seus discípulos devem fazer discípulos de todas as nações.","themes":[{"id":"est","order":1,"label":"Estrutura: Cinco Discursos e Narrativas","color":"#1D9E75","nodes":[{"t":"O padrão pentateucal deliberado","d":"Mateus organiza o material em cinco grandes discursos alternados com seções narrativas — estrutura que ecoa os cinco livros de Moisés. Jesus não apenas cumpre a Lei: Ele é o novo Moisés que traz a Lei definitiva do novo pacto."},{"t":"Discurso 1: Sermão do Monte (5-7)","d":"A ética do Reino de Deus. Jesus sobe ao monte como Moisés subiu ao Sinai — mas em vez de receber a Lei, Ele a proclama com autoridade própria: \"Ouvistes o que foi dito... mas eu vos digo.\" A mais completa exposição da ética cristã em toda a Escritura."},{"t":"Discursos 2-4: Missão, Parábolas e Comunidade (10; 13; 18)","d":"Instrução para os doze (10), as parábolas do Reino (13) e a vida comunitária da Igreja (18) — progressão de comissão a compreensão a comunhão."},{"t":"Discurso 5: Olivete (24-25)","d":"O grande discurso escatológico: a destruição do Templo, os sinais do fim, as parábolas de vigilância (virgens, talentos), o julgamento das nações. Cristo como Juiz soberano no fim dos tempos."}]},{"id":"rei","order":2,"label":"Jesus como Rei e Filho de Davi","color":"#993C1D","nodes":[{"t":"A genealogia real: de Abraão a Cristo (1:1-17)","d":"Mateus abre com genealogia que vai de Abraão (promessa) a Davi (reino) a Cristo (cumprimento) — três grupos de catorze gerações. A estrutura não é meramente histórica: é teológica, demonstrando que Jesus é o ápice de toda a história redentora de Israel."},{"t":"\"Filho de Davi\" — 9 vezes em Mateus","d":"Nenhum outro Evangelho usa este título tantas vezes. Jesus é saudado como Filho de Davi pelos cegos (9:27; 20:30-31), pela mulher cananeia (15:22) e pelas multidões na entrada triunfal (21:9,15) — o Rei messiânico reconhecido pelos marginalizados antes dos líderes religiosos."},{"t":"O Rei recusado e vindicado","d":"A narrativa de Mateus traça a rejeição progressiva de Jesus pelos líderes de Israel — fariseus, sacerdotes, escribas — culminando na paixão. Mas a ressurreição é a vindicação real definitiva: \"Foi-me dada toda a autoridade no céu e na terra\" (28:18)."},{"t":"Os Magos e Herodes: dois tipos de resposta ao Rei","d":"Os Magos, gentios, viajam longe para adorar o Rei recém-nascido. Herodes, o rei político, quer matá-Lo. A tensão do livro inteiro está contida em seu segundo capítulo: os que deveriam reconhecer o Messias O rejeitam; os de fora O adoram."}]},{"id":"cum","order":3,"label":"As Citações de Cumprimento","color":"#BA7517","nodes":[{"t":"A fórmula única de Mateus","d":"Aproximadamente 12 vezes, Mateus usa a fórmula: \"isto aconteceu para que se cumprisse o que foi dito pelo profeta, dizendo...\" — mais do que qualquer outro Evangelho. Construção deliberada do caso teológico de que Jesus é o Messias do AT."},{"t":"Nascimento virginal cumprindo Isaías 7:14","d":"\"Eis que a virgem conceberá e dará à luz um filho, e chamá-lo-ão Emanuel\" (Mt 1:23 citando Is 7:14). O cumprimento que abre o Evangelho — Jesus não como figura nova, mas como conclusão da história iniciada em Isaías."},{"t":"\"Do Egito chamei o meu Filho\" (Mt 2:15)","d":"Citando Oséias 11:1 — originalmente sobre Israel saindo do Egito. Mateus aplica ao retorno de Jesus do Egito: Cristo recapitula a história de Israel, cumprindo como Filho perfeito o que Israel falhou em cumprir como filho infiel."},{"t":"O padrão da recapitulação","d":"Jesus atravéssa o Jordão (batismo = novo êxodo), é tentado no deserto por 40 dias (= 40 anos de Israel), sobe ao monte (= Sinai), chama doze discípulos (= doze tribos). Toda a história de Israel é recapitulada e cumprida em Cristo."}]},{"id":"ser","order":4,"label":"O Sermão do Monte: a Ética do Reino","color":"#A32D2D","nodes":[{"t":"As Bem-aventuranças (5:3-12)","d":"Oito declarações de bênção sobre os que parecém inaptos para o reino — os pobres de espírito, os que choram, os mansos, os misericordiosos, os perseguidos. A ética do reino inverte os valores do mundo: os últimos serão os primeiros."},{"t":"\"Ouvistes... mas eu vos digo\" (5:21-48)","d":"Seis antíteses em que Jesus não contradiz a Lei mas a aprofunda radicalmente — da ação para a intenção, do externo para o interno. \"Eu vos digo\" com autoridade própria: não é um rabino interpretando a Torá, mas o Legislador mesmo falando."},{"t":"A Oração do Senhor (6:9-13)","d":"O modelo de oração que Jesus dá a Seus discípulos — seis petições que cobrem toda dimensão da vida: relação com Deus (três primeiras) e necessidades humanas (três últimas). Modelo incomparável de oração equilibrada e teocêntrica."},{"t":"\"Buscai primeiro o seu Reino\" (6:33)","d":"O verso central do Sermão e talvez de todo Mateus: a prioridade absoluta do Reino de Deus sobre todas as preocupações materiais. A sequência: buscar o Reino primeiro, e tudo o mais será acrescentado — confiança que liberta da ansiedade."}]},{"id":"igr","order":5,"label":"A Igreja: \"Edificarei a Minha Igreja\"","color":"#185FA5","nodes":[{"t":"Mateus é o único Evangelho a mencionar \"Igreja\" (ekklesia)","d":"\"E eu te digo que tu és Pedro, e sobre esta pedra edificarei a minha Igreja, e as portas do inferno não prevalecerão contra ela\" (16:18) — a única ocorrência do termo \"Igreja\" nos quatro Evangelhos, mais a segunda em 18:17."},{"t":"Pedro e as chaves do Reino (16:13-20)","d":"A confissão de Pedro (\"Tu és o Cristo, o Filho do Deus vivo\") como base da missão da Igreja. Chaves como autoridade delegada de ligar e desligar — base da disciplina eclesiástica desenvolvida no discurso de Mt 18."},{"t":"A disciplina na comunidade (18:15-20)","d":"O processo de restauração do irmão que peca — conversa privada, depois com testemunhas, depois a Igreja. \"Onde dois ou três se reunirem em meu nome, ali estou no meio deles\" — a presença de Cristo na comunidade como fundamento da autoridade eclesial."},{"t":"A Grande Comissão (28:18-20)","d":"\"Foi-me dada toda a autoridade... ide e fazei discípulos de todas as nações, batizando-os em nome do Pai, do Filho e do Espírito Santo... e eis que estou convosco todos os dias.\" O clímax do Evangelho: toda autoridade, missão universal, presença eterna."}]},{"id":"tipos","order":6,"label":"Cristologia Distintiva de Mateus","color":"#533AB7","nodes":[{"t":"Jesus como novo Moisés","d":"Os cinco discursos ecoam o Pentateuco. Jesus sobe ao monte para ensinar como Moisés subiu ao Sinai. \"Não vim revogar a Lei ou os Profetas, mas cumprir\" (5:17) — não substituição, mas cumprimento radical que eleva a Lei à sua intenção original."},{"t":"Jesus como Emanuel — \"Deus conosco\"","d":"O Evangelho começa com o nome Emanuel (1:23) e termina com a promessa \"estou convosco todos os dias\" (28:20) — inclusão deliberada que envolve todo o livro na realidade da presença divina encarnada e permanente."},{"t":"Jesus como o Filho do Homem que julgará","d":"Mateus usa \"Filho do Homem\" (de Daniel 7:13-14) 30 vezes — mais que qualquer outro Evangelho. Cristo não apenas como Salvador mas como Juiz soberano: \"o Filho do Homem virá na glória de seu Pai com os seus anjos, e então retribuirá a cada um segundo as suas obras\" (16:27)."},{"t":"A autoridade incomparável de Cristo","d":"O povo ficava \"maravilhado com o seu ensino, porque os ensinava como alguém que tem autoridade, e não como os seus escribas\" (7:28-29). Em Mateus, a autoridade de Jesus se manifesta no ensino (5-7), nas curas (8-9), sobre demônios (12), sobre a morte (28) — autoridade total."}]}],"revelation":{"preceding":["Isaías 7:14; 9:6-7; 53: as profecias messiânicas centrais que Mateus cita como cumpridas","Daniel 7:13-14: o Filho do Homem recebendo domínio eterno — título favorito de Jesus em Mateus","Miquéias 5:2: Belém como lugar de nascimento — citado em Mt 2:6"],"advances":["Demonstra que Jesus é o cumprimento de toda a esperança messiânica do AT com sistema de citações sem precedente","Apresenta a ética do Reino no Sermão do Monte — a mais completa exposição da vida cristã em toda a Escritura","Funda a Igreja como comunidade do Messias com autoridade delegada e promessa de presença permanente","Anuncia a Grande Comissão como extensão universal do reinado de Cristo a todas as nações","Revela Jesus como o Legislador definitivo que não revoga mas cumpre e aprofunda toda a Lei"],"points_to":["As citações de cumprimento apontam para Cristo como o ápice de toda a revelação do AT","O Sermão do Monte aponta para a ética do Reino que o Espírito Santo capacita os crentes a viver","A Grande Comissão aponta para a missão global da Igreja até o retorno de Cristo","\"Estou convosco todos os dias\" aponta para a presença permanente de Cristo na Igreja pelo Espírito","O título \"Filho do Homem\" de Daniel 7 aponta para o retorno glorioso de Cristo como Juiz"],"fulfilled_in":["At 2: Pentecostes como inauguração da missão universal que a Grande Comissão (Mt 28) encomendou","Ef 2:20-22: a Igreja edificada sobre o fundamento apostólico — eco de Mt 16:18","Ap 1:13-16: o Filho do Homem glorificado — cumprimento pleno da esperança de Mt 16:27; 24:30","Ap 21:3: \"o Tabernáculo de Deus está com os homens\" — cumprimento eterno de Emanuel (Mt 1:23)","Rm 1:16-17: o evangelho para judeu e grego — cumprimento universal da missão iniciada em Mt 28"]},"nt_refs":[{"ot":"Is 7:14","nt":"Mt 1:23","theme":"Emanuel — nascimento virginal como cumprimento de Isaías"},{"ot":"Mq 5:2","nt":"Mt 2:6","theme":"Belém — lugar de nascimento do Messias"},{"ot":"Os 11:1","nt":"Mt 2:15","theme":"\"Do Egito chamei meu Filho\" — Cristo recapitulando Israel"},{"ot":"Is 40:3","nt":"Mt 3:3","theme":"\"Voz que clama no deserto\" — João Batista como precursor"},{"ot":"Is 9:1-2","nt":"Mt 4:15-16","theme":"\"Luz nas trevas\" — início do ministério na Galileia"},{"ot":"Sl 22:1","nt":"Mt 27:46","theme":"\"Por que me abandonaste?\" — orado por Cristo na cruz"},{"ot":"Zc 9:9","nt":"Mt 21:5","theme":"O Rei num jumento — entrada triunfal cumprindo Zacarias"},{"ot":"Zc 11:12-13","nt":"Mt 27:9-10","theme":"Trinta peças de prata — traição de Judas"},{"ot":"Sl 118:22","nt":"Mt 21:42","theme":"A pedra rejeitada tornando-se angular"},{"ot":"Dn 7:13-14","nt":"Mt 24:30; 26:64","theme":"O Filho do Homem vindo nas nuvens"}],"timeline":[{"ref":"Mt 1-2","event":"Nascimento e infância de Jesus","desc":"Genealogia real de Abraão a Cristo. Nascimento virginal em Belém cumprindo Isaías 7:14. Adoração dos Magos. Fuga para o Egito e retorno, cumprindo Oséias 11:1. Massacre dos inocentes. Instalação em Nazaré da Galileia."},{"ref":"Mt 3-4","event":"Preparação para o ministério","desc":"João Batista proclama no deserto. Batismo de Jesus — o Espírito descendo como pomba, voz do Pai. Tentação no deserto por 40 dias — Jesus superando onde Israel falhou. Início do ministério na Galileia: \"Arrependei-vos, porque o Reino dos céus está próximo.\""},{"ref":"Mt 5-7","event":"O Sermão do Monte","desc":"As Bem-aventuranças, sal e luz do mundo, as seis antíteses (\"mas eu vos digo\"), a Oração do Senhor, \"buscai primeiro o Reino de Deus.\" O ensino mais denso e mais influente da história — concluído com a parábola dos dois construtores."},{"ref":"Mt 8-9","event":"Dez milagres — a autoridade de Jesus demonstrada","desc":"Cura do leproso, servo do centurião, sogra de Pedro, endemoninhados de Gadara, paralítico, mulher hemorrágica, filha de Jairo, dois cegos, mudo endemoninhado. Milagres que demonstram a autoridade sobre doença, natureza, demônios e morte."},{"ref":"Mt 10","event":"Segundo discurso: envio dos doze","desc":"Jesus envia os doze com autoridade delegada. Instruções sobre perseguição, confiança, e a espada que Cristo traz — não paz imediata, mas separação antes da paz definitiva. \"Quem vos recebe a mim recebe.\""},{"ref":"Mt 11-12","event":"Crescente oposição e rejeição","desc":"João Batista questiona da prisão. Woes sobre as cidades impenitentes. Conflitos com fariseus sobre o sábado. \"Bom é o meu jugo e leve é o meu fardo.\" O pecado contra o Espírito Santo. Sinal de Jonas anunciado."},{"ref":"Mt 13","event":"Terceiro discurso: as parábolas do Reino","desc":"Sete parábolas sobre o Reino dos céus: o semeador, o joio e o trigo, o grão de mostarda, o fermento, o tesouro escondido, a pérola de grande preço, a rede. O Reino presente de forma velada, crescendo até a colheita final."},{"ref":"Mt 14-17","event":"Revelações progressivas da identidade de Jesus","desc":"Multiplicação dos pães. Caminhando sobre as águas. Transfiguração no Monte — \"Este é meu Filho amado.\" Confissão de Pedro em Cesareia de Filipe: \"Tu és o Cristo, o Filho do Deus vivo.\" Primeiro anúncio da paixão."},{"ref":"Mt 18-20","event":"Quarto discurso: vida na comunidade","desc":"A humildade como grandeza no Reino, a parábola do servo incompassivo, o divórcio, as crianças, o jovem rico, os trabalhadores da vinha. \"Muitos primeiros serão últimos, e os últimos, primeiros.\""},{"ref":"Mt 21-23","event":"A semana da paixão: confrontos em Jerusalém","desc":"Entrada triunfal, purificação do Templo, maldição da figueira. Parábolas de confronto com os líderes religiosos. Os sete ais contra os escribas e fariseus (cap. 23) — a denúncia mais intensa de hipocrisia religiosa em toda a Escritura."},{"ref":"Mt 24-25","event":"Quinto discurso: o discurso do Olivete","desc":"A destruição do Templo anunciada. Sinais dos últimos tempos. \"Esta geração não passará sem que todas estas coisas aconteçam.\" As parábolas de vigilância: as dez virgens, os talentos, o julgamento das nações — separação final entre ovelhas e cabritos."},{"ref":"Mt 26-27","event":"A paixão e morte de Jesus","desc":"A última ceia e instituição da Eucaristia. Getsêmani. Traição de Judas. Julgamento diante de Pilatos. Crucificação, morte e sepultura. \"Deus meu, Deus meu, por que me abandonaste?\" (citando Sl 22). O véu do Templo rasgado de cima a baixo."},{"ref":"Mt 28","event":"A ressurreição e a Grande Comissão","desc":"O anjo anuncia a ressurreição. Jesus aparece às mulheres e depois aos onze na Galileia. \"Foi-me dada toda a autoridade no céu e na terra. Ide, portanto, e fazei discípulos de todas as nações, batizando-os em nome do Pai, do Filho e do Espírito Santo... e eis que estou convosco todos os dias, até a consumação dos séculos.\""}]},"MC":{"chapters":16,"testament":"NT","context":{"quando":"c. 55-65 d.C. — provavelmente o primeiro Evangelho escrito","paraquem":"Cristãos gentios, provavelmente em Roma, familiarizados com a perseguição e o sofrimento","historico":"Marcos escreve o Evangelho mais curto, mais urgente e mais ação-orientado dos quatro. Segundo a tradição, registrou o testemunho do apóstolo Pedro. Escrito para uma comunidade que enfrentava perseguição, precisava entender um Messias que sofreu — e por que isso era boa notícia."},"summary":"O Evangelho da ação e do Servo sofredor. Marcos move-se com urgência — a palavra \"logo\" (euthys) aparece mais de 40 vezes. Não há narrativa de nascimento: Jesus irrompe em cena já adulto, age com poder extraordinário, e avança para a cruz com determinação. O centro teológico é o \"segredo messiânico\": Jesus revela Sua identidade gradualmente, e somente na cruz — pela boca de um centurião romano — Ela é plenamente confessada.","themes":[{"id":"est","order":1,"label":"Estrutura do Livro","color":"#1D9E75","nodes":[{"t":"A palavra \"logo\" (euthys) — urgência narrativa","d":"Marcos usa euthys (\"logo\", \"imediatamente\") mais de 40 vezes — ritmo cinematográfico que não existe nos outros Evangelhos. A urgência não é apenas literária: reflete a urgência da missão do próprio Jesus, avançando com propósito irresistível rumo à cruz."},{"t":"Primeira metade: quem é Jesus? (1-8)","d":"Ministério de poder na Galileia. Jesus age com autoridade extraordinária — sobre demônios, doenças, a natureza, a morte. A questão crescente: \"Quem é este?\" culmina na confissão de Pedro em Cesareia de Filipe (8:29): \"Tu és o Cristo.\""},{"t":"Segunda metade: o que o Cristo deve fazer? (8-16)","d":"A partir de 8:31, Jesus começa a ensinar explicitamente que o Filho do Homem deve sofrer, morrer e ressurgir — três anúncios da paixão (8:31; 9:31; 10:33-34). O caminho para a glória passa pela cruz."},{"t":"O Evangelho mais curto não é o mais simples","d":"Marcos é o mais vivido, imediato e dramaticamente intenso dos quatro. Sem discursos longos, sem genealogia — apenas ação, conflito e revelação. Teológicamente rico em cristologia e teologia da cruz."}]},{"id":"ser","order":2,"label":"O Servo Sofredor","color":"#993C1D","nodes":[{"t":"Marcos 10:45 — o versículo central","d":"\"O Filho do Homem não veio para ser servido, mas para servir e dar a sua vida em resgate por muitos\" — declaração que sintetiza toda a cristologia de Marcos. Jesus como Servo de Isaías 53, cuja vida inteira é orientada pelo dom de Si mesmo na cruz."},{"t":"A teologia da cruz em Marcos","d":"A seção da paixão ocupa proporcionalmente mais espaço em Marcos do que em qualquer outro Evangelho. Alguns teólogos descrevem Marcos como \"um relato da paixão com uma introdução longa\" — a cruz não é acidente, é destino."},{"t":"O Servo que age com autoridade e sofre com obediência","d":"A aparente contradição de Marcos: o mesmo Jesus que expulsa demônios com uma palavra e acalma tempestades com autoridade divina (1:27; 4:41) vai à cruz em silêncio como cordeiro. Poder e humildade não são opostos — são dois aspectos do mesmo Servo."},{"t":"O grito de abandono (15:34)","d":"\"Deus meu, Deus meu, por que me abandonaste?\" — citando o Salmo 22, o momento de maior solidariedade de Cristo com a humanidade perdida. O Filho eterno experimenta o abandono que era o destino dos pecadores — o coração da expiação substitutiva."}]},{"id":"seg","order":3,"label":"O Segredo Messiânico","color":"#BA7517","nodes":[{"t":"Jesus mandando silêncio sobre Sua identidade","d":"Repetidamente em Marcos, Jesus ordena silêncio após milagres e revelações de identidade: \"Vê que ninguém saiba disto\" (1:44; 5:43; 7:36; 8:30). Padrão sem paralelo nos outros Evangelhos — tema teológico conhecido como \"segredo messiânico.\""},{"t":"Por que o segredo?","d":"Múltiplas razões convergentes: evitar mal-entendidos sobre um Messias político-militar; preservar o timing da revelação; mostrar que a identidade plena de Jesus só é compreendida a partir da cruz. A revelação prematura seria revelação incompleta."},{"t":"A confissão de Pedro: verdadeira mas incompleta (8:29-33)","d":"Pedro confessa: \"Tu és o Cristo\" — resposta certa. Mas logo repreende Jesus por falar da cruz — revelando que confessou o título sem entender o conteúdo. Jesus o chama de \"Satanás\": identidade sem teologia da cruz é perigosamente equivocada."},{"t":"A cruz como chave hermenêutica","d":"O centurião romano na crucificação: \"Verdadeiramente, este homem era Filho de Deus\" (15:39) — a confissão mais completa e correta do Evangelho. Acontece ao pé da cruz, não diante dos milagres. Só quem entende a cruz entende quem Jesus é."}]},{"id":"dis","order":4,"label":"O Custo do Discipulado","color":"#A32D2D","nodes":[{"t":"\"Se alguém quiser vir após mim\" (8:34-38)","d":"\"Tomé a sua cruz e siga-me.\" Em Marcos, logo após a primeira predição da paixão — o discipulado é definido como seguimento de um Senhor que vai à cruz. Não pode ser dissociado do sofrimento e da negação própria."},{"t":"Os discípulos como espelho do leitor","d":"Os doze em Marcos são consistentemente retratados como lentos para entender, com coração endurecido, medrosos e fugindo. Não é crítica negativa — é espelho honestos: o leitor também é assim. A graça de Cristo persiste apesar da falha dos discípulos."},{"t":"A falha de Pedro como paradigma de graça","d":"Pedro nega a Jesus três vezes — exatamente como Jesus predisse. Mas o anjo ressurreto ordena: \"Ide dizer a seus discípulos e a Pedro\" (16:7) — Pedro nomeado especialmente, apesar da negação. A graça busca especificamente os que falharam."},{"t":"Seguir sem entender completamente","d":"Marcos retrata discipulado como seguimento em fé mesmo antes da compreensão total — os doze seguem Jesus antes de entender quem Ele é ou para onde vai. Padrão da fé bíblica: obediência que precede compreensão plena."}]},{"id":"mis","order":5,"label":"A Autoridade de Jesus Demonstrada em Ação","color":"#185FA5","nodes":[{"t":"Autoridade sobre espíritos imundos (1:21-28)","d":"A primeira ação pública de Jesus em Marcos é expulsar um espírito imundo na sinagoga de Cafarnaum. Os presentes: \"Que é isto? Um novo ensino com autoridade! Ele ordena até os espíritos imundos e eles lhe obedecem.\" Ação antes do discurso."},{"t":"Autoridade sobre a natureza (4:35-41)","d":"Jesus acalma a tempestade com uma palavra — os discípulos: \"Quem é este, que até o vento e o mar lhe obedecem?\" A pergunta é o ponto central: ação produz questão sobre identidade, que só a cruz responderá completamente."},{"t":"A cura do homem surdo-mudo (7:31-37)","d":"Jesus toca os ouvidos e a língua do surdo-mudo, olha para o céu, suspira e diz \"Efatá\" (sé aberto). A cena é vívida e sensorial — típico do estilo de Marcos, que frequentemente preserva o aramaico original de Jesus."},{"t":"Autoridade sobre a morte (5:21-24,35-43)","d":"A ressurreição de Jairo — interrompida pela cura da mulher hemorrágica. \"A menina não morreu, está dormindo\" — risos dos presentes. Jesus a ressuscita com uma palavra: \"Talitá cumi\" (menina, levanta-te). A morte não é o fim."}]},{"id":"cris","order":6,"label":"Cristologia: o Filho de Deus que Serve","color":"#533AB7","nodes":[{"t":"\"Filho de Deus\" — a abertura e o clímax","d":"Marcos abre: \"O início do Evangelho de Jesus Cristo, Filho de Deus\" (1:1) — e o Evangelho culmina com a confissão do centurião: \"Verdadeiramente, este homem era Filho de Deus\" (15:39). A moldura teológica que envolve toda a narrativa."},{"t":"A humanidade de Jesus em Marcos","d":"Marcos preserva detalhes únicos da humanidade de Jesus: Ele Se indigna (1:41 — variante textual), suspira (7:34; 8:12), olha em redor com ira (3:5), Se admira da incredulidade (6:6), Se sente comprimido pela multidão (5:30-31). O Filho de Deus plenamente humano."},{"t":"Jesus como cumprimento do Servo de Isaías","d":"Marcos 10:45 ecoa Isaías 53:11-12 — \"dar a sua vida em resgate por muitos\" é linguagem direta do Servo Sofredor. Jesus se identifica conscientemente com a figura do Servo que sofre viacarialmente pelos pecados do povo."},{"t":"A ressurreição: o fim aberto de Marcos (16:1-8)","d":"O final mais antigo de Marcos termina abruptamente em 16:8: as mulheres fogem do túmulo \"porque estavam tremendo e assombradas; e nada disseram a ninguém, pois estavam com medo.\" Final deliberadamente aberto que convoca o leitor: e você, o que dirá?"}]}],"revelation":{"preceding":["Isaías 40:3: \"Voz que clama no deserto\" — citada em Marcos 1:3 para João Batista, abrindo o Evangelho","Isaías 53: o Servo Sofredor — cristologia central de Marcos 10:45 e de toda a seção da paixão","Salmo 22: o clamor de abandono que Jesus ora na cruz (Mc 15:34) — cumprimento do lamento davídico"],"advances":["Apresenta o Evangelho com urgência e imediatidade que revelam a centralidade absoluta da cruz","Desenvolve a cristologia do Servo sofredor de Isaías de forma mais explícita que qualquer outro Evangelho","Revela que a identidade plena de Cristo só é compreendida a partir da teologia da cruz","Demonstra o custo real do discipulado como seguimento de um Senhor que foi à cruz","Preserva detalhes únicos da humanidade de Jesus que enriquecem a doutrina da encarnação"],"points_to":["A teologia do servo sofredor aponta para a expiação substitutiva como centro do evangelho","O segredo messiânico aponta para a necessidade de entender a cruz antes de entender Cristo","A graça a Pedro após a negação aponta para a graça de Cristo que restaura os que falham","O final aberto (16:8) aponta para a resposta que cada leitor deve dar ao ressurreto","\"Dar a vida em resgate por muitos\" (10:45) aponta para a suficiência da obra de Cristo para todos os que creem"],"fulfilled_in":["Rm 5:8: \"Cristo morreu por nós sendo ainda pecadores\" — a expiação substitutiva de Mc 10:45 plenamente articulada","1Pe 2:21-24: Pedro citando Is 53 sobre o sofrimento de Cristo — eco do Servo Sofredor de Marcos","Hb 12:2: Cristo \"que, pelo gozo que lhe estava proposto, suportou a cruz\" — a obediência radical de Marcos cumprida","Fp 2:6-11: o hino do Servo — a teologia do Servo de Marcos expandida na cristologia paulina","1Co 15:3-4: \"Cristo morreu pelos nossos pecados... foi sepultado e ressuscitou\" — o núcleo do Evangelho que Marcos narra"]},"nt_refs":[{"ot":"Is 40:3","nt":"Mc 1:3","theme":"\"Voz que clama no deserto\" — João Batista abrindo o Evangelho"},{"ot":"Is 53:11-12","nt":"Mc 10:45","theme":"\"Dar a vida em resgate por muitos\" — o Servo sofredor"},{"ot":"Sl 22:1","nt":"Mc 15:34","theme":"\"Por que me abandonaste?\" — o grito da cruz"},{"ot":"Sl 118:22-23","nt":"Mc 12:10-11","theme":"A pedra rejeitada tornando-se angular"},{"ot":"Dn 7:13","nt":"Mc 13:26; 14:62","theme":"O Filho do Homem vindo nas nuvens"},{"ot":"Is 6:9-10","nt":"Mc 4:12","theme":"Coração endurecido — as parábolas ocultam e revelam"},{"ot":"Ml 3:1","nt":"Mc 1:2","theme":"O mensageiro preparando o caminho — João Batista"},{"ot":"Sl 110:1","nt":"Mc 12:36; 14:62","theme":"\"Assenta-te à minha direita\" — citado por Jesus"}],"timeline":[{"ref":"Mc 1:1-13","event":"Preparação para o ministério","desc":"Abertura abrupta: sem genealogia, sem narrativa de nascimento. João Batista no deserto. Batismo de Jesus — o Espírito descendo como pomba, voz do Pai. Imediatamente: 40 dias de tentação no deserto. Marcos comprime o que Mateus expande."},{"ref":"Mc 1:14-45","event":"Explosão de poder na Galileia","desc":"\"O tempo está cumprido, e o Reino de Deus está próximo.\" Jesus chama os primeiros discípulos, ensina na sinagoga com autoridade, expulsa espírito imundo, cura a sogra de Pedro, e ao anoitecer cura todos os que eram trazidos. \"Toda a cidade estava reunida à porta.\""},{"ref":"Mc 2:1-3:6","event":"Cinco conflitos crescentes com os fariseus","desc":"Cura do paralítico e perdão dos pecados (blasfêmia!), chamado de Levi, questão do jejum, dois conflitos sobre o sábado. Progressão deliberada: \"Os fariseus saíram e imediatamente tramaram com os herodianos como o matariam\" (3:6). O conflito está instalado."},{"ref":"Mc 3:7-6:6","event":"Ensinamento em parábolas e milagres de poder","desc":"Os doze escolhidos. A família de Jesus O chama de louco. As parábolas do semeador e da lâmpada. Jesus acalma a tempestade. Gerasenos: a legião de demônios. Jairo e a mulher hemorrágica. Rejeição em Nazaré: \"um profeta não é desprezado senão em sua terra.\""},{"ref":"Mc 6:7-8:26","event":"Expansão do ministério e alimentações","desc":"Envio dos doze. Morte de João Batista. Alimentação dos 5.000. Caminhada sobre as águas. Jesus cura em Genesaré. Discussão sobre tradições. A mulher siro-fenícia. Surdo-mudo curado: \"Efatá.\" Alimentação dos 4.000. Os fariseus pedem um sinal."},{"ref":"Mc 8:27-9:50","event":"O ponto de virada: Cesareia de Filipe","desc":"\"Quem dizeis vós que eu sou?\" Pedro: \"Tu és o Cristo.\" Imediatamente Jesus anuncia o sofrimento e a morte — Pedro O repreende, Jesus O chama de \"Satanás\". O discipulado como carregar a cruz. A Transfiguração: \"Este é meu Filho amado.\""},{"ref":"Mc 10","event":"O caminho para Jerusalém","desc":"Ensinamento sobre divórcio. As crianças. O jovem rico. Terceiro anúncio da paixão — os discípulos pedem lugares de honra; Jesus responde com Mc 10:45. Bartimeu, o cego, recebe a visão ao clamor de \"Filho de Davi.\""},{"ref":"Mc 11-12","event":"A semana em Jerusalém","desc":"Entrada triunfal. Maldição da figueira. Purificação do Templo. Série de confrontos: a autoridade de Jesus, o imposto a César, a ressurreição, o maior mandamento, o Filho de Davi. A viúva e as duas moedas: generosidade radical."},{"ref":"Mc 13","event":"O discurso do Olivete","desc":"Os discípulos admiram o Templo — Jesus: \"Não ficará pedra sobre pedra.\" Sinais da destruição e do fim. \"Desta geração não passará tudo isso.\" A data que ninguém sabe — só o Pai. \"Vigiai.\" Discurso escatológico mais conciso dos três sinóticos."},{"ref":"Mc 14-15","event":"A paixão e morte de Jesus","desc":"Unção em Betânia, traição de Judas, última ceia, Getsêmani. Jesus preso, julgado, negado por Pedro. Diante de Pilatos. Crucificação no Gólgota: \"Elói, Elói, lemá sabactâni?\" O centurião: \"Verdadeiramente, este homem era Filho de Deus.\""},{"ref":"Mc 16:1-8","event":"A ressurreição — o final aberto","desc":"As mulheres chegam ao túmulo ao amanhecer. O jovem de vestes brancas: \"Ele ressuscitou! Não está aqui.\" Instrução para dizer aos discípulos \"e a Pedro.\" As mulheres fogem tremendo, sem dizer nada a ninguém — o final mais abrupto da Bíblia, convocando o leitor a completar a história com sua própria resposta ao ressurreto."}]},"LC":{"chapters":24,"testament":"NT","context":{"quando":"c. 60-80 d.C.","paraquem":"Teofilo e cristãos de origem gentilica em geral","historico":"Lucas e o único autor gentio do NT, médico e companheiro de Paulo. Seu Evangelho e o primeiro volume de uma obra em dois tomos — Lucas-Atos — que juntos formam o maior corpus de um único autor no NT."},"summary":"O Evangelho da salvação universal e do Espírito Santo. Lucas apresenta Jesus como o Salvador que busca ativamente os perdidos — pobres, mulheres, samaritanos, gentios, pecadores. Suas parábolas únicas (o Filho Prodigo, o Bom Samaritano, o Rico e Lazaro) são as mais famosas de toda a Escritura. O Evangelho de Lucas e a maior afirmação bíblica de que a graça de Deus não tem fronteiras de classe, gênero, etnia ou história moral.","themes":[{"id":"est","order":1,"label":"Estrutura do Livro","color":"#1D9E75","nodes":[{"t":"O prólogo histórico (1:1-4)","d":"Lucas abre com um prólogo literário formal — único entre os Evangelhos — declarando seu metodo: investigação cuidadosa, fontes testemunhais, ordem narrativa. Escreve para que Teofilo \"conheca a plena verdade.\" Comprometimento histórico com a veracidade dos eventos."},{"t":"Narrativas de nascimento singulares (1-2)","d":"Lucas preserva as narrativas de nascimento de João Batista e de Jesus em paralelo — ricas em canticos (Magnificat, Benedictus, Gloria in Excelsis, Nunc Dimittis) e cheias do Espírito Santo. Cenas únicas: a visita dos pastores, a apresentação no Templo, Jesus aos 12 anos."},{"t":"A grande viagem a Jerusalém (9:51-19:27)","d":"Seção única de Lucas: uma viagem extensa de Jesus para Jerusalém, durante a qual entrega os ensinamentos mais caracteristicos do terceiro Evangelho — o Bom Samaritano, Marta e Maria, o Filho Prodigo, o Rico e Lazaro, Zaqueu. A rota tem propósito teológico, não apenas geográfico."},{"t":"Lucas-Atos como obra única","d":"O Evangelho de Lucas e os Atos dos Apóstolos formam uma obra em dois volumes, dedicados ao mesmo Teofilo. Lucas narra o que \"Jesus começou a fazer e ensinar\" (At 1:1) — e Atos narra o que Jesus continua fazendo pelo Espírito através da Igreja."}]},{"id":"mar","order":2,"label":"O Salvador dos Marginalizados","color":"#993C1D","nodes":[{"t":"Os pobres e excluidos","d":"As bem-aventurancas de Lucas: \"Bem-aventurados vos, os pobres\" — não \"pobres de espírito\" como em Mateus. Lazaro o mendigo e o único personagem de parábola com nome. Zaqueu, o cobrador de impostos desprezado, recebe Jesus em sua casa. Jesus busca \"o que estava perdido\" (19:10)."},{"t":"As mulheres em Lucas","d":"Nenhum Evangelho da tanto espaço as mulheres: Maria e Isabel (1-2), a viúva de Naim (7:11-17), Maria Madalena, Joana, Susana e \"muitas outras\" que financiavam o ministério (8:1-3), Maria e Marta (10:38-42), as filhas de Jerusalém (23:27-31), as mulheres na ressurreição. Honra extraordinária no contexto do século I."},{"t":"Os samaritanos como modelos positivos","d":"O Bom Samaritano (10:25-37) e o samaritano grato curado de lepra (17:11-19) — os únicos dois samaritanos em Lucas, ambos retratados positivamente, em contraste com os religiosos de Israel que falharam. Inversão deliberada de expectativas etnicas e religiosas."},{"t":"Os gentios e o escopo universal","d":"Jesus menciona a viúva de Sarepta (1Rs 17) e Naama (2Rs 5) — gentios que receberam graça enquanto Israel não recebia (4:25-27). Simeao anuncia: \"salvação que preparaste diante de todos os povos, luz para iluminar os gentios\" (2:30-32). O universalismo e explícito desde o início."}]},{"id":"esp5","order":3,"label":"O Espírito Santo em Lucas","color":"#BA7517","nodes":[{"t":"Mais referencias ao Espírito do que os outros sinoticos","d":"Lucas menciona o Espírito Santo mais que Mateus e Marcos juntos nos Evangelhos. Zacarias (1:67), Isabel (1:41), Maria (1:35), Simeao (2:25-27) — todos cheios ou guiados pelo Espírito. O Espírito não começa em Pentecostes; permeia toda a história da redenção."},{"t":"Jesus cheio do Espírito Santo (4:1)","d":"\"Jesus, cheio do Espírito Santo, voltou do Jordão, e o Espírito o conduziu ao deserto por quarenta dias\" — Lucas acrescenta \"cheio\" antes de qualquer referência a Marcos ou Mateus. A vida inteira de Jesus acontece sob a direção e poder do Espírito."},{"t":"Isaías 61 e a proclamação de Nazare (4:18-19)","d":"\"O Espírito do Senhor esta sobre mim... para dar boas novas aos pobres, libertar os cativos, dar vista aos cegos, por em liberdade os oprimidos, e proclamar o ano aceitavel do Senhor.\" Jesus fecha o rolo e diz: \"Hoje se cumpriu esta Escritura.\" O programa do ministério messiânico."},{"t":"Preparação para Atos","d":"Lucas termina com a promessa de \"poder do alto\" (24:49) — cumprida em Atos 2. O Evangelho de Lucas e deliberadamente incompleto sem Atos: a história do Espírito continua. O Pentecostes não e nova realidade — e realização do que Lucas antecipou em cada capítulo."}]},{"id":"par2","order":4,"label":"As Parabolas Únicas de Lucas","color":"#A32D2D","nodes":[{"t":"O Bom Samaritano (10:25-37)","d":"Resposta a \"quem e meu próximo?\" — Jesus inverte a pergunta ao final: não \"quem merece minha ajuda?\" mas \"de qual dos três você foi próximo?\" O modelo de amor ao próximo não e definido por quem merece, mas por quem age com misericórdia — independentemente de fronteiras etnicas."},{"t":"O Filho Prodigo (15:11-32)","d":"A parábola mais rica e amada de toda a Escritura — retratando o pecado (o filho mais novo), o formalismo religioso (o filho mais velho) e o amor do Pai que corre ao encontro, abraca, veste e celebra. O apice da revelação da graça no Evangelho de Lucas."},{"t":"O Rico e Lazaro (16:19-31)","d":"A única parábola que nomeia um personagem (Lazaro). Inversão escatológica radical: o rico sofre, o mendigo e consolado. E a advertencia final: \"Se não ouvem a Moisés e aos Profetas, também não se convencerão, ainda que alguem ressuscite dos mortos\" — apontando para a própria ressurreição de Jesus."},{"t":"O Fariseu e o Publicano (18:9-14)","d":"A oração mais curta e mais eficaz da Biblia: \"Deus, tem misericórdia de mim, pecador!\" O publicano — não o fariseu religioso — vai justificado para sua casa. \"Todo aquele que se exaltar será humilhado, e todo aquele que se humilhar será exaltado.\""}]},{"id":"ora3","order":5,"label":"Jesus em Oração","color":"#185FA5","nodes":[{"t":"Lucas registra Jesus orando em todos os momentos decisivos","d":"No batismo (3:21), após curar um leproso (5:16), antes de escolher os doze (6:12), na Transfiguração (9:29), antes de ensinar o Pai-Nosso (11:1), em Getsemani (22:41), e na cruz (23:34,46). Nenhum outro Evangelho registra a vida de oração de Jesus com esta frequencia."},{"t":"A Oração do Senhor em Lucas (11:1-13)","d":"Os discípulos pedem: \"Senhor, ensina-nos a orar.\" Versão mais curta que Mateus 6. Seguida da parábola do amigo importuno (11:5-8) e da promessa: \"O Pai celestial dará o Espírito Santo aos que lho pedirem\" — não \"boas coisas\" como em Mateus, mas o Espírito em pessoa."},{"t":"Getsemani: o suor como gotas de sangue (22:44)","d":"Detalhe único de Lucas: o suor de Jesus tornando-se \"como gotas de sangue\" — provavelmente o médico Lucas preservando o detalhe clínico do fenomeno de hematidrosis. \"Pai, se queres, afasta de mim este calice; contudo, não se faca a minha vontade, mas a tua.\""},{"t":"\"Pai, nas tuas mãos entrego o meu espírito\" (23:46)","d":"As últimas palavras de Jesus em Lucas — citando o Salmo 31:5. Morte em plena confiança e repouso no Pai, em contraste com o grito de abandono em Marcos/Mateus. Não contradição: perspectivas complementares da mesma morte que era simultaneamente abandono (pela justiça) e entrega (pela fe)."}]},{"id":"cris2","order":6,"label":"Cristologia: o Salvador Universal","color":"#533AB7","nodes":[{"t":"A genealogia até Adao — universalidade da salvação","d":"Mateus traca a genealogia de Jesus até Abraao (pai dos judeus). Lucas a leva até Adao (pai de toda a humanidade) — declaração teológica explícita: Jesus e o Salvador de toda a raca humana, não apenas de Israel. Preparação direta para a teologia paulina do segundo Adao."},{"t":"\"Hoje a salvação veio a esta casa\" (19:9)","d":"A frase sobre Zaqueu sintetiza o ministério de Jesus em Lucas: salvação que chega hoje, que vem a casa (não espera que o pecador venha ao Templo), que alcanca o desprezado publicamente. \"O Filho do Homem veio buscar e salvar o que estava perdido.\""},{"t":"O ladrão na cruz (23:39-43)","d":"\"Hoje estarás comigo no paraíso.\" A salvação mais radical do Evangelho: concedida na hora da morte, sem obras, sem batismo, sem tempo de santificação — apenas fe expressada num clamor. Cumprimento perfeito da teologia da graça soberana."},{"t":"O coração ardendo no caminho de Emaús (24:13-35)","d":"Dois discípulos desanimados reconhecem o ressurreto na fração do pao — depois de Ele ter exposto todo o AT sobre Si mesmo: \"Não convinha que o Cristo padecesse estas coisas e entrasse na sua glória?\" O AT inteiro aponta para Cristo — hermenêutica cristocentrica confirmada pelo próprio ressurreto."}]}],"revelation":{"preceding":["Isaías 61:1-2: o programa do ministério messiânico que Jesus proclama em Nazare (Lc 4:18-19)","Isaías 40:3-5: citado em Lc 3:4-6 com acrescimo de \"toda a carne verá a salvação de Deus\" — universalidade","Salmo 31:5: \"nas tuas mãos entrego o meu espírito\" — as últimas palavras de Jesus na cruz (Lc 23:46)"],"advances":["Apresenta a salvação universal mais explicitamente que qualquer outro Evangelho — genealogia até Adao","Revela o papel central do Espírito Santo em toda a vida e ministério de Jesus como preparação para Atos 2","Preserva as parábolas mais profundas sobre a graça divina — especialmente o Filho Prodigo","Documenta a vida de oração de Jesus com uma riqueza sem paralelo nos outros Evangelhos","Honra os marginalizados — pobres, mulheres, gentios, pecadores — como destinatarios primarios da graça"],"points_to":["A genealogia até Adao aponta para Cristo como Salvador de toda a humanidade (Rm 5:12-21)","A proclamação de Isaías 61 (Lc 4:18-19) aponta para a plenitude do ministério de Cristo","O Filho Prodigo aponta para o coração do Pai celestial que corre ao encontro dos pecadores arrependidos","O Pentecostes prometido (24:49) aponta para Atos 2 e a continuação da obra do Espírito na Igreja","O caminho de Emaús aponta para a hermenêutica cristocentrica — o AT todo aponta para Cristo"],"fulfilled_in":["At 1-2: Pentecostes como cumprimento direto da promessa do Espírito ao final de Lucas (24:49)","Rm 5:12-21: Cristo como segundo Adao — cumprimento da genealogia universal de Lucas 3","Gl 3:28: \"não há judio nem grego... escravo nem livre\" — eco do universalismo de Lucas","Hb 9:14: Cristo oferecendo-Se por meio do Espírito eterno — eco da vida cheia do Espírito de Jesus em Lucas","Ef 1:7: \"redenção pelo seu sangue, o perdão das transgressoes\" — a graça radical que Lucas ilustra em cada capítulo"]},"nt_refs":[{"ot":"Is 40:3-5","nt":"Lc 3:4-6","theme":"João Batista preparando o caminho — com acrescimo universal"},{"ot":"Is 61:1-2","nt":"Lc 4:18-19","theme":"O Espírito do Senhor sobre mim — programa do ministério messiânico"},{"ot":"1Rs 17:9","nt":"Lc 4:26","theme":"A viúva de Sarepta — graça a gentios como precedente"},{"ot":"2Rs 5:1-14","nt":"Lc 4:27","theme":"Naama o sirio — graça a gentios como precedente"},{"ot":"Sl 22:18","nt":"Lc 23:34","theme":"Divisão das vestes — cumprido na crucificação"},{"ot":"Sl 31:5","nt":"Lc 23:46","theme":"\"Nas tuas mãos entrego o meu espírito\" — últimas palavras de Jesus"},{"ot":"Ml 4:5-6","nt":"Lc 1:17","theme":"João Batista no espírito e poder de Elias"},{"ot":"Is 9:6-7","nt":"Lc 1:32-33","theme":"O trono de Davi para sempre — anuncio do anjo a Maria"}],"timeline":[{"ref":"Lc 1-2","event":"Os canticos da encarnação","desc":"Anuncio a Zacarias e depois a Maria. Visita de Maria a Isabel — Magnificat. Nascimento de João Batista — Benedictus. Nascimento de Jesus em Belém — os pastores e o Gloria in Excelsis. Apresentação no Templo — Simeao (Nunc Dimittis) e Ana. Jesus aos 12 anos no Templo: \"Devia estar nas coisas de meu Pai.\""},{"ref":"Lc 3-4","event":"Preparação e proclamação inaugural","desc":"João Batista prega arrependimento. Batismo de Jesus. Genealogia até Adao. Tentação no deserto. Em Nazare: le Isaías 61 e declara: \"Hoje se cumpriu esta Escritura\" — imediatamente tentam mata-Lo. Jesus expulsa espírito em Cafarnaum, cura a sogra de Pedro."},{"ref":"Lc 5-6","event":"Chamado dos discípulos e o Sermão da Planicie","desc":"A pesca miraculosa — Pedro: \"Afasta-te de mim, Senhor, porque sou pecador.\" Chamado de Levi. Conflitos sobre o sabado. Escolha dos doze. Sermão da Planicie: as bem-aventurancas e os ais — \"bem-aventurados vos, os pobres\" e \"ai de vos, os ricos.\""},{"ref":"Lc 7-8","event":"Misericordia expandida","desc":"Cura do servo do centurião gentio. Ressurreição do filho da viúva de Naim. João Batista questiona da prisão. A mulher pecadora que unge Jesus. As mulheres que apoiavam o ministério. A parábola do semeador. A tempestade acalmada. Gadara."},{"ref":"Lc 9:1-50","event":"Missão, Transfiguração, e o caminho para a cruz","desc":"Envio dos doze. Alimentação dos 5.000. Confissão de Pedro. Primeiro anuncio da paixão. A Transfiguração: Moisés e Elias conversam sobre o \"Êxodo\" de Jesus em Jerusalém. \"Este e meu Filho amado — ouvi-O.\""},{"ref":"Lc 9:51-13","event":"O início da grande viagem a Jerusalém","desc":"\"Jesus resolveu partir para Jerusalém\" — determinação irrevogavel. O Bom Samaritano. Marta e Maria. O Pai-Nosso. A parábola do rico insensato. \"Estreita e a porta.\" Lamento sobre Jerusalém."},{"ref":"Lc 14-17","event":"Convites, perda e encontro","desc":"A grande ceia e os convidados que recusam. O custo do discipulado. As três parábolas da perda e do encontro: a ovelha perdida, a moeda perdida, o Filho Prodigo. O Rico e Lazaro. Os dez leprosos — só o samaritano retorna."},{"ref":"Lc 18-19","event":"A jornada final e Zaqueu","desc":"A viúva persistente. O fariseu e o publicano. As criancas. O jovem rico. Bartimeu. Zaqueu: \"Hoje a salvação veio a esta casa.\" A entrada triunfal em Jerusalém — Jesus chora sobre a cidade."},{"ref":"Lc 20-21","event":"Ensino no Templo e discurso escatológico","desc":"Confrontos com os lideres religiosos. A viúva e as duas moedas. O discurso do Olivete: a destruição do Templo, perseguição dos discípulos, a vinda do Filho do Homem. \"Vigiai, orando em todo tempo.\""},{"ref":"Lc 22-23","event":"A paixão de Jesus","desc":"A última ceia. Getsemani com o suor como sangue. Julgamento. Pedro nega — Jesus olha para Pedro. Pilatos e Herodes. Crucificação: \"Pai, perdoa-lhes.\" O ladrão: \"Hoje estarás comigo no paraíso.\" \"Pai, nas tuas mãos entrego o meu espírito.\""},{"ref":"Lc 24","event":"Ressurreição, Emaús e Ascensão","desc":"As mulheres no túmulo vazio. O caminho de Emaús: Jesus expoe \"em todas as Escrituras o que dele falava.\" Reconhecido na fração do pao. Jesus abre o entendimento deles. Promessa do Espírito. Ascensão de Betania. Os discípulos voltam a Jerusalém \"com grande alegria.\""}]},"JO2":{"chapters":21,"testament":"NT","context":{"quando":"c. 85-100 d.C. — o mais tardio dos quatro Evangelhos, provavelmente escrito em Efeso","paraquem":"Cristãos e não-cristãos: \"estas cousas foram escritas para que creiais que Jesus e o Cristo, o Filho de Deus, e para que, crendo, tenhais vida em seu nome\" (20:31)","historico":"João escreve o Evangelho mais teológico dos quatro, deliberadamente evitando repetir o que os sinoticos já cobriram. Estruturado em torno de sete sinais e sete declaracoes \"EU SOU\" — a cristologia mais elevada dos Evangelhos."},"summary":"O Evangelho do Verbo encarnado. João não começa com genealogia ou nascimento — começa com a eternidade: \"No princípio era o Verbo.\" A cristologia mais alta do NT, os discursos mais profundos, e a mais completa teologia do Espírito Santo. O versículo mais famoso da Biblia (3:16) resume toda a história da redenção: Deus amando o mundo de tal forma que deu o Filho.","themes":[{"id":"est","order":1,"label":"Estrutura: Sinais e Gloria","color":"#1D9E75","nodes":[{"t":"Prologo: o Logos eterno (1:1-18)","d":"\"No princípio era o Verbo, e o Verbo estava com Deus, e o Verbo era Deus.\" João abre onde Gênesis abre mas recua antes da criação. A lente teológica através da qual toda a narrativa subsequente deve ser lida."},{"t":"O Livro dos Sinais (1:19-12:50)","d":"Sete sinais cuidadosamente selecionados: agua em vinho, cura do filho do oficial, o paralítico, alimentação de 5.000, caminhada sobre as aguas, o cego de nascenca, a ressurreição de Lazaro. Cada sinal e janela para a identidade de Jesus."},{"t":"O Livro da Gloria (13:1-20:31)","d":"A última ceia, os discursos de despedida (14-16), a oração sumo sacerdotal (17), a paixão e a ressurreição. João dedica quase metade do Evangelho aos últimos dias — a glória revelada através do sofrimento."},{"t":"Epilogo: a restauração de Pedro (21)","d":"Jesus se manifesta ao mar de Tiberias. Pedro e restaurado com três declaracoes de amor correspondendo as três negacoes. Encerramento que aponta para missão e martírio."}]},{"id":"log","order":2,"label":"O Verbo Eterno: Cristologia do Logos","color":"#993C1D","nodes":[{"t":"\"No princípio era o Verbo\" (1:1)","d":"Eco deliberado de Gênesis 1:1. João recua antes da criação: o Logos já existia. Pre-existencia eterna de Cristo afirmada na primeira linha. \"O Verbo estava com Deus\" — distinção de pessoas. \"O Verbo era Deus\" — unidade de essencia."},{"t":"\"O Verbo se fez carne\" (1:14)","d":"A declaração mais explosiva do prólogo: o eterno e infinito tornou-se temporal e finito. \"Habitou entre nos\" — literalmente \"armou a sua tenda\" (ecoando o Tabernáculo). A encarnação como o centro de toda a história."},{"t":"\"Cheio de graça e de verdade\" (1:14)","d":"Os dois atributos do Logos encarnado — graça e verdade — são os mesmos usados para descrever o SENHOR em Êxodo 34:6. Jesus e a plena revelação do caráter de Deus que Moisés viu parcialmente e de costas."},{"t":"\"Meu Senhor e meu Deus\" (20:28)","d":"A confissão de Tomé ao ver o Ressurreto — a declaração cristológica mais explícita dos quatro Evangelhos. O Evangelho que começa \"o Verbo era Deus\" termina com um discípulo chamando o mesmo Jesus de \"meu Deus\" — inclusão teológica perfeita."}]},{"id":"iam","order":3,"label":"Os Sete \"EU SOU\"","color":"#BA7517","nodes":[{"t":"\"EU SOU o pao da vida\" (6:35)","d":"Depois da alimentação dos 5.000. Eco do mana no deserto — mas agora o próprio Deus Se tornando sustento eterno. \"Quem vem a mim não terá fome, e quem cre em mim não terá sede.\" A fe como o ato de \"comer\" o pao da vida."},{"t":"\"EU SOU a luz do mundo\" e \"a porta\" e \"o bom Pastor\" (8:12; 10:7; 10:11)","d":"No contexto da festa dos Tabernaculos, quando grandes menoras iluminavam o Templo. Depois, a porta que da acesso ao rebanho — \"eu sou a porta; se alguem entrar por mim, será salvo.\" E o cumprimento de Ezequiel 34: \"Eu sou o bom Pastor; o bom Pastor da a sua vida pelas ovelhas.\""},{"t":"\"EU SOU a ressurreição e a vida\" (11:25)","d":"Antes de ressuscitar Lazaro: \"Eu sou a ressurreição e a vida; quem cre em mim, ainda que esteja morto, viverá; e todo aquele que vive e cre em mim não morrerá eternamente.\" Declaração que antecede o maior sinal de João."},{"t":"\"EU SOU o caminho, a verdade e a vida\" (14:6)","d":"\"Ninguem vem ao Pai senão por mim.\" A declaração de exclusividade mais direta do NT — e também a mais confortante para os discípulos que estavam a perder o Jesus visivelmente presente. O caminho não e um sistema ou prática — e uma Pessoa."}]},{"id":"don","order":4,"label":"A Teologia da Salvação em João","color":"#A32D2D","nodes":[{"t":"\"Deus amou de tal maneira o mundo\" (3:16)","d":"\"Porque Deus amou de tal maneira o mundo que deu o seu Filho unigenito, para que todo aquele que nele cre não pereca, mas tenha a vida eterna.\" O versículo mais memorizado da Biblia: o amor como motivo, a doação do Filho como meio, a fe como condição, a vida eterna como resultado."},{"t":"A eleição e a soberania em João (6:37-44)","d":"\"Tudo o que o Pai me da virá a mim... e eu não rejeitarei de modo algum o que vier a mim\" (6:37). \"Ninguem pode vir a mim se o Pai que me enviou não o trouxer\" (6:44). Soberania divina e responsabilidade humana afirmadas simultaneamente."},{"t":"O novo nascimento (3:3-8)","d":"\"Em verdade, em verdade te digo: quem não nascer de agua e do Espírito não pode entrar no Reino de Deus.\" A regeneração como obra soberana de Deus — \"o vento sopra onde quer\" — que precede e produz a fe. Base da doutrina reformada da regeneração precedendo a fe."},{"t":"A oração sumo sacerdotal (17)","d":"Jesus intercede ao Pai por Seus discípulos e por \"os que hão de crer em mim por meio da palavra deles\" (17:20). A oração de toda a Igreja ao longo dos séculos estava no coração de Jesus na véspera da cruz. Intercessão que ainda continua (Hb 7:25)."}]},{"id":"par3","order":5,"label":"O Espírito Paraclito","color":"#185FA5","nodes":[{"t":"Os discursos de despedida (14-16)","d":"Três capítulos de ensinamento intenso na última ceia — encontrados apenas em João. Promessa do Consolador (Paraclito), o mandamento novo do amor, a vinha e os ramos, a perseguição prometida, e a vitória final do Espírito sobre o mundo."},{"t":"\"Outro Consolador\" (14:16)","d":"\"Eu rogarei ao Pai, e ele vos dará outro Consolador, para que fique convosco para sempre\" — o Espírito da Verdade. \"Outro\" do mesmo tipo que Jesus: a missão de Jesus continua pelo Espírito. A presença de Cristo transformada mas não diminuida."},{"t":"As obras do Paraclito (16:8-11; 16:13-14)","d":"O Espírito convencera o mundo \"no tocante ao pecado, a justiça e ao julgamento.\" E \"guiara em toda a verdade\" os discípulos. \"Ele me glorificara, porque há de receber do que e meu\" — a obra do Espírito e sempre centrada em Cristo."},{"t":"O sopro do Espírito Ressurreto (20:22)","d":"\"Tendo dito isto, soprou sobre eles e disse: Recebei o Espírito Santo\" — eco deliberado de Gênesis 2:7. A ressurreição de Jesus e a nova criação; o sopro do Ressurreto e o Pentecostes joanino, complementar a Atos 2."}]},{"id":"cris3","order":6,"label":"Cristologia Distintiva de João","color":"#533AB7","nodes":[{"t":"A alta cristologia desde o início","d":"Mateus começa com Abraao, Lucas com Adao, Marcos com o batismo — João começa com a eternidade. A trajetoria dos Evangelhos e de cristologia crescentemente elevada, culminando em João com a afirmação mais direta da divindade de Cristo."},{"t":"As testemunhas de Jesus em João","d":"João organiza uma cadeia de testemunhos: João Batista (1:34), os primeiros discípulos (1:41,49), os milagres (5:36), o Pai (5:37), as Escrituras (5:39), as multidoes (12:17). A identidade de Jesus e confirmada por multiplas testemunhas independentes."},{"t":"A \"hora\" de Jesus","d":"Ao longo do Evangelho, João refere-se a uma \"hora\" — que ainda não chegou (2:4; 7:30) mas finalmente chega (12:23; 17:1): a hora da glória através da cruz. A \"hora\" de Jesus não e momento de derrota — e o apice para o qual toda a narrativa converge."},{"t":"A vinha e os ramos (15:1-11)","d":"\"Eu sou a videira verdadeira\" — o setimo \"EU SOU\". A união vital entre Cristo e os discípulos como condição de fruto. \"Permanecei em mim, e eu permanecerei em vos.\" O fruto não e produção humana — e resultado de permanencia em Cristo, o único que pode produzir vida espiritual genuina."}]}],"revelation":{"preceding":["Gênesis 1:1: \"no princípio\" — a abertura de João ecoa o início da criação","Êxodo 34:6: \"cheio de graça e de verdade\" — os atributos do Logos encarnado (Jo 1:14) são os do SENHOR em Moisés","Ezequiel 34: Deus prometendo ser o Pastor de Israel — cumprido em \"Eu sou o bom Pastor\" (Jo 10:11)"],"advances":["Apresenta a cristologia mais elevada do NT — o Logos eternamente com Deus e sendo Deus encarnado","Formula os Sete \"EU SOU\" que identificam Jesus com o SENHOR do AT","Desenvolve a doutrina do Espírito Paraclito mais amplamente que qualquer outro Evangelho","Articula com precisão a tensão entre soberania divina na eleição e responsabilidade humana na fe","Registra a oração sumo sacerdotal (Jo 17) — o texto de intercessão de Cristo mais extenso da Escritura"],"points_to":["O Logos eterno aponta para a preexistencia de Cristo antes da criação (Fp 2:6; Cl 1:17)","\"Eu sou o caminho, a verdade e a vida\" aponta para a exclusividade de Cristo como único mediador (1Tm 2:5)","O Espírito Paraclito aponta para a obra continua e permanente do Espírito na Igreja (At 2; Rm 8)","A nova criação pelo sopro do Ressurreto aponta para a regeneração dos crentes pelo Espírito (2Co 5:17)","\"Meu Senhor e meu Deus\" aponta para a adoração eterna de Cristo como Deus encarnado (Ap 5:12-14)"],"fulfilled_in":["Cl 1:15-17: Cristo como imagem do Deus invisivel, primogenito de toda a criação — cumprimento do Logos de Jo 1","Hb 4:14-15: Cristo como Sumo Sacerdote — cumprimento da oração sumo sacerdotal de Jo 17","1Jo 4:2: \"Jesus Cristo veio em carne\" — a encarnação de Jo 1:14 como critério de discernimento","Ap 5:12-14: \"ao Cordeiro... o louvor e a honra e a glória\" — adoração eterna do Logos encarnado","Ap 22:1-2: o Rio da Vida e a Arvore da Vida — cumprimento final das imagens de vida eterna de João"]},"nt_refs":[{"ot":"Gn 1:1","nt":"Jo 1:1","theme":"\"No princípio\" — Cristo antes da criação"},{"ot":"Ex 34:6","nt":"Jo 1:14","theme":"\"Cheio de graça e de verdade\" — o caráter do SENHOR encarnado"},{"ot":"Is 40:3","nt":"Jo 1:23","theme":"João Batista como voz no deserto"},{"ot":"Ez 34:11-16","nt":"Jo 10:11","theme":"Deus como Pastor prometido — cumprido em \"Eu sou o bom Pastor\""},{"ot":"Is 53:1","nt":"Jo 12:38","theme":"\"Quem creu ao que ouvimos?\" — a rejeição do Servo"},{"ot":"Sl 22:18","nt":"Jo 19:24","theme":"Divisão das vestes por sorteio — cumprido literalmente"},{"ot":"Sl 34:20","nt":"Jo 19:36","theme":"\"Nenhum dos seus ossos será quebrado\" — o Cordeiro pascal"},{"ot":"Zc 12:10","nt":"Jo 19:37","theme":"\"Olharão para aquele que traspassaram\" — a cruz cumprindo Zacarias"}],"timeline":[{"ref":"Jo 1:1-18","event":"O Prologo: o Verbo eterno","desc":"\"No princípio era o Verbo... o Verbo se fez carne e habitou entre nos.\" A abertura mais majestosa da literatura crista — declarando em 18 versículos toda a cristologia que o Evangelho desenvolvera: preexistencia, criação, incarnação, revelação, rejeição e acolhimento."},{"ref":"Jo 1:19-2:12","event":"Os primeiros discípulos e o primeiro sinal","desc":"João Batista: \"Eis o Cordeiro de Deus que tira o pecado do mundo.\" Os primeiros discípulos: Andre, Pedro, Filipe, Natanael. O primeiro sinal em Cana da Galileia — agua em vinho: \"manifestou a sua glória, e os seus discípulos creram nele.\""},{"ref":"Jo 2:13-3:36","event":"A purificação do Templo e Nicodemos","desc":"Jesus expulsa os vendilhoes do Templo. O diálogo com Nicodemos sobre o novo nascimento — \"o que não nascer de agua e do Espírito não pode entrar no Reino de Deus.\" Jo 3:16 — a mensagem mais clara do evangelho em todo o NT."},{"ref":"Jo 4","event":"A samaritana e o filho do oficial","desc":"Jesus com a mulher samaritana ao poco de Jacó — revelação progressiva de Sua identidade: \"Eu sou, eu que falo contigo.\" Adoração em espírito e verdade. Segundo sinal: a cura do filho do oficial em Cafarnaum sem estar presente."},{"ref":"Jo 5-6","event":"Sinais controversos e o Pao da Vida","desc":"Cura do paralítico no Betesda no sabado — conflito intenso. Jo 5:24: \"quem ouve a minha palavra passou da morte para a vida.\" Alimentação dos 5.000. Caminhada sobre as aguas. O discurso do Pao da Vida: \"Eu sou o pao da vida.\""},{"ref":"Jo 7-10","event":"Os \"EU SOU\" e o cego de nascenca","desc":"Jesus na festa dos Tabernaculos. \"Eu sou a luz do mundo.\" O cego de nascenca curado — investigação farisaica e confissão de fe do curado. \"Eu sou a porta... eu sou o bom Pastor.\" \"Eu e o Pai somos um\" — tentam apedrejar."},{"ref":"Jo 11-12","event":"Lazaro e a entrada em Jerusalém","desc":"A ressurreição de Lazaro — o maior sinal: \"Eu sou a ressurreição e a vida.\" O Sinédrio resolve matar Jesus. A entrada triunfal. \"Chegou a hora.\" \"E eu, quando for levantado da terra, atrairei todos a mim.\" Jo 12:38 cumprindo Is 53:1."},{"ref":"Jo 13-17","event":"Os discursos de despedida","desc":"Jesus lava os pes dos discípulos. A predicação da traição e da negação. \"Eu sou o caminho, a verdade e a vida.\" A vinha e os ramos. A promessa do Paraclito. A perseguição prometida. A oração sumo sacerdotal: \"Santifica-os na verdade.\""},{"ref":"Jo 18-19","event":"A paixão de Jesus","desc":"Getsemani — Jesus Se identifica: \"Eu sou\" e os soldados recuam. Julgamentos. \"Eis o homem!\" A crucificação. \"Esta consumado.\" A lanca no lado — cumprindo Zc 12:10. José e Nicodemos sepultam Jesus."},{"ref":"Jo 20","event":"A ressurreição e as aparicoes","desc":"Maria Madalena no túmulo vazio. Jesus Se aparece a Maria: \"Raboni!\" As aparicoes aos discípulos. O sopro do Espírito. A dúvida e confissão de Tomé: \"Meu Senhor e meu Deus!\" O propósito do Evangelho declarado."},{"ref":"Jo 21","event":"O Epilogo: a restauração de Pedro","desc":"A pesca miraculosa. O cafe da manha na praia. Três vezes: \"Amas-me?\" — \"Apascenta as minhas ovelhas.\" Pedro restaurado após as três negacoes. Anuncio do martírio de Pedro. \"Ha ainda muitas outras coisas que Jesus fez.\""}]},"AT":{"chapters":28,"testament":"NT","context":{"quando":"c. 62-80 d.C. — o segundo volume da obra Lucas-Atos","paraquem":"Teofilo e a Igreja primitiva, precisando entender como o movimento de Jesus se expandiu de Jerusalém até Roma","historico":"Atos e o único livro histórico do NT — narrado pelo mesmo Lucas do terceiro Evangelho. Cobre aproximadamente 30 anos de história da Igreja primitiva (c. 30-62 d.C.), desde a ascensão de Jesus até o cativeiro de Paulo em Roma."},"summary":"A história de como o Espírito Santo levou o evangelho de Jerusalém até os confins da terra. Atos não e apenas relato histórico — e teologia em forma de narrativa. O versículo que serve de plano para o livro inteiro e 1:8: \"recebereis poder... e sereis minhas testemunhas em Jerusalém, em toda a Judeia e Samaria, e até os confins da terra.\" O protagonista real não e Pedro nem Paulo: e o Espírito Santo.","themes":[{"id":"est","order":1,"label":"Estrutura: do Cenáculo a Roma","color":"#1D9E75","nodes":[{"t":"Atos 1:8 como mapa do livro inteiro","d":"\"Recebereis poder, havendo o Espírito Santo descido sobre vos, e sereis minhas testemunhas em Jerusalém, em toda a Judeia e Samaria, e até os confins da terra.\" Os estagios geograficos de 1:8 são exatamente os estagios da narrativa — estrutura literária e teológica executada com precisão."},{"t":"Primeira parte: Pedro e Jerusalém (1-12)","d":"Ascensão, eleição de Matias, Pentecostes, pregacoes de Pedro, perseguição e martírio de Estevao, conversão de Saulo, extensão a Samaria, Cornélio e os primeiros gentios. Pedro como protagonista principal."},{"t":"Segunda parte: Paulo e o mundo gentio (13-28)","d":"Três grandes viagens missionárias de Paulo: Ásia Menor (1a), consolidação das igrejas e Europa (2a), região do Egeu (3a). Prisão de Paulo em Jerusalém, defesas perante autoridades, viagem a Roma."},{"t":"Os seis \"progress reports\" da Palavra de Deus","d":"Seis sumarios periodicos marcam o crescimento da Igreja: \"a Palavra de Deus crescia\" (6:7; 9:31; 12:24; 16:5; 19:20; 28:30-31). Estrutura deliberada mostrando a expansão irresistivel do evangelho apesar de toda oposição."}]},{"id":"esp6","order":2,"label":"O Espírito Santo como Protagonista","color":"#993C1D","nodes":[{"t":"Pentecostes (2:1-41)","d":"O Espírito descendo como vento impetuoso e línguas de fogo, cumprindo Joel 2:28-32. Pedro prega: \"Deus ressuscitou este Jesus, do qual nos somos testemunhas.\" Três mil são batizados. Pentecostes não e novo início — e o derramamento do que o AT antecipava."},{"t":"O Espírito dirigindo a missão","d":"O Espírito diz a Pedro para ir a Cornélio (10:19). O Espírito separa Barnabé e Saulo (13:2). O Espírito proibe Paulo de ir a Ásia (16:6) e a Bitínia (16:7), direcionando para a Macedônia. Soberania do Espírito sobre a estratégia missionária."},{"t":"O Espírito dado a todos os crentes","d":"Diferente do AT, onde o Espírito repousava sobre indivíduos especiais, em Atos o Espírito e dado a todos os crentes (2:38). Samaritanos (8:17), Paulo (9:17), gentios de Cornélio (10:44-46), discípulos em Efeso (19:6) — a democratização do Espírito."},{"t":"A perseguição como instrumento do Espírito","d":"A perseguição em Jerusalém após Estevao dispersa os crentes — e eles \"pregavam o evangelho por onde passavam\" (8:4). A tentativa humana de sufocar o movimento se torna instrumento de sua expansão. Soberania de Deus transformando perseguição em missão."}]},{"id":"fro","order":3,"label":"Fronteiras Quebradas: a Missão Universal","color":"#BA7517","nodes":[{"t":"Filipe e o eunuco etíope (8:26-40)","d":"Filipe, guiado pelo Espírito, encontra um eunuco etíope lendo Isaías 53. Filipe explica que o Servo Sofredor e Jesus. O eunuco cre e e batizado — um africano gentio, excluido do culto em Israel (Dt 23:1), agora plenamente incluido no povo de Deus."},{"t":"Cornélio e a quebra da barreira judeu-gentio (10)","d":"Pedro tem visão do lencol com animais impuros — \"o que Deus purificou, não chames impuro.\" Vai a casa de Cornélio, centurião romano. O Espírito cai sobre os gentios antes mesmo do batismo. \"O Senhor não faz distinção de pessoas\" (10:34). A barreira mais profunda da história quebrada."},{"t":"O Concilio de Jerusalém (15)","d":"A questão mais divisiva da Igreja primitiva: os gentios precisam ser circuncidados? O Concilio decide: não. Baseado no Espírito dado aos gentios (15:8) e em Amós 9:11-12 (15:16-18). Modelo mais importante de deliberação eclesiástica de toda a história da Igreja."},{"t":"Paulo no Areópago: o evangelho e a cultura (17:16-34)","d":"Paulo citando poetas gregos, usando o \"Deus desconhecido\" como ponto de contato. Modelo de contextualização evangélica — adaptando a forma sem comprometer o conteudo. A ressurreição como ponto de ruptura inevitavel com qualquer cosmovisão humana."}]},{"id":"ser2","order":4,"label":"Os Sermoes em Atos: Teologia em Miniatura","color":"#A32D2D","nodes":[{"t":"O sermão de Pedro em Pentecostes (2:14-41)","d":"O primeiro sermão da Igreja crista — modelo de pregação apostólica: texto do AT (Joel 2, Sl 16, Sl 110), evento histórico (morte e ressurreição de Jesus), aplicação (\"arrependei-vos e sede batizados\"), resultado (3.000 convertidos). A estrutura da pregação crista estabelecida."},{"t":"O sermão de Estevao (7)","d":"O mais longo discurso de Atos — releitura de toda a história de Israel mostrando o padrão de rejeição dos mensageiros de Deus. \"Vos sempre resistis ao Espírito Santo\" (7:51). O primeiro mártir crista morre orando: \"Não lhes imputes este pecado\" — como Jesus na cruz."},{"t":"O sermão de Paulo em Pisideia da Antioquia (13:16-41)","d":"Modelo do evangelismo paulino para judeus: história de Israel até Davi, Jesus como descendente de Davi, morte e ressurreição cumprindo as Escrituras, justificação pela fe e não pela lei de Moisés. \"Eu te pus para ser luz dos gentios\" — Is 49:6."},{"t":"O sermão de Paulo em Atenas (17:22-31)","d":"Modelo do evangelismo paulino para gentios sem background bíblico: o Deus Criador que não precisa de templos, a chamada universal ao arrependimento, e o julgamento garantido pela ressurreição. Adaptação radical da forma, conteudo inalterado."}]},{"id":"sob7","order":5,"label":"A Soberania de Deus na Historia da Igreja","color":"#185FA5","nodes":[{"t":"A conversão de Saulo (9)","d":"O perseguidor mais feroz da Igreja encontra o Ressurreto na estrada de Damasco — cegado, convertido, transformado. \"Saulo, Saulo, por que me persegues?\" A conversão mais dramática da história da Igreja demonstra que a soberania de Deus pode converter qualquer pessoa."},{"t":"Oposição humana não pode deter a Palavra","d":"Pedro preso — um anjo o liberta (12:1-19). Paulo e Silas presos em Filipos — um terremoto os liberta e converte o carcereiro (16:25-34). Paulo naufragado — e o único que mantem a cabeça no caos (27). A Palavra de Deus avanca apesar de toda oposição."},{"t":"Plano divino cumprido através de decisões humanas","d":"Os judeus rejeitam o evangelho em cidade após cidade — e Paulo declara: \"Ora, era necessário que a palavra de Deus vos fosse pregada primeiramente; mas, pois a rejeitais... nos nos voltamos para os gentios\" (13:46). A rejeição humana instrumentalizada no plano soberano de Deus."},{"t":"O final aberto de Atos","d":"Atos termina abruptamente com Paulo preso em Roma, pregando livremente (28:30-31). Sem resolução dramática. O final aberto e intencional: a história da Igreja continua. O leitor e convocado a ser o próximo capítulo da narrativa do Espírito."}]},{"id":"cum2","order":6,"label":"Atos como Cumprimento do AT","color":"#533AB7","nodes":[{"t":"Pentecostes cumprindo Joel 2:28-32 (At 2:16-21)","d":"Pedro explícita: \"Isto e o que foi dito pelo profeta Joel.\" O derramamento do Espírito sobre toda carne — filhos e filhas, velhos e jovens, servos e servas — e o cumprimento da promessa que o AT antecipava e o povo do pacto aguardava."},{"t":"A inclusão dos gentios cumprindo Amós 9:11-12 (At 15:16-18)","d":"Tiago no Concilio de Jerusalém cita Amós: \"a fim de que os outros homens busquem o Senhor, bem como todos os gentios sobre os quais o meu nome e invocado.\" O Concilio se baseia na Escritura para uma decisão sem precedente histórico."},{"t":"Paulo como \"luz dos gentios\" cumprindo Isaías 49:6 (At 13:47)","d":"Rejeitado pelos judeus, Paulo e Barnabé declaram: \"Assim no-lo ordenou o Senhor: Eu te pus para ser luz dos gentios, para que sejas para salvação até os confins da terra.\" O apóstolo se ve como instrumento do cumprimento da profecia do Servo de Isaías."},{"t":"O endurecimento de Israel cumprindo Isaías 6:9-10 (At 28:26-27)","d":"A última citação do AT em Atos. Paulo conclui Atos com esta profecia: a rejeição de Israel não e surpresa mas cumprimento. E a porta para os gentios. \"A salvação de Deus foi enviada aos gentios, e eles ouvirão\" — as últimas palavras do livro."}]}],"revelation":{"preceding":["Joel 2:28-32: o derramamento do Espírito sobre toda carne — citado explicitamente em Atos 2 como cumprimento","Isaías 49:6: \"luz dos gentios... para salvação até os confins da terra\" — o programa missionário de Atos","Amós 9:11-12: a restauração da tenda de Davi incluindo os gentios — base bíblica do Concilio de Jerusalém"],"advances":["Demonstra o cumprimento concreto e histórico das promessas do AT sobre o derramamento do Espírito","Narra a quebra da maior barreira da história humana: a separação entre judeus e gentios no povo de Deus","Estabelece o modelo de pregação apostólica baseada na Escritura, no evento histórico e na aplicação pessoal","Revela que a perseguição e a rejeição são instrumentadas pela soberania de Deus para a expansão do evangelho","Conecta diretamente o ministério de Jesus (Lucas) com o ministério do Espírito pela Igreja (Atos)"],"points_to":["O Pentecostes aponta para a era do Espírito em que a Igreja vive até o retorno de Cristo","A expansão de Jerusalém a Roma aponta para a Grande Comissão sendo cumprida pelo Espírito","O Concilio de Jerusalém aponta para a governanca eclesiástica baseada na Escritura e na comunhão dos irmãos","A conversão de Paulo aponta para o poder soberano de Deus de transformar o pior inimigo no maior apóstolo","O final aberto de Atos aponta para a continuidade da missão da Igreja em cada geração"],"fulfilled_in":["Rm 1:16: \"o evangelho e o poder de Deus para a salvação de todo aquele que cre\" — a teologia do que Atos narra","Gl 3:28: \"não há judio nem grego... todos vos sois um em Cristo Jesus\" — cumprimento eclesial do Concilio de Jerusalém","Ef 2:14-16: Cristo que derrubou o muro de separação — a realidade que Atos documenta historicamente","1Co 12:13: \"fomos todos batizados em um só Espírito\" — a democratização do Espírito de Atos 2 articulada por Paulo","Ap 7:9: \"uma grande multidão de todas as nações, tribos, povos e línguas\" — o cumprimento escatológico do que Atos começou"]},"nt_refs":[{"ot":"Jl 2:28-32","nt":"At 2:16-21","theme":"Pentecostes cumprindo a profecia de Joel"},{"ot":"Sl 16:8-11","nt":"At 2:25-28","theme":"A ressurreição de Cristo cumprindo o Salmo 16"},{"ot":"Sl 110:1","nt":"At 2:34-35","theme":"\"Assenta-te a minha direita\" — a exaltação de Cristo"},{"ot":"Is 49:6","nt":"At 13:47","theme":"\"Luz dos gentios\" — o programa missionário universal"},{"ot":"Am 9:11-12","nt":"At 15:16-18","theme":"A tenda de Davi restaurada — inclusão dos gentios"},{"ot":"Is 6:9-10","nt":"At 28:26-27","theme":"O endurecimento de Israel — a última citação de Atos"},{"ot":"Sl 2:7","nt":"At 13:33","theme":"\"Tu es meu Filho\" — cumprido na ressurreição de Cristo"},{"ot":"Is 53:7-8","nt":"At 8:32-35","theme":"O Servo Sofredor explicado ao eunuco etíope"}],"timeline":[{"ref":"At 1","event":"A ascensão e a espera","desc":"Jesus instrui
