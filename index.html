<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sola Scriptura — Estudo Bíblico Reformado</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d0f18;color:#e2e0d8;min-height:100vh;font-size:14px}
.hdr{background:#12151f;border-bottom:1px solid #1e2235;padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.hdr-logo{width:38px;height:38px;background:#7F77DD;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;border:1.5px solid #3C3489;cursor:pointer}
.hdr-title{font-size:17px;font-weight:600;color:#fff;letter-spacing:-0.3px;cursor:pointer}
.hdr-sub{font-size:11px;color:#555;margin-top:2px}
.hdr-home{margin-left:auto;padding:6px 12px;border:1px solid #1e2235;border-radius:6px;background:none;color:#666;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.hdr-home:hover{color:#ccc;border-color:#444}
.home{padding:32px 20px;max-width:860px}
.home-title{font-family:'Playfair Display',Georgia,serif;font-size:34px;font-weight:700;color:#fff;margin-bottom:8px}
.home-desc{font-size:13px;color:#666;line-height:1.7;max-width:560px;margin-bottom:32px}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.div-card{background:#12151f;border:1px solid #1e2235;border-left:3px solid var(--dc);border-radius:10px;padding:18px;cursor:pointer;transition:all .2s}
.div-card:hover{background:#161924;transform:translateY(-2px)}
.div-card-name{font-size:15px;font-weight:600;color:#fff;margin-bottom:3px}
.div-card-count{font-size:11px;color:#555}
.div-bar{background:#12151f;border-bottom:1px solid #1e2235;display:flex;overflow-x:auto;scrollbar-width:none}
.div-bar::-webkit-scrollbar{display:none}
.div-tab{padding:11px 15px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:#555;white-space:nowrap;border-bottom:2px solid transparent;transition:color .15s;font-family:inherit}
.div-tab:hover{color:#bbb}
.div-tab.active{color:#fff;border-bottom-color:var(--dc)}
.books-wrap{background:#0f1220;border-bottom:1px solid #1e2235;padding:11px 20px}
.books-grid{display:flex;flex-wrap:wrap;gap:6px}
.book-btn{padding:5px 11px;border-radius:6px;border:1px solid #1e2235;background:#141726;color:#666;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.book-btn:hover:not(.wip){background:#1e2235;color:#ccc}
.book-btn.active{color:#fff;border-color:var(--dc);background:color-mix(in srgb,var(--dc) 14%,transparent)}
.book-btn.wip{opacity:0.35;cursor:default}
.content{padding:24px 20px;max-width:860px}
.hist-ctx{display:flex;border:1px solid #1e2235;border-radius:8px;overflow:hidden;margin-bottom:20px}
.hist-item{flex:1;padding:12px 14px;border-right:1px solid #1e2235}
.hist-item:last-child{border-right:none}
.hist-label{font-size:10px;color:var(--dc);text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:4px}
.hist-value{font-size:12px;color:#888;line-height:1.55}
.book-hdr{margin-bottom:20px}
.book-name{font-family:'Playfair Display',Georgia,serif;font-size:30px;font-weight:700;color:#fff;letter-spacing:-0.3px;margin-bottom:3px}
.book-meta{font-size:12px;color:#555;margin-bottom:10px}
.book-summary{font-size:13px;color:#888;line-height:1.7;max-width:680px}
.sec-tabs{display:flex;margin-bottom:20px;border-bottom:1px solid #1e2235}
.sec-tab{padding:9px 14px;font-size:12px;font-weight:500;cursor:pointer;color:#555;border:none;border-bottom:2px solid transparent;background:none;font-family:inherit;transition:color .15s}
.sec-tab:hover{color:#bbb}
.sec-tab.active{color:#fff;border-bottom-color:var(--dc)}
.theme-card{border-radius:8px;overflow:hidden;margin-bottom:8px;border:1px solid #1e2235}
.theme-hdr{padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border:none;width:100%;text-align:left;font-family:inherit;font-size:13px;font-weight:500;color:#fff}
.theme-badge{width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.theme-body{display:none;padding:8px;background:#0f1220;flex-direction:column;gap:5px}
.theme-body.open{display:flex}
.node-card{padding:9px 12px;border-radius:0 6px 6px 0;background:#141726;border-left:3px solid}
.node-title{font-size:12px;font-weight:600;color:#e2e0d8;margin-bottom:3px}
.node-desc{font-size:11px;color:#666;line-height:1.55}
.rev-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rev-card{background:#12151f;border:1px solid #1e2235;border-radius:8px;padding:14px}
.rev-card-title{font-size:10px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px}
.rev-item{font-size:12px;color:#888;line-height:1.6;padding:6px 0;border-bottom:1px solid #1e223540}
.rev-item:last-child{border-bottom:none;padding-bottom:0}
.rev-item::before{content:'→ ';color:var(--dc);font-size:11px}
.ref-table{width:100%;border-collapse:collapse}
.ref-table th{text-align:left;font-size:10px;color:#555;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;border-bottom:1px solid #1e2235}
.ref-table td{padding:9px 12px;font-size:12px;color:#888;border-bottom:1px solid #1e223540;vertical-align:top;line-height:1.5}
.ref-tag{display:inline-block;background:#1e2235;border-radius:4px;padding:2px 7px;font-size:11px;color:var(--dc);font-family:monospace}
.timeline{padding:4px 0}
.tl-item{display:flex;gap:14px;margin-bottom:20px;align-items:flex-start}
.tl-left{display:flex;flex-direction:column;align-items:center}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--dc);flex-shrink:0}
.tl-line{width:2px;flex:1;min-height:30px;background:#1e2235;margin-top:4px}
.tl-item:last-child .tl-line{display:none}
.tl-ref{font-size:10px;font-family:monospace;color:var(--dc);margin-bottom:3px}
.tl-event{font-size:13px;font-weight:600;color:#e2e0d8;margin-bottom:3px}
.tl-desc{font-size:12px;color:#666;line-height:1.55}
.book-nav{display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:20px;border-top:1px solid #1e2235}
.nav-btn{display:flex;flex-direction:column;gap:2px;padding:10px 14px;border:1px solid #1e2235;border-radius:8px;background:#12151f;cursor:pointer;font-family:inherit;transition:all .15s;text-align:left}
.nav-btn:hover:not(:disabled){background:#1e2235;border-color:var(--dc)}
.nav-btn:disabled{opacity:0.25;cursor:default}
.nav-btn-label{font-size:10px;color:#555}
.nav-btn-name{font-size:13px;color:#ccc;font-weight:500}
.nav-btn.next{text-align:right}
.wip-page{text-align:center;padding:60px 20px;color:#444}
.wip-page h3{font-family:'Playfair Display',Georgia,serif;font-size:20px;color:#666;margin-bottom:8px}
@media(max-width:600px){.rev-grid{grid-template-columns:1fr}.content{padding:16px}.home-grid{grid-template-columns:1fr}.hist-ctx{flex-direction:column}.hist-item{border-right:none;border-bottom:1px solid #1e2235}.hist-item:last-child{border-bottom:none}}
</style>
</head>
<body>
<div id="app"></div>
<script>

var DIVS=[
  {id:'pent',label:'Pentateuco',color:'#1D9E75',books:['GN','EX','LV','NM','DT']},
  {id:'hist',label:'Históricos',color:'#185FA5',books:['JS','JZ','RT','1SM','2SM','1RS','2RS','1CR','2CR','ED','NE','ES']},
  {id:'poet',label:'Poéticos',color:'#BA7517',books:['JO','SL','PV','EC','CT']},
  {id:'prof',label:'Proféticos',color:'#533AB7',books:['IS','JR','LM','EZ','DN','OS','JL','AM','OB','JN','MQ','NA','HC','SF','AG','ZC','ML']},
  {id:'evan',label:'Evangelhos & Atos',color:'#0F6E56',books:['MT','MC','LC','JO2','AT']},
  {id:'epis',label:'Epístolas',color:'#993C1D',books:['RM','1CO','2CO','GL','EF','FP','CL','1TS','2TS','1TM','2TM','TT','FM','HB','TG','1PE','2PE','1JO','2JO','3JO','JD']},
  {id:'apoc',label:'Apocalipse',color:'#A32D2D',books:['AP']},
];

var BOOK_LABELS={"GN": "Gênesis", "EX": "Êxodo", "LV": "Levítico", "NM": "Números", "DT": "Deuteronômio", "JS": "Josué", "JZ": "Juízes", "RT": "Rute", "1SM": "1 Samuel", "2SM": "2 Samuel", "1RS": "1 Reis", "2RS": "2 Reis", "1CR": "1 Crônicas", "2CR": "2 Crônicas", "ED": "Esdras", "NE": "Neemias", "ES": "Ester", "JO": "Jó", "SL": "Salmos", "PV": "Provérbios", "EC": "Eclesiastes", "CT": "C\u00e2ntico dos C\u00e2nticos", "IS": "Isaías", "JR": "Jeremias", "LM": "Lamentações", "EZ": "Ezequiel", "DN": "Daniel", "OS": "Oseias", "JL": "Joel", "AM": "Amós", "OB": "Obadias", "JN": "Jonas", "MQ": "Miquéias", "NA": "Naum", "HC": "Habacuque", "SF": "Sofonias", "AG": "Ageu", "ZC": "Zacarias", "ML": "Malaquias", "MT": "Mateus", "MC": "Marcos", "LC": "Lucas", "JO2": "João", "AT": "Atos", "RM": "Romanos", "1CO": "1 Coríntios", "2CO": "2 Coríntios", "GL": "Gálatas", "EF": "Efésios", "FP": "Filipenses", "CL": "Colossenses", "1TS": "1 Tessalonicenses", "2TS": "2 Tessalonicenses", "1TM": "1 Timóteo", "2TM": "2 Timóteo", "TT": "Tito", "FM": "Filemom", "HB": "Hebreus", "TG": "Tiago", "1PE": "1 Pedro", "2PE": "2 Pedro", "1JO": "1 João", "2JO": "2 João", "3JO": "3 João", "JD": "Judas", "AP": "Apocalipse"};

var BOOKS={"GN":{"chapters":50,"testament":"AT","context":{"quando":"c. 1446–1406 a.C.","paraquem":"Israel no deserto, prestes a entrar em Canaã","historico":"Moisés escreve para um povo recém-saído do Egito que precisa entender sua identidade e seu Deus. Gênesis responde: Quem somos? De onde viemos? A quem pertencemos?"},"summary":"Livro das origens: da criação ao início do povo de Deus. Fundação de toda a teologia bíblica reformada — aqui estão os alicerces dos pactos, da queda, da eleição soberana e do primeiro evangelho.","themes":[{"id":"sob","order":1,"label":"Soberania Divina","color":"#993C1D","nodes":[{"t":"Criação ex nihilo","d":"Deus cria do nada pela palavra. Refuta todo dualismo — nenhuma matéria é coeterna a Deus (NAA Gn 1:1)."},{"t":"Eleição soberana","d":"Abel vs Caim; Isaque vs Ismael; Jacó vs Esaú — não por mérito, mas por graça livre de Deus (Rm 9:11)."},{"t":"Providência divina","d":"\"Vocês planejaram o mal contra mim, mas Deus planejou isso para o bem\" (NAA Gn 50:20). Plano soberano revelado em José."},{"t":"Decreto eterno","d":"O plano redentor não é reativo à Queda — foi decretado antes da fundação do mundo (Ef 1:4)."}]},{"id":"est","order":2,"label":"Estrutura do Livro","color":"#1D9E75","nodes":[{"t":"Primeva (Gn 1–11)","d":"Criação, Queda, Dilúvio e Dispersão em Babel. Fundação da condição humana e da necessidade de redenção."},{"t":"Patriarcal (Gn 12–50)","d":"Abraão, Isaque, Jacó e José. Início do povo eleito e da narrativa redentora que aponta para Cristo."},{"t":"Fórmula Toledot","d":"\"Estas são as gerações de...\" — aparece 10 vezes. Organiza literariamente todo o livro de Gênesis."},{"t":"Autoria Mosaica","d":"Moisés como autor humano plenamente inspirado pelo Espírito Santo — posição histórica reformada."}]},{"id":"queda","order":3,"label":"Queda & Imago Dei","color":"#A32D2D","nodes":[{"t":"Imago Dei (1:26-27)","d":"Homem criado como rei (domínio), profeta (Palavra) e sacerdote (culto). Reflexo da glória divina na criação."},{"t":"Mandato cultural","d":"\"Cultivem-no e guardem-no\" (NAA 2:15). Base reformada para teologia do trabalho, arte, ciência e cultura."},{"t":"Depravação total","d":"Após a Queda, toda faculdade humana corrompida. Incapacidade espiritual real e total, não parcial."},{"t":"Gênesis 3 — a Queda","d":"Tentação, desobediência, vergonha, maldição e expulsão do Éden. Queda histórica com consequências reais."},{"t":"Protologia reformada","d":"O estado de integridade pré-Queda define o que Cristo restaura e supera no estado de glória."}]},{"id":"obras","order":4,"label":"Pacto das Obras","color":"#BA7517","nodes":[{"t":"Cabeça federal de Adão","d":"Adão representa toda a humanidade por designação divina. Fundamento da doutrina da representação federal."},{"t":"Condição: obediência","d":"A árvore do conhecimento era o teste divino. Obediência perfeita traria confirmação na vida eterna."},{"t":"Sanção: morte","d":"\"No dia em que você comer dela, certamente morrerá\" (NAA 2:17). Morte espiritual, física e eterna."},{"t":"Cristo como 2º Adão","d":"Jesus obedece onde Adão falhou. Sua obediência ativa cumpre o que o pacto das obras exigia (Rm 5; 1Co 15)."}]},{"id":"graça","order":5,"label":"Pacto da Graça","color":"#185FA5","nodes":[{"t":"Proto-Evangelho (3:15)","d":"\"Porei inimizade entre você e a mulher...\" — primeira promessa de redenção em toda a Escritura (NAA Gn 3:15)."},{"t":"Pacto Noático (Gn 9)","d":"Graça comum preserva a criação após o Dilúvio. O arco-íris como sinal eterno da fidelidade divina."},{"t":"Pacto Abraâmico","d":"Terra, semente e bênção para todas as nações (Gn 12; 15; 17). Cumprido plenamente em Jesus Cristo."},{"t":"Monergismo divino","d":"Deus age sozinho. Abraão dormia quando Deus passou entre os animais partidos (NAA Gn 15). Graça soberana."}]},{"id":"tipos","order":6,"label":"Tipos & Cristo","color":"#533AB7","nodes":[{"t":"Adão → Cristo (Rm 5)","d":"Adão é tipo do que havia de vir. Pela desobediência de um, morte; pela obediência de Outro, vida eterna."},{"t":"Noé e a Arca","d":"Salvação pelo juízo. A água do Dilúvio prefigura o batismo (1Pe 3:20-21). Oito almas salvas pela graça."},{"t":"Melquisedeque (Gn 14)","d":"Sacerdote-Rei sem genealogia registrada. Tipo perfeito do sacerdócio eterno de Cristo (Hb 7:1-3)."},{"t":"Abraão e Isaque (Gn 22)","d":"Pai oferece filho unigênito. Prefigura Deus entregando o Filho. \"Deus proverá\" — Jeová-Jiré."},{"t":"José — tipo de Cristo","d":"Rejeitado, vendido, exaltado e salva Israel. Um dos tipos cristológicos mais ricos em todo Gênesis."}]}],"revelation":{"preceding":["Nenhum livro anterior — Gênesis é o fundamento de toda a revelação bíblica."],"advances":["Revela Deus como Criador soberano de todas as coisas do nada","Estabelece o problema central: queda do homem e necessidade de redenção","Introduz o pacto como forma de relacionamento entre Deus e o homem","Inicia a linha messiânica: semente → Noé → Abraão → Isaque → Jacó → Judá","Demonstra que a eleição é soberana e não baseada em mérito humano"],"points_to":["Proto-Evangelho (3:15): a semente que esmagará a serpente — aponta para Cristo","Adão como cabeça federal aponta para Cristo como segundo Adão (Rm 5)","Sacrifício de animais por Deus (3:21) aponta para o sacrifício expiatório de Cristo","Fé de Abraão imputada como justiça (15:6) aponta para a justificação pela fé em Cristo","Sacrifício de Isaque (22) prefigura o Pai entregando o Filho unigênito"],"fulfilled_in":["Rm 5: Cristo como segundo Adão desfaz o que o primeiro fez","Gl 3: a bênção de Abraão cumprida em Cristo e estendida aos gentios","Hb 7: Melquisedeque cumprido no sacerdócio eterno de Cristo","Jo 1:1: \"No princípio era o Verbo\" — eco intencional de Gênesis 1:1","Ap 21–22: Nova Criação como consumação do que Gênesis inaugurou"]},"nt_refs":[{"ot":"Gn 1:1","nt":"Jo 1:1","theme":"Criação pelo Verbo eterno"},{"ot":"Gn 1:26-27","nt":"Cl 3:10; Ef 4:24","theme":"Imago Dei restaurada em Cristo"},{"ot":"Gn 2:24","nt":"Ef 5:31-32","theme":"Casamento como mistério de Cristo e a Igreja"},{"ot":"Gn 3:15","nt":"Gl 4:4; Ap 12:17","theme":"Proto-Evangelho — semente da mulher"},{"ot":"Gn 5:24","nt":"Hb 11:5","theme":"Enoque e a fé que agrada a Deus"},{"ot":"Gn 14:18-20","nt":"Hb 7:1-17","theme":"Melquisedeque — tipo do sacerdócio de Cristo"},{"ot":"Gn 15:6","nt":"Rm 4:3; Gl 3:6","theme":"Fé imputada como justiça"},{"ot":"Gn 17:10","nt":"Cl 2:11-12","theme":"Circuncisão prefigura o batismo"},{"ot":"Gn 22:1-18","nt":"Hb 11:17-19; Jo 3:16","theme":"Abraão e Isaque — o Pai e o Filho"},{"ot":"Gn 49:10","nt":"Mt 1:1; Ap 5:5","theme":"O cetro de Judá — Leão da tribo de Judá"}],"timeline":[{"ref":"Gn 1–2","event":"Criação","desc":"Deus cria os céus, a terra e o homem. Mandato cultural estabelecido. Sétimo dia como sinal do descanso escatológico."},{"ref":"Gn 3","event":"A Queda","desc":"Tentação pela serpente, desobediência, maldição. Proto-Evangelho (3:15): primeira promessa de redenção."},{"ref":"Gn 4–5","event":"Caim e Abel","desc":"Dois tipos de humanidade: semente da serpente vs. semente da mulher. Linha de Sete preservada por graça."},{"ref":"Gn 6–9","event":"Dilúvio e Noé","desc":"Juízo sobre a corrupção humana. Graça soberana para Noé. A Arca como salvação. Pacto Noático estabelecido."},{"ref":"Gn 10–11","event":"Torre de Babel","desc":"Rebelião humana e dispersão das nações. Prepara o palco para a chamada soberana de Abraão."},{"ref":"Gn 12–25","event":"Abraão","desc":"Chamado soberano. Pacto Abraâmico: terra, semente, bênção às nações. Fé imputada como justiça (15:6). Isaque oferecido (22)."},{"ref":"Gn 25–36","event":"Isaque e Jacó","desc":"Eleição soberana: Jacó amado, Esaú preterido antes de qualquer obra (Rm 9). Deus renomeia Jacó como Israel."},{"ref":"Gn 37–50","event":"José","desc":"Rejeitado pelos irmãos, vendido, exaltado ao lado do faraó. Salva Israel da fome. Tipo mais detalhado de Cristo em Gênesis."}]},"EX":{"chapters":40,"testament":"AT","context":{"quando":"c. 1446–1406 a.C.","paraquem":"Israel recém-saído do Egito, em processo de constituição como nação do pacto","historico":"Israel passa de escravos oprimidos a povo constituído por Deus. Êxodo responde: Como Deus resgata? O que significa ser povo de Deus? Como adorá-lo corretamente?"},"summary":"O grande livro da redenção no AT. O Êxodo do Egito é o evento fundador da história de Israel — paradigma de toda redenção: soberana, pelo sangue e inteiramente gratuita. Aqui nascem o Pacto do Sinai, a Lei, o Tabernáculo e o sacerdócio — todos apontando para Cristo.","themes":[{"id":"sob","order":1,"label":"Soberania na Redenção","color":"#993C1D","nodes":[{"t":"Chamado soberano de Moisés","d":"Deus aparece na sarça ardente e chama Moisés sem mérito algum (NAA Ex 3:1-10). A iniciativa é inteiramente divina."},{"t":"Endurecimento de Faraó","d":"\"Eu endurecerei o coração de Faraó\" (NAA Ex 4:21). Deus endurece para glorificar Seu nome — soberania absoluta sobre reis e nações."},{"t":"As pragas como revelação","d":"Cada praga derrota uma divindade egípcia. Deus demonstra ser o único Senhor soberano sobre toda a criação."},{"t":"\"Para que saibais que Eu sou o SENHOR\"","d":"Frase repetida nas pragas. A redenção tem como fim primário a glória de Deus, não apenas o bem de Israel."}]},{"id":"est","order":2,"label":"Estrutura do Livro","color":"#1D9E75","nodes":[{"t":"Escravidão e chamado (1–6)","d":"Israel oprimido no Egito. Nascimento e chamado de Moisés. Deus ouve o clamor do povo e age por Sua aliança com Abraão."},{"t":"As pragas e o Êxodo (7–15)","d":"Dez pragas sobre o Egito. A Páscoa. Saída do Egito. Travessia do Mar Vermelho. Cântico de vitória de Moisés."},{"t":"Caminho ao Sinai (16–18)","d":"Maná, codornizes, água da rocha. Deus sustenta Seu povo no deserto. Prefigurações de Cristo como o pão e a água da vida."},{"t":"O Sinai: Lei e Aliança (19–24)","d":"Teofania no Sinai. Os Dez Mandamentos. O Livro da Aliança. Ratificação do pacto com sangue (24:8)."},{"t":"O Tabernáculo (25–40)","d":"Instruções detalhadas para a habitação de Deus. O bezerro de ouro e renovação da aliança. Glória de Deus preenchendo o Tabernáculo."}]},{"id":"pas","order":3,"label":"A Páscoa e a Redenção","color":"#A32D2D","nodes":[{"t":"O cordeiro sem defeito","d":"\"Um cordeiro sem defeito\" (NAA Ex 12:5). A perfeição do cordeiro prefigura a perfeição moral de Cristo como sacrifício expiatório."},{"t":"Sangue nos umbrais","d":"O sangue protege da morte. Deus passa por cima das casas marcadas (Ex 12:13). Prefigura a propiciação — ira desviada pelo sangue de Cristo."},{"t":"Nenhum osso quebrado","d":"\"Não lhe quebrarão osso algum\" (NAA Ex 12:46). Cumprido literalmente na crucificação de Cristo (Jo 19:36)."},{"t":"Cristo nossa Páscoa","d":"\"Pois Cristo, nossa Páscoa, foi imolado\" (NAA 1Co 5:7). Paulo identifica explicitamente Cristo como o cordeiro pascal definitivo."}]},{"id":"pac","order":4,"label":"O Pacto do Sinai","color":"#BA7517","nodes":[{"t":"Graça precede a lei","d":"Israel já foi resgatado do Egito ANTES de receber a lei. A lei não é meio de redenção — é resposta de gratidão do povo redimido."},{"t":"Os Dez Mandamentos","d":"Resumo moral da lei de Deus, permanentemente válido. Reformados distinguem: lei moral (eterna), cerimonial (cumprida em Cristo) e civil (Israel teocrático)."},{"t":"Israel como nação sacerdotal","d":"\"Vocês serão para mim um reino de sacerdotes e uma nação santa\" (NAA Ex 19:6). Prefigura a Igreja como sacerdócio real (1Pe 2:9)."},{"t":"Moisés como mediador","d":"Moisés sobe ao Sinai e medeia entre Deus e o povo. Tipo direto de Cristo como o único Mediador entre Deus e os homens (1Tm 2:5)."}]},{"id":"tab","order":5,"label":"O Tabernáculo","color":"#185FA5","nodes":[{"t":"Deus habitando com Seu povo","d":"\"Habitarei no meio dos israelitas e serei o Deus deles\" (NAA Ex 29:45). Antecipação da encarnação e da Nova Criação."},{"t":"O sumo sacerdote","d":"Arão como sumo sacerdote, mediador de acesso a Deus, usando o peitoral com os nomes das tribos. Tipo do sumo sacerdócio eterno de Cristo (Hb 4:14-16)."},{"t":"Os sacrifícios e a propiciação","d":"Todo sacrifício aponta para a expiação definitiva de Cristo. O sangue era o meio de acesso a Deus — sombra do sangue precioso de Cristo."},{"t":"O véu do templo","d":"Separava o Santo do Santíssimo — o povo estava excluído da presença plena de Deus. Rasgado na morte de Cristo (Mt 27:51), abrindo acesso livre."}]},{"id":"tipos","order":6,"label":"Tipos de Cristo","color":"#533AB7","nodes":[{"t":"Moisés → Cristo","d":"Profeta, mediador, legislador, libertador do povo. \"O SENHOR seu Deus levantará para vocês um profeta... como eu\" (NAA Dt 18:15). Cumprido em Cristo (At 3:22)."},{"t":"O maná → Cristo","d":"\"Eu sou o pão da vida... seus pais comeram o maná no deserto e morreram\" (NAA Jo 6:48-49). Cristo é o verdadeiro maná do céu."},{"t":"A rocha → Cristo","d":"\"Bebiam de uma rocha espiritual que os acompanhava, e a rocha era Cristo\" (NAA 1Co 10:4). Água da salvação que flui de Cristo."},{"t":"A travessia do Mar → batismo","d":"\"Todos foram batizados em Moisés, na nuvem e no mar\" (NAA 1Co 10:1-2). A passagem pelo mar como tipo do batismo cristão."},{"t":"O cordeiro pascal → Cristo","d":"A Páscoa inteira é prefiguração de Cristo: cordeiro, sangue, libertação, refeição comunitária (1Co 5:7; Jo 1:29)."}]}],"revelation":{"preceding":["Gênesis estabeleceu o pacto com Abraão: \"Saiba que seus descendentes viverão como estrangeiros\" (NAA Gn 15:13) — Êxodo é o cumprimento dessa promessa.","A eleição soberana de Gênesis continua: Deus lembra do pacto com Abraão, Isaque e Jacó (Ex 2:24)."],"advances":["Revela Deus como Redentor — não apenas Criador — que resgata Seu povo pela força de Seu braço","Aprofunda a teologia do pacto: da promessa abraâmica ao pacto nacional do Sinai","Introduz o conceito de mediação sacerdotal entre Deus santo e povo pecador","Estabelece o padrão bíblico: graça primeiro, lei depois — a lei nunca é meio de redenção","Revela o nome divino: EU SOU O QUE SOU (Ex 3:14) — Deus como ser absoluto e autossuficiente"],"points_to":["O cordeiro pascal sem defeito aponta diretamente para Cristo, o Cordeiro de Deus (Jo 1:29)","Moisés como mediador prefigura Cristo como o único Mediador entre Deus e os homens (1Tm 2:5)","O Tabernáculo e seu sacerdócio são sombras do ministério sumo-sacerdotal de Cristo (Hb 8:5)","O maná e a água da rocha prefiguram Cristo como sustento espiritual de Seu povo (Jo 6:35; 1Co 10:4)","O Sinai (terror e distância) contrasta com o Calvário (acesso e proximidade) — Hb 12:18-24"],"fulfilled_in":["Jo 1:14: \"O Verbo se tornou carne e habitou entre nós\" — Deus habitando com Seu povo como no Tabernáculo","Mt 27:51: o véu do templo se rasga — acesso livre à presença de Deus pelo sangue de Cristo","Hb 8–10: Cristo como sumo sacerdote do Tabernáculo celestial, cumprindo todos os tipos levíticos","Jo 19:36: \"Nenhum de seus ossos será quebrado\" — cumprimento literal do tipo pascal","1Co 5:7: \"Cristo, nossa Páscoa, foi imolado\" — a Páscoa definitiva e eterna"]},"nt_refs":[{"ot":"Ex 3:14","nt":"Jo 8:58","theme":"EU SOU — identidade divina de Cristo"},{"ot":"Ex 12:5","nt":"1Pe 1:19","theme":"Cordeiro sem defeito — perfeição de Cristo"},{"ot":"Ex 12:13","nt":"Rm 3:25","theme":"Sangue pascal — propiciação em Cristo"},{"ot":"Ex 12:46","nt":"Jo 19:36","theme":"Nenhum osso quebrado — cumprimento literal"},{"ot":"Ex 14:21-22","nt":"1Co 10:1-2","theme":"Travessia do mar — tipo do batismo"},{"ot":"Ex 16:4","nt":"Jo 6:31-35","theme":"Maná — Cristo como pão da vida"},{"ot":"Ex 17:6","nt":"1Co 10:4","theme":"Água da rocha — a rocha era Cristo"},{"ot":"Ex 19:6","nt":"1Pe 2:9","theme":"Nação sacerdotal — a Igreja como sacerdócio real"},{"ot":"Ex 20:1-17","nt":"Mt 5:17-18; Rm 13:9","theme":"Os Dez Mandamentos — confirmados em Cristo"},{"ot":"Ex 24:8","nt":"Hb 9:20; Mt 26:28","theme":"Sangue do pacto — nova aliança no sangue de Cristo"},{"ot":"Ex 25–40","nt":"Hb 8:5; 9:1-14","theme":"Tabernáculo — sombra do ministério celestial de Cristo"},{"ot":"Ex 34:29-35","nt":"2Co 3:7-18","theme":"Glória no rosto de Moisés — glória superior em Cristo"}],"timeline":[{"ref":"Ex 1–2","event":"Escravidão e nascimento de Moisés","desc":"Israel oprimido no Egito por 400 anos. Nascimento providencial de Moisés. Deus não esquece Sua aliança com Abraão."},{"ref":"Ex 3–4","event":"Chamado na sarça ardente","desc":"\"EU SOU O QUE SOU\" (3:14). Deus revela Seu nome e chama Moisés soberanamente. Resistência e confirmação do chamado."},{"ref":"Ex 5–11","event":"As dez pragas","desc":"Cada praga derrota uma divindade egípcia. Faraó tem o coração endurecido por Deus. Revelação progressiva da soberania divina."},{"ref":"Ex 12","event":"A Páscoa","desc":"O cordeiro sem defeito. Sangue nos umbrais. Anjo da morte passa por cima. Tipo direto e detalhado da expiação de Cristo."},{"ref":"Ex 13–15","event":"Êxodo e Mar Vermelho","desc":"Saída do Egito com mão forte. Travessia milagrosa do Mar Vermelho. Destruição do exército de Faraó. Cântico de Moisés."},{"ref":"Ex 16–18","event":"Caminho ao Sinai","desc":"Maná do céu e codornizes. Água da rocha em Refidim. Deus sustenta Seu povo no deserto com sinais que apontam para Cristo."},{"ref":"Ex 19–24","event":"O Pacto do Sinai","desc":"Teofania terrível no Sinai. Dez Mandamentos. Livro da Aliança. Ratificação com sangue: \"Este é o sangue da aliança\" (24:8)."},{"ref":"Ex 32–34","event":"Bezerro de ouro e renovação","desc":"Apostasia de Israel. Intercessão de Moisés. Deus revela Sua glória: \"O SENHOR, o SENHOR Deus, compassivo e misericordioso\" (34:6). Renovação do pacto."},{"ref":"Ex 35–40","event":"Construção do Tabernáculo","desc":"O povo oferece com coração voluntário. O Tabernáculo é erguido conforme o padrão celestial. A glória de Deus preenche o lugar santíssimo."}]},"LV":{"chapters":27,"testament":"AT","context":{"quando":"c. 1446–1406 a.C. (no acampamento do Sinai)","paraquem":"Israel acampado ao pé do Sinai, com o Tabernáculo recém-erguido","historico":"A glória de Deus preencheu o Tabernáculo ao fim de Êxodo. Agora Israel aprende como se aproximar de um Deus santo. Levítico responde: como um povo pecador chega a um Deus santo? Pela via que Ele mesmo estabelece: sangue, sacerdote e santidade."},"summary":"O livro da santidade e do acesso a Deus. Parece distante ao leitor moderno, mas é profundamente cristológico: cada sacrifício, lei de pureza e ritual sacerdotal é sombra de Cristo. Sem Levítico, a Epístola aos Hebreus é incompreensível — e sem Hebreus, a morte de Cristo perde sua riqueza teológica.","themes":[{"id":"est","order":1,"label":"Estrutura do Livro","color":"#1D9E75","nodes":[{"t":"Manual de sacrifícios (1–7)","d":"Os cinco tipos de oferta: holocausto, oferta de manjares, oferta pacífica, pelo pecado e pela culpa. Cada um revela uma dimensão da obra de Cristo."},{"t":"Consagração sacerdotal (8–10)","d":"Arão e seus filhos consagrados. Nadabe e Abiú morrem por oferecerem fogo estranho (10:1-3) — a santidade de Deus não é negociável."},{"t":"Leis de pureza (11–15)","d":"Distinção entre puro e impuro. Animais limpos e imundos. Purificação após contaminações. Linguagem simbólica da separação moral que Deus exige."},{"t":"O Dia da Expiação (16)","d":"Clímax teológico do livro. Dois bodes: um sacrificado, um expiatório. O sumo sacerdote entra no Santíssimo uma vez por ano. Tipo direto da obra de Cristo."},{"t":"Código de Santidade (17–26)","d":"\"Sejam santos, porque eu, o SENHOR, o Deus de vocês, sou santo\" (NAA 19:2). Ética derivada do caráter de Deus. Inclui as festas sagradas e o jubileu."}]},{"id":"san","order":2,"label":"Santidade de Deus","color":"#993C1D","nodes":[{"t":"\"Sejam santos como Eu sou santo\"","d":"A frase central de Levítico (11:44; 19:2; 20:7). A ética reformada é sempre teocêntrica: somos chamados à santidade porque Deus é santo, não para ganhar favor."},{"t":"Separação como princípio","d":"A distinção puro/impuro não é arbitrária — é linguagem pedagógica. Deus ensina Israel que a santidade exige separação do pecado e das nações ímpias."},{"t":"Acesso regulado","d":"Ninguém chega a Deus do jeito que quiser. O Tabernáculo tem zonas de acesso restrito. Ensina: aproximação a Deus é em Seus termos, não nos nossos."},{"t":"A morte de Nadabe e Abiú","d":"\"Eles ofereceram ao SENHOR fogo não autorizado\" (NAA 10:1). Morte imediata. O culto improvisado ofende a santidade de Deus — lição para toda adoração."}]},{"id":"sac","order":3,"label":"O Sistema de Sacrifícios","color":"#BA7517","nodes":[{"t":"Holocausto (Lv 1)","d":"Animal inteiramente queimado. Representa consagração total a Deus. Aponta para a entrega total de Cristo ao Pai em nosso lugar."},{"t":"Oferta pelo pecado (Lv 4–5)","d":"Expiação de pecados específicos. O sangue aplicado ao altar. Sem derramamento de sangue não há remissão (Hb 9:22). Tipo da morte expiatória de Cristo."},{"t":"Oferta pacífica (Lv 3)","d":"Comunhão restaurada com Deus. Prefigura a paz com Deus conquistada por Cristo (Rm 5:1). Refeição de comunhão entre Deus e o ofertante."},{"t":"Princípio da substituição","d":"O ofertante coloca a mão sobre a cabeça do animal (1:4) — identificação e transferência de culpa. O animal morre em lugar do pecador. Fundamento da expiação vicária de Cristo."}]},{"id":"yk","order":4,"label":"Dia da Expiação (Yom Kippur)","color":"#533AB7","nodes":[{"t":"O sumo sacerdote entra sozinho","d":"Uma vez por ano, apenas o sumo sacerdote entra no Santíssimo com sangue (Lv 16:2). Prefigura Cristo entrando no santuário celestial com Seu próprio sangue (Hb 9:7-12)."},{"t":"O bode sacrificado","d":"Primeiro bode: oferecido como sacrifício pelo pecado. Sangue aspergido no propiciatório. Tipo da propiciação — ira de Deus aplacada pelo sangue de Cristo."},{"t":"O bode expiatório","d":"Segundo bode: Arão confessa os pecados de Israel sobre ele e o envia ao deserto. Tipo da remoção completa dos pecados — \"tão longe quanto o oriente está do ocidente\" (Sl 103:12)."},{"t":"Cristo cumpre o Yom Kippur","d":"Na cruz, Cristo é ao mesmo tempo o sacrifício (propiciação) e o bode expiatório (remoção dos pecados). Uma obra, dois aspectos, cumprimento perfeito e eterno (Hb 10:12)."}]},{"id":"sac2","order":5,"label":"O Sacerdócio Levítico","color":"#185FA5","nodes":[{"t":"Mediação necessária","d":"O povo não pode entrar diretamente. Precisa de um mediador — o sacerdote. Aponta para a necessidade de Cristo como único Mediador (1Tm 2:5)."},{"t":"Limitações do sacerdócio","d":"Sacerdotes eram mortais, pecadores, precisavam oferecer sacrifícios por si mesmos (Hb 7:27). Essas limitações gritam pela necessidade de um sacerdote superior e eterno."},{"t":"Arão como tipo de Cristo","d":"Sumo sacerdote que entra na presença de Deus, carrega os nomes do povo no peitoral, intercede por Israel. Tipo imperfeito do sumo sacerdócio eterno de Cristo (Hb 4:14-16)."},{"t":"Sacerdócio de Melquisedeque","d":"Já prefigurado em Gênesis 14, superior ao levítico. Cristo pertence a esta ordem superior (Hb 7:11-17) — o sacerdócio levítico era temporário e preparatório."}]},{"id":"tipos","order":6,"label":"Tipos de Cristo","color":"#A32D2D","nodes":[{"t":"Os sacrifícios → a Cruz","d":"Todos os sacrifícios levíticos eram sombras (Hb 10:1). Cristo os cumpre com um único sacrifício eterno: \"Está consumado!\" (NAA Jo 19:30). Não há mais sacrifício pelo pecado."},{"t":"O Dia da Expiação → Calvário","d":"O Yom Kippur apontava para o dia em que Deus mesmo proveria o sacrifício definitivo. Cristo é o propiciatório (Rm 3:25) — onde a ira de Deus e a misericórdia se encontraram."},{"t":"O véu rasgado","d":"O véu que separava o Santíssimo rasgou-se ao meio na morte de Cristo (Mt 27:51). O que Levítico restringia a um homem, uma vez por ano, Cristo abriu para todos, para sempre (Hb 10:19-22)."},{"t":"O Jubileu → libertação em Cristo","d":"\"O Espírito do Senhor está sobre mim... para proclamar o ano aceitável do Senhor\" (NAA Lc 4:18-19). Jesus cita Is 61 e declara o verdadeiro Jubileu inaugurado em Seu ministério."}]}],"revelation":{"preceding":["Gênesis: o problema do pecado e a necessidade de redenção","Êxodo: Deus resgata Seu povo e habita no Tabernáculo — mas como um povo pecador se aproxima de um Deus santo que habita no meio deles?"],"advances":["Revela que a santidade de Deus exige expiação — o pecado não pode ser simplesmente ignorado","Estabelece o sistema sacrificial como o meio divinamente ordenado de acesso a Deus","Aprofunda a teologia da substituição: o inocente morre pelo culpado","Introduz o sumo sacerdote como mediador entre Deus e o povo — fundamento da cristologia sacerdotal","Proclama o princípio da santidade ética derivada do caráter de Deus"],"points_to":["Cada sacrifício aponta para o único sacrifício perfeito de Cristo na Cruz (Hb 10:1-14)","O sumo sacerdote aponta para Cristo como o grande Sumo Sacerdote que entrou no santuário celestial (Hb 4:14)","O Dia da Expiação aponta para o Calvário — onde propiciação e expiação se cumpriram definitivamente","O véu do Santíssimo aponta para o corpo de Cristo — rasgado, abrindo o caminho novo e vivo (Hb 10:20)","O jubileu aponta para a libertação definitiva proclamada por Cristo (Lc 4:18-19)"],"fulfilled_in":["Hb 9–10: toda a liturgia levítica cumprida no sacerdócio eterno de Cristo","Rm 3:25: Cristo como propiciatório — o lugar onde a ira de Deus foi satisfeita","Mt 27:51: o véu rasgado — acesso livre à presença de Deus pela morte de Cristo","Jo 19:30: \"Está consumado!\" — o sacrifício definitivo que os levíticos apenas prefiguravam","1Pe 1:16: \"Sejam santos, porque eu sou santo\" — citação direta de Lv 11:44, agora aplicada à Igreja"]},"nt_refs":[{"ot":"Lv 1–7","nt":"Hb 10:1-14","theme":"Sacrifícios como sombra — cumpridos em Cristo"},{"ot":"Lv 11:44","nt":"1Pe 1:15-16","theme":"\"Sejam santos, porque eu sou santo\""},{"ot":"Lv 16:2","nt":"Hb 9:7-12","theme":"Sumo sacerdote no Santíssimo — Cristo no santuário celestial"},{"ot":"Lv 16:21-22","nt":"Jo 1:29","theme":"Bode expiatório — Cristo que tira o pecado do mundo"},{"ot":"Lv 17:11","nt":"Hb 9:22","theme":"\"Sem derramamento de sangue não há remissão\""},{"ot":"Lv 19:18","nt":"Mt 22:39; Rm 13:9","theme":"\"Ame o seu próximo como a si mesmo\""},{"ot":"Lv 23","nt":"Cl 2:16-17","theme":"Festas sagradas como sombra das coisas que viriam"},{"ot":"Lv 25:10","nt":"Lc 4:18-19","theme":"O Jubileu — Cristo anuncia o verdadeiro ano aceitável"},{"ot":"Lv 26:12","nt":"2Co 6:16","theme":"\"Serei o Deus deles e eles serão o meu povo\""}],"timeline":[{"ref":"Lv 1–7","event":"Os cinco sacrifícios","desc":"Holocausto, oferta de manjares, oferta pacífica, pelo pecado e pela culpa. Cada um revela uma dimensão da obra redentora de Cristo."},{"ref":"Lv 8–9","event":"Consagração do sacerdócio","desc":"Arão e seus filhos consagrados com sangue, óleo e vestes. O sacerdócio levítico estabelecido formalmente para mediar entre Deus e Israel."},{"ref":"Lv 10:1-3","event":"Morte de Nadabe e Abiú","desc":"Fogo não autorizado oferecido ao SENHOR. Morte imediata. \"Serei santificado pelos que se aproximam de mim\" (NAA 10:3). A santidade de Deus é absoluta."},{"ref":"Lv 11–15","event":"Leis de pureza","desc":"Animais limpos e imundos. Purificação após impurezas rituais. Linguagem pedagógica da separação moral e da santidade de vida que Deus exige de Seu povo."},{"ref":"Lv 16","event":"Dia da Expiação (Yom Kippur)","desc":"Clímax do livro. Dois bodes: um sacrificado (propiciação), um expiatório (remoção dos pecados). O sumo sacerdote entra sozinho no Santíssimo. Tipo mais rico de Cristo no AT."},{"ref":"Lv 17–20","event":"Código de Santidade — ética","desc":"\"Sejam santos, porque eu sou santo.\" Lei moral: proibições contra imoralidade, idolatria, ocultismo. \"Ame o seu próximo como a si mesmo\" (19:18)."},{"ref":"Lv 23","event":"As festas sagradas","desc":"Páscoa, Pentecostes, Tabernáculos, Yom Kippur. O calendário litúrgico de Israel como drama da redenção — cada festa é sombra cumprida em Cristo (Cl 2:17)."},{"ref":"Lv 25","event":"Ano sabático e Jubileu","desc":"A cada 50 anos: dívidas canceladas, escravos libertos, terras restauradas. Prefigura a libertação definitiva proclamada por Cristo (Lc 4:18-19)."}]},"NM":{"chapters":36,"testament":"AT","context":{"quando":"c. 1446–1406 a.C. (deserto entre Sinai e Canaã)","paraquem":"Israel peregrinando no deserto por 38 anos após a incredulidade em Cades-Barneia","historico":"Números cobre quatro décadas de fracasso humano e fidelidade divina. Israel peca repetidamente, a geração incrédula morre no deserto — mas Deus não abandona Seu povo nem Seus propósitos redentores."},"summary":"O livro do deserto: 38 anos de peregrinação resultantes da incredulidade de Israel. Números é simultaneamente um registro da rebelião humana e da fidelidade soberana de Deus. A geração incrédula morre no deserto, mas Deus preserva Seu povo — e até usa um profeta pagão para proclamar a vinda do Messias.","themes":[{"id":"est","order":1,"label":"Estrutura do Livro","color":"#1D9E75","nodes":[{"t":"Preparação no Sinai (1–10)","d":"Censo do povo, organização do acampamento, instruções finais no Sinai. Israel organizado como exército de Deus prestes a conquistar Canaã."},{"t":"Peregrinação e rebelião (11–25)","d":"O núcleo trágico do livro. Reclamações, incredulidade em Cades-Barneia, rebelião de Coré, pecado de Moisés. A geração do Êxodo condenada a morrer no deserto."},{"t":"Nova geração (26–36)","d":"Segundo censo — nova geração. Instruções para a conquista de Canaã. Herança das tribos. Cidades de refúgio. Israel pronto para entrar na terra prometida."}]},{"id":"sob","order":2,"label":"Soberania de Deus no Deserto","color":"#993C1D","nodes":[{"t":"Disciplina como amor","d":"Os 38 anos de peregrinação não são abandono — são disciplina paternal. \"O SENHOR seu Deus o disciplinou como um pai disciplina seu filho\" (NAA Dt 8:5)."},{"t":"Fidelidade apesar da rebelião","d":"Israel peca dez vezes no deserto (Nm 14:22), mas Deus nunca rompe o pacto. A graça soberana sustenta o povo rebelde até a nova geração estar pronta."},{"t":"Maldição transformada em bênção","d":"Balaque contrata Balaão para amaldiçoar Israel. Deus soberanamente transforma cada maldição em bênção (Nm 22–24). Nenhum poder pode amaldiçoar o que Deus abençoa (Rm 8:31)."},{"t":"A nuvem e o fogo","d":"A presença de Deus guia Israel pela nuvem de dia e pelo fogo de noite. Símbolo da providência soberana: Deus conduz Seu povo pelo deserto até o destino que Ele mesmo determinou."}]},{"id":"inc","order":3,"label":"Incredulidade em Cades-Barneia","color":"#A32D2D","nodes":[{"t":"Os doze espias (Nm 13–14)","d":"Dez espias veem os obstáculos; Calebe e Josué veem a promessa de Deus. A fé vê o que a incredulidade não consegue. A maioria vence o voto — mas não vence o julgamento de Deus."},{"t":"Calebe e Josué como modelos de fé","d":"\"Calebe tinha um espírito diferente e me seguiu plenamente\" (NAA Nm 14:24). Dois homens de toda uma geração que creram. A fé verdadeira é minoria — mas Deus a honra."},{"t":"Condenação da geração incrédula","d":"Toda a geração acima de 20 anos morre no deserto — exceto Calebe e Josué. O julgamento é certo e justo. A incredulidade tem consequências reais e permanentes."},{"t":"Aviso para a Igreja (Hb 3–4)","d":"Hebreus 3–4 usa Cades-Barneia como aviso direto para cristãos: \"Não endureçam os seus corações\" (NAA Hb 3:8). A história de Israel é espelho para o povo de Deus em todas as épocas."}]},{"id":"ser","order":4,"label":"A Serpente de Bronze","color":"#533AB7","nodes":[{"t":"O contexto: rebelião e juízo (Nm 21)","d":"Israel reclama do maná e do caminho. Deus envia serpentes ardentes. O povo morre. Reconhece o pecado e clama a Moisés. Deus ordena a serpente de bronze como meio de cura."},{"t":"Salvação pelo olhar de fé","d":"Todo israelita picado que olhasse para a serpente de bronze vivia (Nm 21:9). Não pela serpente em si, mas pelo ato de obediência crente. Tipo da fé que salva ao olhar para Cristo crucificado."},{"t":"Cristo interpretando o tipo","d":"\"Assim como Moisés levantou a serpente no deserto, assim também é necessário que o Filho do Homem seja levantado\" (NAA Jo 3:14). Jesus mesmo interpreta o tipo — a mais clara autointerpretação tipológica do NT."},{"t":"\"Ser levantado\" = crucificado","d":"Em João, \"ser levantado\" sempre se refere à crucificação (Jo 8:28; 12:32-33). Cristo levantado na cruz é o ponto focal da fé salvadora — todo que olha para Ele com fé não perece."}]},{"id":"bal","order":5,"label":"Balaão e as Profecias Messiânicas","color":"#BA7517","nodes":[{"t":"Balaão: profeta pagão usado por Deus","d":"Balaque contrata Balaão para amaldiçoar Israel. Deus controla até a boca de um profeta mercenário pagão para proclamar Suas bênçãos sobre Israel. Soberania absoluta sobre a palavra humana."},{"t":"\"Uma estrela sairá de Jacó\" (24:17)","d":"\"Uma estrela sairá de Jacó, um cetro se levantará de Israel\" (NAA Nm 24:17). Profecia messiânica clássica: o Rei que virá da linhagem de Jacó — cumprida em Cristo, o Leão da tribo de Judá."},{"t":"Os quatro oráculos de Balaão","d":"Cada oráculo é mais alto que o anterior. De bênção básica à profecia da estrela messiânica. Deus usa a tentativa de maldição para revelar progressivamente o plano redentor."},{"t":"O erro de Balaão","d":"Balaão não consegue amaldiçoar Israel, mas aconselha Balaque a seduzir Israel pela imoralidade de Baal-Peor (Nm 31:16). Julgado e morto. Aviso: conhecimento teológico sem transformação leva à destruição (2Pe 2:15)."}]},{"id":"tipos","order":6,"label":"Tipos de Cristo","color":"#185FA5","nodes":[{"t":"A serpente de bronze → Cristo na cruz","d":"O tipo mais explicitamente interpretado pelo próprio Cristo no NT (Jo 3:14-15). Olhar para a serpente com fé = crer em Cristo crucificado. A cura vem de fora, não de dentro do homem."},{"t":"As cidades de refúgio → Cristo","d":"Cidades de refúgio para quem matou sem querer — proteção até o julgamento (Nm 35). Tipo de Cristo como nosso refúgio da condenação. \"Temos um forte encorajamento\" (NAA Hb 6:18)."},{"t":"Balaão e a estrela de Jacó","d":"\"Uma estrela sairá de Jacó\" (24:17) — cumprida em Cristo, a Estrela da Manhã (Ap 22:16). Os magos do Oriente seguiram uma estrela até o rei dos judeus (Mt 2:2)."},{"t":"Moisés intercedendo pelo povo","d":"Moisés intercede repetidamente por Israel rebelde, evitando o julgamento total (Nm 14:13-19). Tipo da intercessão permanente de Cristo pelo Seu povo (Hb 7:25; Rm 8:34)."}]}],"revelation":{"preceding":["Gênesis: promessa a Abraão de uma terra e uma grande nação","Êxodo: resgate do Egito e pacto do Sinai — Israel se torna povo de Deus","Levítico: como Israel deve adorar e viver em santidade diante de Deus"],"advances":["Mostra que a incredulidade tem consequências — toda uma geração perde a terra prometida","Revela que a fidelidade de Deus não depende da fidelidade do povo — o pacto permanece","Aprofunda a tipologia messiânica: serpente de bronze, estrela de Jacó, cidades de refúgio","Demonstra que até nações pagãs estão sob soberania de Deus (Balaão)","Prepara a nova geração para a conquista — Josué como sucessor de Moisés"],"points_to":["A serpente de bronze aponta diretamente para Cristo crucificado (Jo 3:14-15)","A estrela de Jacó aponta para Cristo como o Rei prometido (Mt 2:2; Ap 22:16)","As cidades de refúgio apontam para Cristo como nosso refúgio da condenação (Hb 6:18)","Moisés como intercessor aponta para Cristo como eterno intercessor (Hb 7:25)","A nova geração que entra em Canaã aponta para o povo de Deus que entrará no descanso eterno (Hb 4)"],"fulfilled_in":["Jo 3:14-15: Cristo levantado na cruz como a serpente de bronze — salvação pelo olhar da fé","Hb 3–4: a incredulidade de Israel como aviso e a promessa de descanso para o povo de Deus","Hb 6:18: Cristo como refúgio para os que buscam salvação","Ap 22:16: \"Eu sou... a brilhante estrela da manhã\" — Jesus cumprindo Nm 24:17","Rm 8:34: Cristo intercedendo por nós à direita do Pai — cumprimento da intercessão de Moisés"]},"nt_refs":[{"ot":"Nm 6:24-26","nt":"2Co 13:14","theme":"Bênção aarônica — bênção trinitária apostólica"},{"ot":"Nm 14:22-23","nt":"Hb 3:7-19; 1Co 10:5","theme":"Incredulidade no deserto — aviso para cristãos"},{"ot":"Nm 16:1-35","nt":"Jd 11","theme":"Rebelião de Coré — apostasia contra o sacerdócio"},{"ot":"Nm 20:8-11","nt":"1Co 10:4","theme":"Moisés e a rocha — a rocha era Cristo"},{"ot":"Nm 21:8-9","nt":"Jo 3:14-15","theme":"Serpente de bronze — Cristo levantado na cruz"},{"ot":"Nm 24:17","nt":"Mt 2:2; Ap 22:16","theme":"Estrela de Jacó — Cristo, a Estrela da Manhã"},{"ot":"Nm 25:1-9","nt":"1Co 10:8","theme":"Imoralidade em Baal-Peor — aviso contra idolatria"},{"ot":"Nm 27:17","nt":"Mt 9:36","theme":"Povo sem pastor — Jesus como o Bom Pastor"},{"ot":"Nm 35:25","nt":"Hb 6:18","theme":"Cidades de refúgio — Cristo como nosso refúgio"}],"timeline":[{"ref":"Nm 1–4","event":"Censo e organização","desc":"Primeiro censo: 603.550 homens em idade militar. Organização do acampamento ao redor do Tabernáculo. Israel como exército de Deus prestes a marchar para Canaã."},{"ref":"Nm 5–10","event":"Instruções finais no Sinai","desc":"Leis de pureza, bênção aarônica (6:24-26), dedicação do Tabernáculo. Israel parte do Sinai guiado pela nuvem de Deus."},{"ref":"Nm 11–12","event":"Primeiras rebeliões","desc":"Reclamações sobre a comida — Deus envia codornizes e depois juízo. Miriã e Arão falam contra Moisés — Miriã se torna leprosa. O padrão de rebelião começa a se estabelecer."},{"ref":"Nm 13–14","event":"Cades-Barneia — o momento decisivo","desc":"Doze espias. Dez voltam com relatório negativo. Povo recusa entrar. Deus condena a geração a morrer no deserto. O momento mais trágico do Pentateuco."},{"ref":"Nm 16–17","event":"Rebelião de Coré","desc":"Coré, Datã e Abirão se rebelam contra a autoridade de Moisés e Arão. A terra os engole vivos. O cajado de Arão floresce — sacerdócio confirmado por Deus."},{"ref":"Nm 20","event":"Pecado de Moisés na rocha","desc":"Povo reclama de água. Deus manda Moisés falar com a rocha. Moisés a fere duas vezes com o cajado. Consequência: Moisés não entrará em Canaã. Nem líderes são isentos da santidade de Deus."},{"ref":"Nm 21","event":"A serpente de bronze","desc":"Israel reclama do maná. Deus envia serpentes ardentes. Povo clama. Deus ordena a serpente de bronze: todo que olhasse vivia. Tipo mais direto de Cristo no AT (Jo 3:14-15)."},{"ref":"Nm 22–24","event":"Balaão e as profecias messiânicas","desc":"Balaque contrata Balaão para amaldiçoar Israel. Deus transforma cada maldição em bênção. Oráculo final: \"Uma estrela sairá de Jacó\" (24:17) — profecia messiânica cumprida em Cristo."},{"ref":"Nm 26","event":"Segundo censo — nova geração","desc":"Nova contagem: 601.730 homens. A geração do Êxodo morreu no deserto — como Deus prometeu. Nova geração pronta. A fidelidade de Deus atravessa gerações."},{"ref":"Nm 35","event":"Cidades de refúgio","desc":"Seis cidades de refúgio para homicídios involuntários. Proteção até o julgamento. Tipo de Cristo como nosso refúgio da condenação (Hb 6:18)."}]},"DT":{"chapters":34,"testament":"AT","context":{"quando":"c. 1406 a.C. (planícies de Moabe, às portas de Canaã)","paraquem":"A nova geração de Israel prestes a entrar na terra prometida, após 40 anos no deserto","historico":"Moisés, com 120 anos, sabe que não entrará em Canaã. Antes de morrer, reúne Israel e prega três grandes discursos: relembra o passado, renova o pacto e aponta para o futuro. Deuteronômio é o testamento de Moisés."},"summary":"O grande livro da renovação do pacto e da obediência como resposta à graça. Moisés prega nas planícies de Moabe — relembra o deserto, renova a aliança, exorta à obediência e aponta para o profeta que há de vir. É o livro mais citado por Jesus nas tentações no deserto e um dos mais citados no NT.","themes":[{"id":"est","order":1,"label":"Estrutura do Livro","color":"#1D9E75","nodes":[{"t":"Primeiro discurso (1–4)","d":"Retrospecto histórico: de Horebe a Moabe. Moisés relembra as obras de Deus no deserto — tanto as graças quanto os juízos. Fundamento: lembrar o que Deus fez é base da obediência futura."},{"t":"Segundo discurso (5–26)","d":"O núcleo do livro. Renovação dos Dez Mandamentos. O Shemá Israel. As leis do pacto. Bênçãos e maldições. A obediência como resposta de amor, não como meio de merecimento."},{"t":"Terceiro discurso (27–30)","d":"Ratificação solene do pacto. Bênçãos e maldições sobre os montes Gerizim e Ebal. Profecias do exílio e da restauração. \"Escolha, pois, a vida\" (NAA 30:19)."},{"t":"Epílogo (31–34)","d":"Transferência de liderança para Josué. Cântico de Moisés (32). Bênção das tribos (33). Morte de Moisés no monte Nebo — vendo Canaã de longe, sem entrar."}]},{"id":"pac","order":2,"label":"Renovação do Pacto","color":"#BA7517","nodes":[{"t":"Estrutura de tratado suzerano-vassalo","d":"Deuteronômio segue o padrão de tratados do antigo oriente: prólogo histórico, estipulações, bênçãos e maldições, depósito e leitura pública. Deus como Rei soberano, Israel como vassalo redimido."},{"t":"O Shemá Israel (6:4-5)","d":"\"Ouça, ó Israel: o SENHOR nosso Deus, o SENHOR é um! Ame o SENHOR seu Deus de todo o seu coração...\" (NAA 6:4-5). O mandamento central. Citado por Jesus como o maior mandamento (Mt 22:37)."},{"t":"Obediência como amor, não merecimento","d":"Israel não obedece para ganhar a terra — já a recebeu por graça. A obediência é expressão de amor e gratidão pela redenção já realizada. Padrão reformado: indicativo (o que Deus fez) precede imperativo (o que devemos fazer)."},{"t":"Renovação para nova geração","d":"O pacto é renovado para a geração que não estava no Sinai (Dt 5:3). O pacto de Deus abraça gerações — princípio do pacto de graça que inclui os filhos dos crentes (At 2:39)."}]},{"id":"gra","order":3,"label":"Graça e Eleição","color":"#993C1D","nodes":[{"t":"Eleição por amor, não por mérito","d":"\"O SENHOR se agradou de vocês e os escolheu, não porque vocês eram o povo mais numeroso... mas porque o SENHOR os amava\" (NAA 7:7-8). Eleição baseada no amor soberano de Deus."},{"t":"Humildade diante da graça","d":"\"Não diga no seu coração: Foi o meu poder e a força das minhas mãos que me proporcionaram esta riqueza\" (NAA 8:17). O perigo do orgulho após a bênção. A prosperidade pode obscurecer a origem graciosa de tudo."},{"t":"Israel não é melhor que as nações","d":"\"Não é por causa da sua justiça... que você está entrando para possuir a terra deles\" (NAA 9:5). Canaã é dada por graça e por causa da maldade dos cananeus — não por mérito de Israel."},{"t":"Circuncisão do coração","d":"\"O SENHOR seu Deus circuncidará o seu coração... para que você ame o SENHOR seu Deus\" (NAA 30:6). A nova aliança já prefigurada: Deus mesmo transformará o coração do Seu povo."}]},{"id":"lei","order":4,"label":"Lei e Evangelho","color":"#185FA5","nodes":[{"t":"A lei como resposta à graça","d":"Os mandamentos vêm DEPOIS do prólogo: \"Eu sou o SENHOR seu Deus, que tirei você do Egito\" (NAA 5:6). A redenção é o fundamento da obediência — nunca o contrário. Ordem reformada fundamental."},{"t":"Três usos da lei","d":"Reformados distinguem: uso civil (freia o pecado na sociedade), uso pedagógico (mostra o pecado e nos leva a Cristo — Gl 3:24) e uso normativo (regra de vida para o redimido). Deuteronômio ilustra todos os três."},{"t":"A lei não salva","d":"Paulo em Gálatas e Romanos usa Deuteronômio para mostrar que a lei condena (Dt 27:26; Gl 3:10) — não justifica. A salvação sempre foi pela fé, como em Abraão (Gn 15:6)."},{"t":"Bênçãos e maldições","d":"Dt 27–28: bênçãos pela obediência, maldições pela desobediência. Cristo tornou-se maldição por nós (Gl 3:13 citando Dt 21:23) para que recebêssemos a bênção de Abraão. Substituição penal."}]},{"id":"prof","order":5,"label":"O Profeta Prometido","color":"#533AB7","nodes":[{"t":"\"Um profeta como eu\" (18:15)","d":"\"O SENHOR seu Deus levantará para vocês um profeta como eu, do meio de seus irmãos; a ele vocês ouvirão\" (NAA 18:15). A grande promessa de Deuteronômio: cumprida em Cristo."},{"t":"Pedro cita em Atos 3","d":"\"Moisés disse: O Senhor nosso Deus levantará para vocês um profeta como eu, dentre seus irmãos\" (NAA At 3:22). Pedro identifica explicitamente Jesus como o cumprimento da promessa de Dt 18:15."},{"t":"Jesus: maior que Moisés","d":"Hebreus 3:1-6 contrasta: Moisés era fiel como servo na casa; Cristo como Filho sobre a casa. Deuteronômio aponta para um mediador maior — o que Moisés só podia ver de longe, Cristo cumpriu plenamente."},{"t":"As tentações no deserto","d":"Jesus cita Deuteronômio três vezes nas tentações (Mt 4): Dt 8:3, Dt 6:16, Dt 6:13. Onde Israel falhou no deserto, Jesus vence — o segundo Israel que obedece onde o primeiro falhou."}]},{"id":"tipos","order":6,"label":"Tipos de Cristo","color":"#A32D2D","nodes":[{"t":"Moisés → Cristo como Profeta","d":"Moisés é o maior profeta do AT — \"com quem o SENHOR falava face a face\" (NAA 34:10). Mas ele mesmo apontava para um Outro maior (18:15). Cristo é o Profeta definitivo que fala como Filho (Hb 1:1-2)."},{"t":"A morte de Moisés → Cristo como Josué","d":"Moisés morre antes de entrar em Canaã. Josué (mesmo nome que Jesus em hebraico) conduz o povo à terra. Cristo conduz Seu povo ao descanso eterno que Josué apenas prefigurava (Hb 4:8-9)."},{"t":"Circuncisão do coração → novo nascimento","d":"\"O SENHOR seu Deus circuncidará o seu coração\" (NAA 30:6). Promessa da nova aliança: transformação interior soberana por Deus. Cumprida na regeneração pelo Espírito (Ez 36:26; Jo 3:5)."},{"t":"Cristo tornou-se maldição","d":"\"Maldito todo aquele que for pendurado em madeiro\" (NAA Dt 21:23). Paulo cita em Gl 3:13: Cristo tornou-se maldição por nós na cruz. A lei que condena foi satisfeita pelo próprio Cristo que a cumpriu."}]}],"revelation":{"preceding":["Gênesis a Números: toda a história do Êxodo, do pacto e da peregrinação no deserto","Israel está agora às portas de Canaã — o cumprimento da promessa a Abraão está prestes a acontecer"],"advances":["Aprofunda a teologia do pacto: obediência como resposta de amor à graça recebida","Revela que a eleição de Israel é baseada no amor soberano de Deus, não em mérito","Promete o grande Profeta que viria — a mais direta profecia messiânica do Pentateuco (18:15)","Prefigura a nova aliança: circuncisão do coração feita por Deus (30:6)","Conclui o Pentateuco com Moisés morrendo e Josué assumindo — transição para a conquista"],"points_to":["O Profeta prometido (18:15) aponta diretamente para Cristo — cumprido em At 3:22","A circuncisão do coração (30:6) aponta para a regeneração pelo Espírito Santo","As maldições da lei (27:26) apontam para Cristo tornando-se maldição por nós (Gl 3:13)","Josué como sucessor de Moisés aponta para Cristo como o verdadeiro líder ao descanso eterno","O Shemá Israel (6:4-5) aponta para o amor a Deus como essência da lei, cumprido em Cristo"],"fulfilled_in":["Mt 4: Jesus citando Deuteronômio três vezes — cumprindo onde Israel falhou","At 3:22: Pedro identificando Jesus como o Profeta prometido em Dt 18:15","Gl 3:13: Cristo tornando-se maldição por nós — citando Dt 21:23","Mt 22:37: o Shemá como o maior mandamento, segundo o próprio Jesus","Hb 3–4: Josué como tipo do descanso eterno que Cristo proporciona"]},"nt_refs":[{"ot":"Dt 6:4-5","nt":"Mt 22:37; Mc 12:29-30","theme":"Shemá Israel — o maior mandamento"},{"ot":"Dt 6:13","nt":"Mt 4:10","theme":"Adorar só a Deus — Jesus nas tentações"},{"ot":"Dt 6:16","nt":"Mt 4:7","theme":"Não tentarás o Senhor — Jesus nas tentações"},{"ot":"Dt 8:3","nt":"Mt 4:4","theme":"Nem só de pão — Jesus nas tentações"},{"ot":"Dt 18:15","nt":"At 3:22; Jo 6:14","theme":"O Profeta prometido — cumprido em Cristo"},{"ot":"Dt 21:23","nt":"Gl 3:13","theme":"Maldito no madeiro — Cristo tornando-se maldição"},{"ot":"Dt 25:4","nt":"1Co 9:9; 1Tm 5:18","theme":"Boi que debulha — princípio de sustento ministerial"},{"ot":"Dt 27:26","nt":"Gl 3:10","theme":"Maldito quem não guardar toda a lei — impossibilidade humana"},{"ot":"Dt 29:4","nt":"Rm 11:8","theme":"Olhos que não veem — cegueira espiritual de Israel"},{"ot":"Dt 30:6","nt":"Ez 36:26; Jo 3:5","theme":"Circuncisão do coração — regeneração pelo Espírito"},{"ot":"Dt 32:35","nt":"Rm 12:19; Hb 10:30","theme":"A mim pertence a vingança — soberania divina no juízo"}],"timeline":[{"ref":"Dt 1–3","event":"Retrospecto histórico","desc":"Moisés relembra a jornada do Sinai até Moabe. Os fracassos, as batalhas, a fidelidade de Deus. Lembrar o passado é fundamental para a fé no presente."},{"ref":"Dt 4","event":"Exortação à obediência","desc":"\"Guarda-te e guarda muito a tua alma\" (NAA 4:9). Perigo do esquecimento. Israel deve transmitir as obras de Deus de geração em geração. A memória como disciplina espiritual."},{"ref":"Dt 5","event":"Renovação dos Dez Mandamentos","desc":"Os mandamentos repetidos para a nova geração. \"Não os fez com nossos pais, mas conosco\" (5:3). O pacto atravessa gerações — princípio do pacto de graça."},{"ref":"Dt 6","event":"O Shemá Israel","desc":"\"Ouça, ó Israel: o SENHOR nosso Deus, o SENHOR é um! Ame o SENHOR seu Deus de todo o seu coração\" (6:4-5). O mandamento central. Citado por Jesus como o maior mandamento."},{"ref":"Dt 7–11","event":"Graça e eleição","desc":"Deus não escolheu Israel por seu tamanho ou mérito — mas por amor soberano (7:7-8). Perigo do orgulho após a bênção (8:17). Israel não é melhor que as nações (9:5)."},{"ref":"Dt 18:15","event":"Promessa do Profeta","desc":"\"O SENHOR seu Deus levantará para vocês um profeta como eu.\" A maior profecia messiânica do Pentateuco — cumprida em Jesus Cristo (At 3:22)."},{"ref":"Dt 27–28","event":"Bênçãos e maldições","desc":"Pronunciadas sobre os montes Gerizim e Ebal. Bênçãos pela obediência, maldições esmagadoras pela desobediência. Preparação para Gl 3:13 — Cristo tornando-se maldição por nós."},{"ref":"Dt 30:6","event":"Promessa da nova aliança","desc":"\"O SENHOR seu Deus circuncidará o seu coração... para que você ame o SENHOR seu Deus.\" Deus mesmo transformará o coração. Prefigura Ez 36:26 e o novo nascimento (Jo 3:5)."},{"ref":"Dt 31–32","event":"Josué e o Cântico de Moisés","desc":"Moisés transfere a liderança para Josué. O grande Cântico de Moisés (32) — história da fidelidade de Deus e infidelidade de Israel. Cantado pelos redimidos no céu (Ap 15:3)."},{"ref":"Dt 34","event":"Morte de Moisés","desc":"Moisés sobe ao monte Nebo, vê Canaã de longe, morre com 120 anos. \"Nunca mais se levantou em Israel um profeta como Moisés\" (34:10) — até Cristo. Fim do Pentateuco."}]},"JS":{"chapters":24,"testament":"AT","context":{"quando":"c. 1406–1380 a.C.","paraquem":"Israel recém-entrado em Canaã, conquistando e estabelecendo-se na terra prometida","historico":"Após 40 anos no deserto e a morte de Moisés, Josué lidera Israel na conquista de Canaã. É o cumprimento da promessa feita a Abraão — a terra finalmente é dada ao povo de Deus. Cada batalha é um ato da fidelidade soberana de Deus."},"summary":"O livro do cumprimento da promessa. Tudo que foi prometido a Abraão em Gênesis começa a se realizar em Josué. Mas o livro aponta além de si mesmo: o descanso na terra é apenas sombra do verdadeiro descanso que somente Cristo pode dar (Hb 4:8-9). Josué é Jesus em hebraico — não por acaso.","themes":[{"id":"est","order":1,"label":"Estrutura do Livro","color":"#1D9E75","nodes":[{"t":"Entrada em Canaã (1–5)","d":"Chamado de Josué, travessia do Jordão, circuncisão em Gilgal, celebração da Páscoa. A nova geração é consagrada antes da conquista."},{"t":"A Conquista (6–12)","d":"Queda de Jericó, derrota em Ai (pecado de Acã), campanhas sul e norte. Deus luta por Seu povo — a conquista é obra divina, não militar."},{"t":"Divisão da Terra (13–21)","d":"Distribuição da terra entre as tribos. Cidades de refúgio. Cidades levíticas. \"Nenhuma das boas promessas do SENHOR falhou\" (NAA 21:45)."},{"t":"Epílogo (22–24)","d":"As tribos transjordânicas retornam. Discurso de despedida de Josué. Renovação do pacto em Siquém. \"Quanto a mim e à minha família, serviremos ao SENHOR\" (NAA 24:15)."}]},{"id":"fid","order":2,"label":"Fidelidade de Deus às Promessas","color":"#993C1D","nodes":[{"t":"\"Nenhuma boa promessa falhou\"","d":"\"De todas as boas promessas que o SENHOR tinha feito à casa de Israel, nenhuma delas falhou; todas se cumpriram\" (NAA 21:45). A fidelidade de Deus atravessa gerações."},{"t":"Gênesis 15 cumprido","d":"A promessa da terra a Abraão (Gn 15:18-21) aguardou 400 anos de escravidão, 40 de deserto — e se cumpriu. Deus não se esquece de Suas promessas. Nunca."},{"t":"Deus guerreia por Israel","d":"\"O SENHOR guerreou a favor de Israel\" (NAA 10:42). A conquista não é fruto de habilidade militar — é obra do Deus que cumpre o que prometeu. Israel é instrumento, não causa."},{"t":"Fundamento para a fé cristã","d":"A fidelidade de Deus em Josué é fundamento para a fé do crente: o Deus que cumpriu a promessa da terra cumprirá a promessa da redenção, da ressurreição e da glória."}]},{"id":"sob","order":3,"label":"Soberania na Conquista","color":"#BA7517","nodes":[{"t":"Jericó: vitória sem estratégia","d":"Marchas ao redor da cidade, trombetas e grito — e as muralhas caem (Js 6). Deus deliberadamente usa meios \"fracos\" para que a glória seja Sua, não dos guerreiros."},{"t":"Acã: pecado tem consequências","d":"Um homem peca em segredo (Js 7) e Israel é derrotado em Ai. O pecado escondido afeta toda a comunidade. A santidade de Deus não ignora a transgressão — nem em vitórias."},{"t":"O sol parado (Js 10)","d":"\"O sol parou no meio do céu e não se apressou a se pôr por quase um dia inteiro\" (NAA 10:13). Deus é soberano sobre a própria criação para cumprir Seus propósitos redentores."},{"t":"Graça para Raabe","d":"Uma prostituta pagã de Jericó é salva pela fé. Deus elege soberanamente quem não tem mérito algum — e Raabe acaba na genealogia do Messias (Mt 1:5). Graça pura."}]},{"id":"rab","order":4,"label":"A Graça em Raabe","color":"#A32D2D","nodes":[{"t":"Raabe: fé em meio à incredulidade","d":"Enquanto Jericó tremeu e se fechou, Raabe declarou fé no Deus de Israel: \"Sei que o SENHOR lhes deu esta terra\" (NAA 2:9). Fé salvadora no meio de um povo condenado."},{"t":"O cordão escarlate","d":"O cordão vermelho pendurado na janela marca a casa de Raabe para salvação (Js 2:18). Tipo do sangue de Cristo que marca e protege o Seu povo do juízo."},{"t":"Raabe em Hebreus 11","d":"\"Pela fé, Raabe, a prostituta, não pereceu com os que eram desobedientes, porque recebeu os espias em paz\" (NAA Hb 11:31). Incluída no salão da fé — graça soberana sobre o passado."},{"t":"Raabe na genealogia de Cristo","d":"Raabe é mãe de Boaz, avó de Obede, bisavó de Jessé, trisavó de Davi (Mt 1:5). Deus inclui uma prostituta cananeia na linhagem do Messias. A graça não tem fronteiras étnicas nem morais."}]},{"id":"tipos","order":5,"label":"Josué como Tipo de Cristo","color":"#533AB7","nodes":[{"t":"Josué = Jesus (Yeshua)","d":"O nome \"Josué\" em hebraico (Yehoshua) é a mesma raiz de \"Jesus\" (Yeshua): \"O SENHOR salva\". Não é coincidência — é tipologia intencional. O próprio nome anuncia a função."},{"t":"Josué conduz ao descanso","d":"Josué conduz Israel ao descanso na terra prometida. Mas Hb 4:8-9 diz: \"Se Josué tivesse dado a eles o descanso, Deus não teria falado depois de outro dia.\" O descanso verdadeiro é Cristo."},{"t":"A terra como sombra","d":"Canaã é sombra da herança eterna dos remidos. A conquista territorial prefigura a conquista espiritual — Cristo conquistando para Seu povo uma herança incorruptível (1Pe 1:4)."},{"t":"\"Seja forte e corajoso\"","d":"Deus diz quatro vezes a Josué: \"Seja forte e corajoso\" (1:6,7,9,18). Palavra que ecoa para Cristo no Getsêmani e para a Igreja em todo tempo — a força vem do Senhor, não de nós."}]},{"id":"pac","order":6,"label":"Renovação do Pacto","color":"#185FA5","nodes":[{"t":"Circuncisão em Gilgal (Js 5)","d":"A geração nascida no deserto não havia sido circuncidada. Em Gilgal, Deus \"removeu a desonra do Egito\" (5:9). Nova geração consagrada antes da conquista — o pacto aplicado a cada geração."},{"t":"Páscoa em Canaã","d":"Primeira Páscoa celebrada na terra prometida (Js 5:10-11). O maná cessa. Israel come os frutos da terra. A promessa cumprida é comemorada com o rito que a antecipou."},{"t":"Renovação em Siquém (Js 24)","d":"Josué reúne Israel em Siquém — onde Abraão recebeu a primeira promessa da terra (Gn 12:6). O pacto é renovado no mesmo lugar. Deus fiel à aliança desde o princípio."},{"t":"\"Quanto a mim e à minha família\"","d":"\"Quanto a mim e à minha família, serviremos ao SENHOR\" (NAA 24:15). Decisão pactual que inclui a família — princípio reformado: os filhos dos crentes estão dentro do pacto de graça."}]}],"revelation":{"preceding":["Gênesis: promessa da terra a Abraão (15:18-21)","Êxodo: resgate do Egito para ir à terra prometida","Levítico e Números: preparação espiritual e fracasso da primeira geração","Deuteronômio: Moisés morre sem entrar — Josué assume a liderança"],"advances":["Cumpre a promessa da terra feita a Abraão — depois de mais de 600 anos","Demonstra que a fidelidade de Deus atravessa gerações e não depende da fidelidade humana","Revela que a conquista é obra soberana de Deus, não habilidade militar de Israel","Mostra que a graça soberana alcança até pagãos (Raabe) — foreshadowing da missão gentílica","Introduz o conceito de \"descanso\" (shabbat) como meta escatológica — aprofundado em Hebreus 4"],"points_to":["Josué (Yeshua) aponta para Jesus (Yeshua) — o verdadeiro libertador que conduz ao descanso eterno","O descanso em Canaã aponta para o descanso sabático que o povo de Deus ainda aguarda (Hb 4:9)","O cordão escarlate de Raabe aponta para o sangue de Cristo que marca e salva Seu povo","A conquista soberana aponta para Cristo vencendo o pecado, a morte e o diabo na Cruz","Raabe na linhagem de Cristo aponta para a inclusão dos gentios no povo de Deus"],"fulfilled_in":["Hb 4:8-9: o verdadeiro descanso que Josué não pôde dar, Cristo oferece","Mt 1:5: Raabe na genealogia de Cristo — cumprimento da graça soberana sobre os gentios","Hb 11:31: Raabe no salão da fé — salva pela fé, não por mérito","Ef 1:11: herança em Cristo — cumprimento da herança da terra em escala cósmica","Ap 21: a Nova Criação como a verdadeira Canaã — terra prometida em sua forma final e eterna"]},"nt_refs":[{"ot":"Js 1:5","nt":"Hb 13:5","theme":"\"Nunca te deixarei nem te abandonarei\""},{"ot":"Js 2:18","nt":"Hb 9:19-22","theme":"Cordão escarlate — sangue que salva do juízo"},{"ot":"Js 2:11","nt":"Hb 11:31","theme":"Fé de Raabe — salva pela fé, não por mérito"},{"ot":"Js 1:6-9","nt":"1Co 16:13; Ef 6:10","theme":"\"Seja forte e corajoso\" — exortação à Igreja"},{"ot":"Js 5:2-9","nt":"Cl 2:11-12","theme":"Circuncisão em Gilgal — circuncisão espiritual em Cristo"},{"ot":"Js 6","nt":"Hb 11:30","theme":"Queda de Jericó — pela fé, não por força"},{"ot":"Js 10:12-14","nt":"Rm 8:31","theme":"Deus guerreando por Israel — \"Se Deus é por nós\""},{"ot":"Js 21:45","nt":"2Co 1:20","theme":"\"Nenhuma promessa falhou\" — todas as promessas são sim em Cristo"},{"ot":"Js 24:15","nt":"At 16:31","theme":"\"Eu e minha família\" — fé pactual e familiar"},{"ot":"Js 1:13; 11:23","nt":"Hb 4:8-9","theme":"Descanso em Canaã — sombra do descanso eterno em Cristo"}],"timeline":[{"ref":"Js 1","event":"Chamado de Josué","desc":"\"Moisés, meu servo, está morto. Agora levante-se e passe este Jordão\" (NAA 1:2). Deus chama Josué soberanamente. Quatro vezes: \"Seja forte e corajoso.\""},{"ref":"Js 2","event":"Os espias e Raabe","desc":"Dois espias entram em Jericó. Raabe os esconde e declara fé no Deus de Israel. O cordão escarlate é o sinal de salvação. Graça soberana sobre uma prostituta pagã."},{"ref":"Js 3–4","event":"Travessia do Jordão","desc":"As águas do Jordão se partem. Israel atravessa em terra seca — como no Mar Vermelho. Doze pedras são erguidas como memorial. Deus age da mesma forma para cada geração."},{"ref":"Js 5","event":"Circuncisão e Páscoa","desc":"Nova geração circuncidada em Gilgal. Páscoa celebrada na terra. O maná cessa — Israel come os frutos de Canaã. A promessa cumprida é comemorada."},{"ref":"Js 6","event":"Queda de Jericó","desc":"Sete dias de marcha. Sete sacerdotes. Sete voltas no sétimo dia. Trombetas e grito — as muralhas caem. Raabe e sua família são poupados. Vitória soberana de Deus."},{"ref":"Js 7–8","event":"Pecado de Acã e derrota em Ai","desc":"Acã esconde espólios proibidos. Israel é derrotado em Ai. Acã é julgado. O pecado oculto tem consequências reais para toda a comunidade. Ai é depois conquistada."},{"ref":"Js 10","event":"O sol parado","desc":"Josué pede ao SENHOR que o sol pare. \"O sol parou no meio do céu\" (10:13). Deus é soberano sobre a criação. \"Nunca houve dia igual\" — para cumprir Seus propósitos."},{"ref":"Js 11–12","event":"Completude da conquista","desc":"Campanhas no sul e no norte. Trinta e um reis derrotados. \"Josué tomou toda aquela terra\" (11:23). A promessa cumprida — Israel entra no descanso."},{"ref":"Js 13–21","event":"Divisão da terra","desc":"Cada tribo recebe sua herança. Cidades de refúgio estabelecidas. Cidades levíticas distribuídas. \"Nenhuma das boas promessas do SENHOR falhou\" (21:45)."},{"ref":"Js 24","event":"Renovação do pacto em Siquém","desc":"Josué reúne Israel no mesmo lugar onde Abraão recebeu a promessa. Recapitula a história da graça. \"Quanto a mim e à minha família, serviremos ao SENHOR\" (24:15). Josué morre com 110 anos."}]},"JZ":{"chapters":21,"testament":"AT","context":{"quando":"c. 1380–1050 a.C.","paraquem":"Israel estabelecido em Canaã, em ciclo repetido de apostasia e restauração","historico":"Após a morte de Josué, Israel não expulsou completamente os cananeus e começou a assimilar seus deuses. O livro cobre cerca de 300 anos de ciclos: apostasia → opressão → clamor → juiz libertador → paz → nova apostasia."},"summary":"O livro dos ciclos: apostasia, juízo, arrependimento e graça. Juízes é um retrato brutal da depravação humana e da paciência soberana de Deus. Cada juiz é mais imperfeito que o anterior — apontando para a necessidade urgente de um Rei e de um Salvador definitivo.","themes":[{"id":"est","order":1,"label":"Estrutura do Livro","color":"#1D9E75","nodes":[{"t":"Prólogo duplo (1–2)","d":"Primeira falha: Israel não expulsa os cananeus (1). Segunda falha: Israel abandona o SENHOR e serve aos baais (2). As duas causas do ciclo que se segue."},{"t":"Os ciclos dos juízes (3–16)","d":"Seis ciclos principais: apostasia → opressão → clamor → juiz → libertação → paz. Cada ciclo é mais grave. Os juízes incluem Otniel, Débora, Gideão, Jefté e Sansão."},{"t":"Epílogo: caos moral (17–21)","d":"Dois casos extremos de degeneração: idolatria de Mica e os danitas (17–18); guerra civil e atrocidade em Gibeá (19–21). Ponto mais baixo de Israel. \"Cada um fazia o que achava certo\" (21:25)."}]},{"id":"ciclo","order":2,"label":"O Ciclo do Pecado","color":"#993C1D","nodes":[{"t":"Apostasia: abandonam o SENHOR","d":"Israel se casa com os cananeus, serve aos seus deuses (Baal e Astarote). A advertência de Deuteronômio se cumpre. A tentação do sincretismo religioso é constante e letal."},{"t":"Opressão: Deus entrega nas mãos dos inimigos","d":"Deus não é passivo diante do pecado — Ele disciplina. \"A ira do SENHOR se acendeu contra Israel, e os entregou nas mãos de saqueadores\" (NAA 2:14). Juízo como amor."},{"t":"Clamor: arrependimento e súplica","d":"Na opressão, Israel clama ao SENHOR. Não é arrependimento profundo — mas Deus responde à misericórdia, não ao mérito. Revela a graça soberana de Deus que vai além da inconsistência humana."},{"t":"Libertação: o juiz levantado","d":"Deus levanta um juiz (shofet) — não eleito pelo povo, mas designado soberanamente. O Espírito do SENHOR vem sobre ele. A libertação é obra divina através de instrumentos humanos imperfeitos."}]},{"id":"dep","order":3,"label":"Depravação Total em Ação","color":"#A32D2D","nodes":[{"t":"Gideão: herói que virá idólatra","d":"Vence Midiã com 300 homens — glória toda de Deus. Depois fabrica um éfode de ouro que se torna armadilha para Israel (8:27). O herói mais glorioso do livro termina em idolatria."},{"t":"Jefté: voto trágico","d":"Vence os amonitas. Mas faz um voto precipitado que resulta na morte de sua filha (11:30-40). Valentia militar não é maturidade espiritual. Jefté está em Hb 11 — a fé não exclui graves erros."},{"t":"Sansão: dom sem caráter","d":"O juiz mais poderoso fisicamente é o mais fraco moralmente. Sua vida é uma série de relacionamentos proibidos, vingança pessoal e impulsos carnais. O dom de Deus não garante santidade de vida."},{"t":"\"Cada um fazia o que era reto aos seus olhos\"","d":"A frase final do livro (21:25) é o diagnóstico teológico da época: sem autoridade divina reconhecida, o homem se torna seu próprio deus. Depravação total em sua forma mais visível."}]},{"id":"gra","order":4,"label":"Graça Soberana Persistente","color":"#185FA5","nodes":[{"t":"Deus responde apesar da inconsistência","d":"Israel peca, é oprimido, clama, é libertado — e peca de novo. Deus poderia abandoná-los. Não abandona. A graça soberana persiste além de toda inconsistência humana (Rm 5:20)."},{"t":"Débora: graça sobre o inesperado","d":"Deus usa uma mulher como juíza e profetisa em cultura patriarcal. A vergonha cai sobre Baraque que não quis liderar. Deus escolhe o improvável para mostrar que a glória é Sua."},{"t":"Rute dentro de Juízes","d":"O livro de Rute se passa \"no tempo dos juízes\" (Rt 1:1) — e mostra que mesmo no período mais sombrio, há fidelidade, graça e esperança. O fio vermelho messiânico continua."},{"t":"A paciência de Deus como base da salvação","d":"Se Deus abandonasse Israel a cada ciclo de pecado, nenhum de nós teria esperança. A paciência de Deus em Juízes revela o caráter do Deus que suportará a humanidade até Cristo vir (Rm 3:25-26)."}]},{"id":"tipos","order":5,"label":"Tipos de Cristo","color":"#533AB7","nodes":[{"t":"Os juízes como libertadores imperfeitos","d":"Cada juiz liberta parcialmente, temporariamente e imperfeitamente. Cada falha clama por um Libertador perfeito, permanente e sem pecado — Jesus Cristo, o Juiz e Salvador definitivo."},{"t":"Sansão: morte que traz libertação","d":"Sansão mata mais filisteus em sua morte do que em toda a vida (16:30). Tipo de Cristo — cuja morte traz mais vitória do que Sua vida terrena. Na fraqueza, a força definitiva."},{"t":"A necessidade de um Rei","d":"A conclusão de Juízes (17:6; 21:25): \"Naqueles dias não havia rei em Israel.\" O livro todo clama por um rei. Aponta para Davi — e além dele, para Cristo, o Rei eterno."},{"t":"O Espírito que capacita","d":"O Espírito do SENHOR vem sobre os juízes para capacitá-los (3:10; 6:34; 11:29; 14:6). Prefigura o derramamento do Espírito em Pentecostes — Cristo enviando o Espírito para capacitar Seu povo."}]},{"id":"rev","order":6,"label":"Lição Teológica Reformada","color":"#BA7517","nodes":[{"t":"A necessidade da Palavra","d":"Israel apostata porque não tem a lei diante dos olhos. A Reforma insistiu: sem a Palavra de Deus no centro da vida individual e comunitária, o sincretismo e a idolatria são inevitáveis."},{"t":"Perseverança dos santos — de Deus","d":"Israel não persevera. Deus persevera com Israel. A doutrina da perseverança dos santos é, em última análise, a doutrina da perseverança de Deus com Seus santos (Fp 1:6)."},{"t":"Graça não é licença","d":"Deus responde ao clamor de Israel — mas não ignora o pecado. Os ciclos de opressão mostram que a graça não cancela a disciplina. \"O SENHOR disciplina a quem ama\" (Hb 12:6)."},{"t":"O rei que Israel precisa","d":"A solução para o ciclo de Juízes não é um juiz melhor — é um Rei transformador. Isso aponta para o evangelho: não leis melhores, mas um coração novo (Ez 36:26). Cristo não apenas liberta, transforma."}]}],"revelation":{"preceding":["Josué: conquista da terra e renovação do pacto — Israel em posição de bênção","Deuteronômio: advertência clara — se Israel abandonar o SENHOR, a opressão virá","A promessa de Gênesis 3:15 ainda aguarda cumprimento — a semente da serpente continua ativa"],"advances":["Demonstra empiricamente a doutrina da depravação total — Israel não consegue sustentar a fidelidade","Revela que a solução não é mais lei ou mais juízes, mas um novo coração — preparando para os profetas","Aprofunda a necessidade de um Rei: a teocracia sem um rei humano mediador não funciona","Mostra que a graça de Deus persiste além de toda inconsistência humana — base da segurança do crente","O ciclo de pecado aponta para a necessidade da regeneração radical que só Cristo pode operar"],"points_to":["Os juízes imperfeitos apontam para Cristo como o Juiz e Libertador perfeito e permanente","A morte de Sansão que traz mais libertação do que sua vida aponta para a morte de Cristo","A necessidade de um rei aponta para Cristo como o Rei eterno da linhagem de Davi","O Espírito capacitando os juízes aponta para o Espírito derramado em Pentecostes","O ciclo interminável de pecado aponta para a necessidade da nova criação em Cristo"],"fulfilled_in":["Hb 11:32-34: Gideão, Baraque, Sansão e Jefté no salão da fé — graça sobre imperfeições","Jo 16:11: Cristo como o Juiz do mundo — cumprimento do papel dos juízes","At 2: Pentecostes — o Espírito derramado sobre todo o povo, não apenas sobre juízes individuais","Rm 5:20: \"Onde o pecado abundou, superabundou a graça\" — teologia de Juízes em síntese","Ap 19:11: Cristo como Juiz e Guerreiro — cumprimento definitivo do papel dos juízes libertadores"]},"nt_refs":[{"ot":"Jz 2:16","nt":"Jo 16:11; At 13:20","theme":"Juízes levantados por Deus — Cristo como Juiz definitivo"},{"ot":"Jz 4–5","nt":"1Co 1:27","theme":"Débora e Baraque — Deus usando o fraco para envergonhar o forte"},{"ot":"Jz 6:34","nt":"At 2:4","theme":"Espírito sobre Gideão — derramamento do Espírito em Pentecostes"},{"ot":"Jz 7:2","nt":"2Co 4:7","theme":"\"Para que Israel não se glorie\" — glória somente a Deus"},{"ot":"Jz 11:1-11","nt":"Hb 11:32","theme":"Jefté no salão da fé — graça sobre imperfeições"},{"ot":"Jz 13:5","nt":"
