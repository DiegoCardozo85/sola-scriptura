is profunda. A verdadeira liberdade é escravidão a Cristo; a falsa liberdade é escravidão ao pecado."},{"t":"Pior do que nunca ter conhecido (2:20-21)","d":"'Porque, se depois de terem escapado das impurezas do mundo pelo conhecimento do Senhor e Salvador Jesus Cristo, novamente nelas se enredam e são vencidos, o seu último estado vem a ser pior do que o primeiro.' Apostasia após conhecimento da verdade é mais culpável que ignorância original — maior luz rejeitada gera maior condenação."}]},{"id":"esc","order":4,"label":"A Certeza da Parousia","color":"#185FA5","nodes":[{"t":"Os zombadores dos últimos tempos (3:3-4)","d":"'Sabendo primeiro isto: que nos últimos dias virão zombadores, andando segundo as suas próprias concupiscências, e dizendo: Onde está a promessa da sua vinda? Porque, desde que os pais dormiram, todas as coisas permanecem como desde o princípio da criação.' O ceticismo escatológico como sinal dos últimos tempos."},{"t":"O dilúvio como prova do julgamento futuro (3:5-7)","d":"Os zombadores ignoram deliberadamente que Deus julgou o mundo pelo dilúvio. O mesmo Deus que destruiu o mundo antigo pelo água o reservou para o fogo no dia do julgamento. O dilúvio não é mito — é garantia histórica do julgamento vindouro."},{"t":"Mil anos como um dia (3:8-9)","d":"'Não ignoreis, amados, que para o Senhor um dia é como mil anos e mil anos como um dia. O Senhor não tarda a cumprir a sua promessa, como alguns a julgam tardia; pelo contrário, é longânime para convosco, não querendo que nenhum pereça, mas que todos venham a arrepender-se.' O atraso da parousia é misericórdia, não falha."},{"t":"O dia do Senhor e a nova criação (3:10-13)","d":"'Mas o dia do Senhor virá como ladrão; nesse dia os céus passarão com grande estrondo, os elementos se desfarão ardendo, e a terra e as obras que nela há se consumirão... Mas nós esperamos, conforme a sua promessa, novos céus e nova terra, nos quais habita a justiça.' A destruição abre espaço para a nova criação."}]},{"id":"esc2","order":5,"label":"A Escritura como Fundamento Seguro","color":"#6B3FA0","nodes":[{"t":"A Palavra profética mais segura (1:19)","d":"'Temos também a palavra profética mui segura, à qual bem fazeis em estar atentos, como a uma candeia que alumia em lugar escuro, até que o dia amanheça e a estrela da manhã se levante em vossos corações.' A Escritura profética é mais segura até que a experiência mística da Transfiguração — ela ilumina a escuridão até a aurora escatológica."},{"t":"Nenhuma profecia é de interpretação particular (1:20)","d":"'Sabendo, primeiramente, isto: que nenhuma profecia da Escritura é de particular interpretação.' A Escritura não é propriedade privada — seu significado não é determinado pelo leitor individual. Ela tem sentido objetivo, dado pelo Espírito que a inspirou, verificável na comunidade crente ao longo do tempo."},{"t":"Homens falaram movidos pelo Espírito Santo (1:21)","d":"'Porque a profecia nunca foi produzida por vontade humana; pelo contrário, os homens falaram da parte de Deus, movidos pelo Espírito Santo.' Complemento perfeito de 2Tm 3:16: a Escritura é expirada por Deus (produto do sopro divino) e produzida por homens movidos pelo Espírito. Origem divina, instrumentalidade humana."},{"t":"As cartas de Paulo como Escritura (3:15-16)","d":"'Assim como também o nosso amado irmão Paulo vos escreveu, segundo a sabedoria que lhe foi dada... nas quais há certas coisas difíceis de entender, que os ignorantes e instáveis pervertem, como também as demais Escrituras.' Pedro reconhece as cartas de Paulo como 'Escrituras' — confirmação apostólica do cânone paulino."}]},{"id":"ref20","order":6,"label":"Teologia Reformada em 2 Pedro","color":"#533AB7","nodes":[{"t":"A inspiração verbal da Escritura (1:20-21)","d":"2 Pedro 1:20-21 e 2 Timóteo 3:16 são os dois textos fundantes da doutrina reformada da inspiração. Em 2 Pedro: a Escritura não vem de vontade humana, mas de homens movidos pelo Espírito Santo — inspiração que garante a origem divina sem eliminar a personalidade humana dos autores."},{"t":"Eleição e chamado confirmados pelas obras (1:10)","d":"'Portanto, irmãos, esforçai-vos ainda mais por consolidar a vossa vocação e eleição; porque, fazendo isso, nunca tropeçareis.' A teologia reformada não vê tensão aqui: a eleição é soberana e certa (Deus não muda); confirmá-la pela vida piedosa é a resposta humana apropriada que assegura subjetivamente o que é objetivamente certo."},{"t":"A parousia certa e a soberania do tempo divino (3:8-9)","d":"Deus não está sujeito ao tempo — 'mil anos como um dia.' O atraso da parousia não é falha da promessa mas misericórdia soberana. A teologia reformada afirma: Deus age em Seu tempo, não no nosso. O aparente atraso serve ao propósito da eleição — os eleitos ainda não chegaram todos ao arrependimento."},{"t":"Falsos mestres e julgamento soberano (2:1-9)","d":"A teologia reformada afirma a soberania de Deus sobre o mal sem que Deus seja seu autor. Os falsos mestres agem por sua própria vontade corrompida — e Deus os julgará certamente. Os exemplos de julgamento (anjos, dilúvio, Sodoma) demonstram que Deus nunca deixou o mal sem resposta definitiva."}]}],"revelation":{"preceding":["1 Pedro: a carta anterior de Pedro sobre sofrimento externo — 2 Pedro responde ao perigo interno dos falsos mestres.","Judas: carta paralela com conteúdo quase idêntico ao capítulo 2 de 2 Pedro — possivelmente Pedro usou Judas ou ambos usaram fonte comum.","Daniel 7-12 e os profetas: o pano de fundo escatológico da expectativa da parousia que os zombadores ridicularizavam.","Gênesis 6-9 e 19: o dilúvio e Sodoma como exemplos históricos do julgamento divino que Pedro usa em 2:4-9."],"advances":["Fundamenta a autoridade apostólica em testemunho ocular histórico — não fábulas (a Transfiguração como prova).","Articula a doutrina da inspiração: homens falaram movidos pelo Espírito Santo (1:21) — complemento de 2Tm 3:16.","Reconhece as cartas de Paulo como Escritura — confirmação apostólica do cânone paulino (3:15-16).","Responde ao ceticismo escatológico com a soberania divina sobre o tempo e a misericórdia como motivo do atraso.","Apresenta a nova criação como o horizonte que purifica — 'que pessoas deveis ser' à luz do fim (3:11)."],"points_to":["A Palavra profética como luz (1:19) aponta para Cristo — a estrela da manhã (Ap 22:16) — como cumprimento de toda profecia.","A nova criação prometida (3:13) aponta para Apocalipse 21-22 como cumprimento da esperança escatológica.","O julgamento pelo fogo (3:10) aponta para o julgamento final diante do grande trono branco (Ap 20:11-15).","A participação na natureza divina (1:4) aponta para a glorificação final — ver a Deus face a face (1Jo 3:2).","A misericórdia no atraso da parousia (3:9) aponta para a consumação quando o último eleito tiver crido."],"fulfilled_in":["Ap 22:16: 'Eu sou a estrela da manhã' — cumprimento da metáfora de 2Pe 1:19 sobre a aurora escatológica.","Ap 21:1: 'novos céus e nova terra' — cumprimento direto da promessa de 2Pe 3:13.","Ap 20:11-15: o grande trono branco — cumprimento do julgamento final anunciado em 2Pe 3:7.","Jo 17:3: 'conhecer-te a ti' — cumprimento do conhecimento genuíno de Cristo prometido em 2Pe 1:2-3.","1Jo 3:2: 'seremos semelhantes a ele' — cumprimento da participação na natureza divina de 2Pe 1:4."]},"nt_refs":[{"ot":"Gn 6:1-4","nt":"2Pe 2:4","theme":"Anjos que pecaram lançados ao tártaro — julgamento certo dos rebeldes espirituais"},{"ot":"Gn 7:1-24","nt":"2Pe 2:5; 3:6","theme":"O dilúvio como julgamento histórico — garantia do julgamento escatológico futuro"},{"ot":"Gn 19:24-25","nt":"2Pe 2:6","theme":"Sodoma destruída por fogo — exemplo do julgamento divino sobre os ímpios"},{"ot":"Nm 22:7","nt":"2Pe 2:15","theme":"Balaão que amou o salário da iniquidade — tipo do falso mestre motivado por ganância"},{"ot":"Is 65:17","nt":"2Pe 3:13","theme":"Novos céus e nova terra — a esperança escatológica prometida pelos profetas"},{"ot":"Sl 90:4","nt":"2Pe 3:8","theme":"Mil anos como um dia diante de Deus — a soberania divina sobre o tempo"}],"timeline":[{"ref":"2Pe 1:1-11","event":"O fundamento: conhecimento e virtudes crescentes","desc":"Simão Pedro, servo e apóstolo de Jesus Cristo. A fé preciosa que temos em comum pela justiça de nosso Deus. A vós graça e paz sejam multiplicadas pelo conhecimento de Deus. Participantes da natureza divina. Acrescentai à fé: virtude, conhecimento, temperança, perseverança, piedade, fraternidade, amor. Confirmai a vossa vocação e eleição."},{"ref":"2Pe 1:12-21","event":"O testamento de Pedro e a Palavra profética segura","desc":"Pedro sabe que sua morte é iminente — escreve para que após sua partida tenham memória firme. Não seguimos fábulas: fomos testemunhas oculares da majestade de Cristo na Transfiguração. A Palavra profética é mais segura ainda — candeia em lugar escuro. Nenhuma profecia vem de vontade humana; homens falaram movidos pelo Espírito."},{"ref":"2Pe 2:1-9","event":"Falsos profetas: julgamento certo, justos salvos","desc":"Haverá falsos mestres que negarão o Senhor que os resgatou. Mas Deus não poupou os anjos que pecaram, nem o mundo antediluviano, nem Sodoma — e salvou Noé e Ló. O Senhor sabe livrar os piedosos da tentação e reservar os injustos para o dia do julgamento."},{"ref":"2Pe 2:10-22","event":"O caráter e o fim dos falsos mestres","desc":"Atrevidos e arrogantes, não temem blasfemar as dignidades. Como animais irracionais nascidos para serem apanhados e destruídos. Prometem liberdade sendo escravos da corrupção. Melhor nunca ter conhecido o caminho da justiça do que, depois de conhecido, voltar atrás. O cão voltou ao seu vômito."},{"ref":"2Pe 3:1-7","event":"Os zombadores da parousia e o argumento do dilúvio","desc":"Nos últimos dias virão zombadores: onde está a promessa da sua vinda? Ignoram deliberadamente que pelo dilúvio o mundo antigo foi destruído. Os céus e a terra atuais estão reservados para o fogo no dia do julgamento e perdição dos homens ímpios."},{"ref":"2Pe 3:8-13","event":"Mil anos como um dia — misericórdia no atraso da parousia","desc":"Para o Senhor mil anos são como um dia. O Senhor não tarda — é longânime, não querendo que nenhum pereça. O dia do Senhor virá como ladrão. Os céus passarão, os elementos se desfarão. Mas esperamos novos céus e nova terra nos quais habita a justiça."},{"ref":"2Pe 3:14-18","event":"Conclusão: crescei na graça e no conhecimento de Cristo","desc":"Esforçai-vos para serdes achados em paz, sem mácula e irrepreensíveis. O nosso amado irmão Paulo vos escreveu segundo a sabedoria que lhe foi dada — nas quais há coisas difíceis que os ignorantes pervertem como as demais Escrituras. Crescei na graça e no conhecimento de nosso Senhor e Salvador Jesus Cristo."}]},"1JO":{"chapters":5,"testament":"NT","context":{"quando":"c. 85-95 d.C., escrita de Éfeso na velhice de João — uma das últimas cartas do NT","paraquem":"Comunidades cristãs na Ásia Menor ameaçadas pelo proto-gnosticismo — falsos mestres que negavam a encarnação real de Cristo e separavam fé de ética","historico":"João escreve como ancião da Igreja, testemunha ocular de Cristo, para comunidades que sofreram uma cisão dolorosa: falsos mestres saíram da comunidade (2:19) levando alguns consigo. Esses mestres provavelmente ensinavam que Cristo não veio em carne real (docetismo) e que o conhecimento espiritual liberava da ética. João responde com os testes da fé genuína: doutrina correta sobre Cristo, amor ao irmão e obediência aos mandamentos."},"summary":"A epístola dos testes da vida eterna. João escreve para que os crentes saibam que têm vida eterna (5:13) — não para semear dúvida, mas para dar certeza. Os três testes são entrelaçados ao longo da carta: o teste doutrinário (confissão de Cristo encarnado), o teste moral (guardar os mandamentos) e o teste relacional (amor ao irmão). Quem passa nos três tem assurance genuíno; quem falha em algum deve examinar sua fé.","themes":[{"id":"est","order":1,"label":"Estrutura da Carta","color":"#1D9E75","nodes":[{"t":"João e o evangelho de João","d":"1 João tem vocabulário e teologia idênticos ao Evangelho de João: luz e trevas, amor, vida eterna, verdade, mundo, permanecer, o Pai e o Filho. É como um sermão sobre os temas do Evangelho — aprofundando e aplicando o que João narrou em forma de história."},{"t":"A ocasião: a grande cisão (2:19)","d":"'Saíram do nosso meio, mas não eram dos nossos; porque, se fossem dos nossos, teriam permanecido conosco. Saíram para que se tornasse manifesto que nenhum deles é dos nossos.' A saída dos falsos mestres foi providencial — revelou que nunca pertenceram genuinamente à comunidade. Apostasia manifesta o que já era verdade internamente."},{"t":"Os três testes entrelaçados","d":"João não apresenta sua argumentação linearmente — os três testes (doutrinário, moral, relacional) aparecem em espiral ao longo da carta, aprofundando a cada ciclo. Esta estrutura em espiral é intencional: a vida cristã genuína se manifesta em todas as três dimensões simultaneamente."},{"t":"O propósito explícito (5:13)","d":"'Escrevi-vos estas coisas, para que saibais que tendes vida eterna, vós que credes no nome do Filho de Deus.' João escreve não para criar dúvida mas para dar certeza. O assurance da salvação é possível, legítimo e desejável — baseado nos testes objetivos que a carta apresenta."}]},{"id":"dou","order":2,"label":"O Teste Doutrinário: Cristo Encarnado","color":"#993C1D","nodes":[{"t":"O que era desde o princípio (1:1-3)","d":"'O que era desde o princípio, o que temos ouvido, o que temos visto com os nossos olhos, o que contemplamos e as nossas mãos apalparam, com respeito ao Verbo da vida.' João começa com testemunho sensorial — audição, visão, tato. Contra o docetismo que negava a corporalidade de Cristo: ele foi tocado com mãos humanas."},{"t":"Todo espírito que confessa Cristo vindo em carne (4:2)","d":"'Nisto conheceis o Espírito de Deus: todo espírito que confessa que Jesus Cristo veio em carne é de Deus; e todo espírito que não confessa a Jesus não é de Deus; este é o espírito do anticristo.' O teste cristológico é binário: confissão da encarnação real ou espírito do anticristo. Não há meio-termo."},{"t":"O anticristo e os anticristos (2:18,22)","d":"'Filhinhos, é já a última hora; e, como ouvistes que vem o anticristo, assim também muitos anticristos têm surgido agora.' O anticristo singular do fim dos tempos é prefigurado por múltiplos anticristos presentes — qualquer um que nega que Jesus é o Cristo. A mentira fundamental: separar Jesus do Cristo, a humanidade da divindade."},{"t":"O Filho e o Pai são inseparáveis (2:23)","d":"'Todo aquele que nega o Filho também não tem o Pai; aquele que confessa o Filho também tem o Pai.' A inseparabilidade do Filho e do Pai é fundamental: não existe acesso ao Pai que contorne o Filho. Qualquer espiritualidade que busca Deus sem Cristo é autoengano — nega simultaneamente o Pai e o Filho."}]},{"id":"mor","order":3,"label":"O Teste Moral: Guardar os Mandamentos","color":"#BA7517","nodes":[{"t":"Se dissermos que não temos pecado (1:8-10)","d":"'Se dissermos que não temos pecado, enganamo-nos a nós mesmos, e a verdade não está em nós... Se dissermos que não pecamos, fazemo-lo mentiroso, e a sua palavra não está em nós.' Os falsos mestres provavelmente alegavam perfeição moral. João responde: negar o pecado é autoengano e acusa Deus de mentira."},{"t":"Quem diz que O conhece e não guarda os mandamentos (2:4)","d":"'Aquele que diz: Eu O conheço, e não guarda os seus mandamentos, é mentiroso, e nele não está a verdade.' O conhecimento gnóstico sem obediência ética é mentira. Conhecer a Deus produz necessariamente obediência. A desobediência consistente revela que o pretenso conhecimento é falso."},{"t":"Todo aquele que é nascido de Deus não pratica o pecado (3:9)","d":"'Todo aquele que é nascido de Deus não pratica o pecado, porque a semente de Deus permanece nele; e não pode continuar pecando, porque é nascido de Deus.' Não ausência absoluta de pecado (1:8-10 proíbe isso), mas ausência de prática habitual e deliberada. A regeneração produz nova orientação — o pecado deixa de ser o padrão dominante da vida."},{"t":"O sangue de Jesus nos purifica de todo pecado (1:7)","d":"'Mas, se andarmos na luz, como ele está na luz, temos uns com os outros comunhão, e o sangue de Jesus, seu Filho, nos purifica de todo o pecado.' Andar na luz não é perfeição — é transparência e honestidade diante de Deus. E nessa transparência, o sangue de Cristo purifica continuamente. Lei e graça em equilíbrio perfeito."}]},{"id":"rel","order":4,"label":"O Teste Relacional: Amor ao Irmão","color":"#185FA5","nodes":[{"t":"Quem não ama permanece na morte (3:14)","d":"'Nós sabemos que já passamos da morte para a vida, porque amamos os irmãos. Aquele que não ama permanece na morte.' O amor aos irmãos não é prova que produz vida — é evidência de que a vida já está presente. A passagem da morte para a vida se verifica pelo amor. Ausência de amor = permanência na morte."},{"t":"O amor de Deus como fundamento e padrão (4:10-11)","d":"'Nisto está o amor: não em que nós tenhamos amado a Deus, mas em que ele nos amou, e enviou o seu Filho como propiciação pelos nossos pecados. Amados, se Deus assim nos amou, também nós devemos amar uns aos outros.' O amor humano ao irmão é resposta ao amor divino em Cristo — não iniciativa autônoma."},{"t":"Quem não ama o irmão que vê (4:20)","d":"'Se alguém diz: Amo a Deus, e odeia a seu irmão, é mentiroso; pois quem não ama a seu irmão, a quem vê, não pode amar a Deus, a quem não vê.' O amor a Deus invisível se verifica no amor ao irmão visível. Espiritualidade que não se traduz em amor concreto ao próximo é autoilusão."},{"t":"O amor perfeito lança fora o temor (4:18)","d":"'No amor não existe medo; antes, o perfeito amor lança fora o medo, porque o medo tem tormentos. Quem teme não é perfeito no amor.' O amor maduro produz assurance — certeza que expele o medo do julgamento. O crente que ama genuinamente não teme a vinda de Cristo; a espera com confiança (4:17)."}]},{"id":"vid","order":5,"label":"Vida Eterna e Assurance","color":"#6B3FA0","nodes":[{"t":"Deus é amor (4:8,16)","d":"'Aquele que não ama não conheceu a Deus, porque Deus é amor... Deus é amor, e quem permanece no amor permanece em Deus, e Deus nele.' Uma das declarações mais profundas sobre a natureza de Deus no NT. Não apenas que Deus ama — mas que Seu ser essencial é amor. Toda a ética cristã flui dessa ontologia."},{"t":"Quem tem o Filho tem a vida (5:11-12)","d":"'E o testemunho é este: que Deus nos deu a vida eterna, e esta vida está em seu Filho. Quem tem o Filho tem a vida; quem não tem o Filho de Deus não tem a vida.' A vida eterna não é qualidade de existência futura — é posse presente em Cristo. Ter o Filho é ter a vida agora, não apenas na ressurreição."},{"t":"Podemos pedir conforme a Sua vontade (5:14-15)","d":"'E esta é a confiança que temos nele, que, se pedirmos alguma coisa segundo a sua vontade, ele nos ouve. E, se sabemos que ele nos ouve em tudo o que pedimos, sabemos que já temos os pedidos que lhe fizemos.' Oração eficaz fundamentada na confiança relacional, não na técnica ou no volume."},{"t":"Seremos semelhantes a Ele (3:2)","d":"'Amados, agora somos filhos de Deus, e ainda não se manifestou o que haveremos de ser. Sabemos, porém, que quando ele se manifestar, seremos semelhantes a ele, porque havemos de vê-lo como ele é.' A glorificação final como semelhança a Cristo — não dissolução da personalidade mas transformação plena à imagem do Filho."}]},{"id":"ref21","order":6,"label":"Teologia Reformada em 1 João","color":"#533AB7","nodes":[{"t":"Assurance baseado em testes objetivos (5:13)","d":"A teologia reformada afirma que o assurance da salvação é possível e deve ser buscado — contra o catolicismo que o nega e contra o subjetivismo que o baseia apenas em sentimentos. 1 João oferece testes objetivos: doutrina correta, obediência moral e amor fraternal. O assurance é examinado, não assumido."},{"t":"Propiciação — não apenas exemplo (2:2; 4:10)","d":"'E ele é a propiciação pelos nossos pecados, e não somente pelos nossos, mas também pelos de todo o mundo' (2:2). A teologia reformada afirma que Cristo não apenas demonstrou amor — satisfez a ira justa de Deus pelos pecados. Propiciação é substituição penal: a ira que merecia o pecador recaiu sobre Cristo."},{"t":"A permanência como evidência de eleição (2:19)","d":"'Saíram do nosso meio, mas não eram dos nossos; porque, se fossem dos nossos, teriam permanecido conosco.' A teologia reformada vê aqui a doutrina da perseverança dos santos: os verdadeiramente eleitos perseveram; os que apostatam revelam que nunca foram genuinamente regenerados. A apostasia não invalida a eleição — a revela como ausente."},{"t":"Regeneração que necessariamente produz fruto (3:9)","d":"'Todo aquele que é nascido de Deus não pratica o pecado.' A teologia reformada afirma regeneração monergista que necessariamente produz transformação moral. Quem é genuinamente nascido de Deus não pode continuar na prática habitual do pecado — a semente divina reorienta o ser. Regeneração sem fruto é impossível."}]}],"revelation":{"preceding":["O Evangelho de João: o mesmo vocabulário, teologia e perspectiva — 1 João é a aplicação pastoral do que o Evangelho narra historicamente.","Gênesis 4 (Caim e Abel): o primeiro fratricídio como tipo do ódio ao irmão que João condena (3:12).","Isaías 53 e os Salmos: o pano de fundo veterotestamentário da propiciação — a ira de Deus aplacada pelo sacrifício substitutivo.","Deuteronômio 6:4-5: o Shema — amar a Deus de todo coração — que João radicaliza: impossível sem amar o irmão."],"advances":["Define os testes objetivos da vida eterna — doutrina, moral e amor — como fundamento do assurance cristão.","Articula 'Deus é amor' como declaração ontológica — não apenas que Deus ama, mas que amor é Sua natureza essencial.","Apresenta a propiciação (hilasmos) como satisfação da ira divina — a linguagem mais explícita do NT para substituição penal.","Desenvolve a cristologia da encarnação contra o docetismo: Jesus Cristo veio em carne real, tocável, histórica.","Promete a glorificação final como semelhança a Cristo — a visão beatífica como agente de transformação (3:2)."],"points_to":["O amor de Deus revelado em Cristo (4:9-10) aponta para a consumação do amor na nova criação.","A vida eterna como posse presente (5:11-12) aponta para a ressurreição como manifestação plena do que já possuímos.","Seremos semelhantes a Ele (3:2) aponta para a glorificação final — a imago Dei plenamente restaurada.","O amor perfeito que expele o temor (4:18) aponta para a adoração eterna sem medo diante do trono.","A propiciação 'pelos pecados de todo o mundo' (2:2) aponta para a suficiência universal da expiação de Cristo."],"fulfilled_in":["Ap 21:3: 'Deus habitará com eles' — cumprimento da comunhão com Deus prometida em 1Jo 1:3.","Ap 22:4: 'verão a sua face' — cumprimento de 'o veremos como ele é' de 1Jo 3:2.","Jo 17:24: 'quero que onde eu estou, eles estejam também' — cumprimento da vida eterna em Cristo de 1Jo 5:11-12.","Rm 5:5: 'o amor de Deus foi derramado em nossos corações pelo Espírito Santo' — cumprimento do amor como fruto do Espírito.","1Co 13:12: 'veremos face a face' — cumprimento da semelhança a Cristo pela visão beatífica de 1Jo 3:2."]},"nt_refs":[{"ot":"Gn 4:8","nt":"1Jo 3:12","theme":"Caim que matou Abel — o ódio ao irmão como marca dos filhos do maligno"},{"ot":"Lv 16:15-16","nt":"1Jo 2:2","theme":"O sacrifício expiatório no Dia da Expiação — cumprido na propiciação de Cristo"},{"ot":"Is 53:10","nt":"1Jo 4:10","theme":"O Servo como oferta pelo pecado — Cristo como propiciação pelo amor do Pai"},{"ot":"Dt 6:5","nt":"1Jo 4:20-21","theme":"Amar a Deus de todo coração — inseparável do amor ao próximo em João"},{"ot":"Sl 32:1-2","nt":"1Jo 1:9","theme":"A bênção do perdão pela confissão — Deus fiel e justo para perdoar"},{"ot":"Ez 36:26-27","nt":"1Jo 3:9","theme":"Coração novo e Espírito novo — a regeneração que reorienta o ser"}],"timeline":[{"ref":"1Jo 1:1-4","event":"Testemunho ocular: o que ouvimos, vimos e apalpamos","desc":"O que era desde o princípio — ouvido, visto, contemplado, apalpado com respeito ao Verbo da vida. A vida foi manifestada, e nós a vimos. Anunciamos a vós a vida eterna que estava com o Pai. Para que tenhais comunhão conosco — e nossa comunhão é com o Pai e com seu Filho Jesus Cristo."},{"ref":"1Jo 1:5-2:6","event":"Deus é luz — andar na luz e o sangue que purifica","desc":"Deus é luz e nele não há trevas. Se dissermos que temos comunhão com ele e andarmos nas trevas, mentimos. Se andarmos na luz, o sangue de Jesus nos purifica de todo pecado. Se confessarmos nossos pecados, ele é fiel e justo para perdoar. Quem diz que O conhece e não guarda os mandamentos é mentiroso."},{"ref":"1Jo 2:7-29","event":"O mandamento novo, o anticristo e permanecer em Cristo","desc":"O mandamento antigo-novo: amar o irmão. Quem odeia o irmão está nas trevas. Muitos anticristos surgiram — saíram de nós mas não eram dos nossos. Quem nega o Filho não tem o Pai. A unção que recebestes permanece em vós. Permanecei nele para termos confiança na sua vinda."},{"ref":"1Jo 3:1-24","event":"Filhos de Deus — amor e obediência como evidências","desc":"Vede que amor nos deu o Pai: sermos chamados filhos de Deus. Quando ele se manifestar, seremos semelhantes a ele. Todo aquele que é nascido de Deus não pratica o pecado. Nisto são manifestos os filhos de Deus e os filhos do diabo. Nós sabemos que já passamos da morte para a vida porque amamos os irmãos."},{"ref":"1Jo 4:1-21","event":"Provai os espíritos — Deus é amor","desc":"Não creiais em todo espírito — provai se são de Deus. Todo espírito que confessa que Jesus Cristo veio em carne é de Deus. Deus é amor: enviou seu Filho como propiciação. Se Deus assim nos amou, também devemos amar uns aos outros. O amor perfeito lança fora o temor. Quem não ama o irmão que vê não pode amar a Deus que não vê."},{"ref":"1Jo 5:1-12","event":"A fé que vence o mundo e o testemunho do Filho","desc":"Todo aquele que crê que Jesus é o Cristo é nascido de Deus. Esta é a vitória que vence o mundo: a nossa fé. Quem é que vence o mundo senão o que crê que Jesus é o Filho de Deus? O testemunho de Deus é este: que nos deu a vida eterna, e esta vida está em seu Filho. Quem tem o Filho tem a vida."},{"ref":"1Jo 5:13-21","event":"Certeza da vida eterna e oração confiante","desc":"Escrevi-vos para que saibais que tendes vida eterna. Esta é a confiança: se pedirmos conforme a sua vontade, ele nos ouve. Se alguém vir seu irmão cometer pecado que não é para a morte, interceda. Sabemos que somos de Deus e o mundo inteiro está no maligno. Guardai-vos dos ídolos."}]}};


var ALL_BOOKS=[];
DIVS.forEach(function(d){d.books.forEach(function(b){ALL_BOOKS.push({id:b,div:d});});});

function label(id){return BOOK_LABELS[id]||id;}

var state={view:'home',div:DIVS[0],book:'GN',sec:'mapa',exp:{}};

function goHome(){state.view='home';render();}
function setDiv(d){state.div=d;state.book=d.books[0];state.sec='mapa';state.exp={};state.view='book';render();}
function setBook(b){if(BOOKS[b]){state.book=b;state.sec='mapa';state.exp={};state.view='book';render();}}
function setSec(s){state.sec=s;render();}
function toggleTheme(id){state.exp[id]=!state.exp[id];render();}
function getIdx(){return ALL_BOOKS.findIndex(function(b){return b.id===state.book;});}
function navBook(dir){var idx=getIdx();var next=ALL_BOOKS[idx+dir];if(next){state.div=next.div;state.book=next.id;state.sec='mapa';state.exp={};render();}}
function mk(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;}

function render(){
  document.documentElement.style.setProperty('--dc',state.div.color);
  var app=document.getElementById('app');app.innerHTML='';
  var hdr=mk('div','hdr');
  var logo=mk('div','hdr-logo','&#10011;');logo.onclick=goHome;
  var hi=mk('div','');
  var ht=mk('div','hdr-title','Sola Scriptura');ht.onclick=goHome;
  var hs=mk('div','hdr-sub','Estudo B&iacute;blico &middot; Teologia Reformada &middot; NAA');
  hi.appendChild(ht);hi.appendChild(hs);
  var hb=mk('button','hdr-home','In&iacute;cio');hb.onclick=goHome;
  hdr.appendChild(logo);hdr.appendChild(hi);hdr.appendChild(hb);
  app.appendChild(hdr);
  if(state.view==='home'){renderHome(app);return;}
  var divBar=mk('nav','div-bar');
  DIVS.forEach(function(d){
    var tab=mk('button','div-tab'+(d.id===state.div.id?' active':''),d.label);
    tab.style.cssText='--dc:'+d.color;
    tab.onclick=function(){setDiv(d);};
    divBar.appendChild(tab);
  });
  app.appendChild(divBar);
  var bw=mk('div','books-wrap');
  var bg=mk('div','books-grid');
  state.div.books.forEach(function(b){
    var avail=!!BOOKS[b];
    var btn=mk('button','book-btn'+(b===state.book?' active':'')+(avail?'':' wip'),label(b));
    btn.title=avail?label(b):'Em desenvolvimento';
    btn.onclick=function(){if(avail)setBook(b);};
    bg.appendChild(btn);
  });
  bw.appendChild(bg);app.appendChild(bw);
  var content=mk('div','content');
  var book=BOOKS[state.book];
  if(!book){
    content.innerHTML='<div class="wip-page"><h3>Em desenvolvimento</h3><p style="color:#555;font-size:13px;margin-top:6px;">Este livro ser&aacute; adicionado em breve.</p></div>';
    renderBookNav(content);app.appendChild(content);return;
  }
  var bh=mk('div','book-hdr');
  bh.innerHTML='<div class="book-name">'+label(state.book)+'</div>'
    +'<div class="book-meta">'+book.testament+' &middot; '+book.chapters+' cap&iacute;tulos &middot; '+state.div.label+'</div>'
    +'<div class="book-summary">'+book.summary+'</div>';
  content.appendChild(bh);
  if(book.context){
    var ctx=mk('div','hist-ctx');
    [{label:'Quando',val:book.context.quando},{label:'Para quem',val:book.context.paraquem},{label:'Contexto hist&oacute;rico',val:book.context.historico}]
    .forEach(function(item){
      var hi2=mk('div','hist-item');
      hi2.innerHTML='<div class="hist-label">'+item.label+'</div><div class="hist-value">'+item.val+'</div>';
      ctx.appendChild(hi2);
    });
    content.appendChild(ctx);
  }
  var secs=[{id:'mapa',label:'Mapa Mental'},{id:'rev',label:'Progress&atilde;o da Revela&ccedil;&atilde;o'},{id:'refs',label:'Refer&ecirc;ncias Cruzadas'},{id:'tl',label:'Linha do Tempo'}];
  var st=mk('div','sec-tabs');
  secs.forEach(function(s){
    var tab=mk('button','sec-tab'+(s.id===state.sec?' active':''),s.label);
    tab.onclick=function(){setSec(s.id);};
    st.appendChild(tab);
  });
  content.appendChild(st);
  if(state.sec==='mapa') renderMapa(content,book);
  if(state.sec==='rev') renderRev(content,book);
  if(state.sec==='refs') renderRefs(content,book);
  if(state.sec==='tl') renderTl(content,book);
  renderBookNav(content);
  app.appendChild(content);
}

function renderHome(app){
  var home=mk('div','home');
  home.innerHTML='<div class="home-title">Sola Scriptura</div>'
    +'<div class="home-desc">Estudo b&iacute;blico completo pela perspectiva da Teologia Reformada. Cada livro explorado em seus temas teol&oacute;gicos, progress&atilde;o da revela&ccedil;&atilde;o, refer&ecirc;ncias cruzadas com o NT e linha do tempo. Cita&ccedil;&otilde;es na NAA.</div>';
  var grid=mk('div','home-grid');
  DIVS.forEach(function(d){
    var total=d.books.length;
    var done=d.books.filter(function(b){return !!BOOKS[b];}).length;
    var card=mk('div','div-card');
    card.style.cssText='--dc:'+d.color;
    card.innerHTML='<div class="div-card-name">'+d.label+'</div><div class="div-card-count">'+total+' livros &middot; '+done+' dispon&iacute;ve'+(done===1?'l':'is')+'</div>';
    card.onclick=function(){setDiv(d);};
    grid.appendChild(card);
  });
  home.appendChild(grid);
  app.appendChild(home);
}

function renderBookNav(parent){
  var idx=getIdx();
  var prev=idx>0?ALL_BOOKS[idx-1]:null;
  var next=idx<ALL_BOOKS.length-1?ALL_BOOKS[idx+1]:null;
  var nav=mk('div','book-nav');
  var pb=mk('button','nav-btn');pb.disabled=!prev;
  pb.innerHTML='<span class="nav-btn-label">&larr; Anterior</span><span class="nav-btn-name">'+(prev?label(prev.id):'&mdash;')+'</span>';
  if(prev)pb.onclick=function(){navBook(-1);};
  var nb=mk('button','nav-btn next');nb.disabled=!next;
  nb.innerHTML='<span class="nav-btn-label">Pr&oacute;ximo &rarr;</span><span class="nav-btn-name">'+(next?label(next.id):'&mdash;')+'</span>';
  if(next)nb.onclick=function(){navBook(1);};
  nav.appendChild(pb);nav.appendChild(nb);parent.appendChild(nav);
}

function renderMapa(p,book){
  book.themes.forEach(function(t){
    var card=mk('div','theme-card');card.style.borderColor=t.color+'50';
    var hdr=mk('button','theme-hdr');hdr.style.background=t.color;
    hdr.onclick=function(){toggleTheme(t.id);};
    var badge=mk('span','theme-badge',t.order);
    var lbl=mk('span','',t.label);lbl.style.flex='1';
    var tog=mk('span','',state.exp[t.id]?'&#9650;':'&#9660;');
    hdr.appendChild(badge);hdr.appendChild(lbl);hdr.appendChild(tog);
    card.appendChild(hdr);
    var body=mk('div','theme-body'+(state.exp[t.id]?' open':''));
    t.nodes.forEach(function(n){
      var nc=mk('div','node-card');nc.style.borderLeftColor=t.color;
      nc.innerHTML='<div class="node-title">'+n.t+'</div><div class="node-desc">'+n.d+'</div>';
      body.appendChild(nc);
    });
    card.appendChild(body);p.appendChild(card);
  });
}

function renderRev(p,book){
  var r=book.revelation;
  var grid=mk('div','rev-grid');
  [{title:'Funda&ccedil;&atilde;o anterior',items:r.preceding},
   {title:'O que este livro avan&ccedil;a',items:r.advances},
   {title:'Como aponta para Cristo',items:r.points_to},
   {title:'Cumprimento no NT',items:r.fulfilled_in}]
  .forEach(function(sec){
    var card=mk('div','rev-card');
    card.innerHTML='<div class="rev-card-title">'+sec.title+'</div>';
    sec.items.forEach(function(item){card.appendChild(mk('div','rev-item',item));});
    grid.appendChild(card);
  });
  p.appendChild(grid);
}

function renderRefs(p,book){
  var table=mk('table','ref-table','<thead><tr><th>AT (NAA)</th><th>NT (NAA)</th><th>Tema Teol&oacute;gico</th></tr></thead>');
  var tbody=mk('tbody','');
  book.nt_refs.forEach(function(ref){
    tbody.appendChild(mk('tr','','<td><span class="ref-tag">'+ref.ot+'</span></td><td><span class="ref-tag">'+ref.nt+'</span></td><td>'+ref.theme+'</td>'));
  });
  table.appendChild(tbody);p.appendChild(table);
}

function renderTl(p,book){
  var tl=mk('div','timeline');
  book.timeline.forEach(function(item){
    var row=mk('div','tl-item');
    var left=mk('div','tl-left');
    left.appendChild(mk('div','tl-dot'));left.appendChild(mk('div','tl-line'));
    var info=mk('div','');
    info.innerHTML='<div class="tl-ref">'+item.ref+'</div><div class="tl-event">'+item.event+'</div><div class="tl-desc">'+item.desc+'</div>';
    row.appendChild(left);row.appendChild(info);tl.appendChild(row);
  });
  p.appendChild(tl);
}

render();

</script>
</body>
</html>
