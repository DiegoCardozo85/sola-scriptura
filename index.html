Mt 2:23","theme":"Nazireus desde o ventre — consagração total a Deus"},{"ot":"Jz 16:30","nt":"1Co 15:54-57","theme":"Morte de Sansão — vitória pela morte"},{"ot":"Jz 21:25","nt":"Rm 3:10-12","theme":"\"Cada um fazia o que era reto\" — depravação total"}],"timeline":[{"ref":"Jz 1–2","event":"Prólogo: as duas falhas","desc":"Israel não expulsa os cananeus (1) e abandona o SENHOR pelos baais (2). O anjo do SENHOR anuncia as consequências. As causas do ciclo que dominará os próximos 300 anos."},{"ref":"Jz 3:7-11","event":"Otniel — o juiz modelo","desc":"Primeiro ciclo completo. Otniel, sobrinho de Calebe, liberta Israel de Cuşã-Risataim. O único juiz sem falha registrada — padrão contra o qual todos os seguintes são medidos."},{"ref":"Jz 4–5","event":"Débora e Baraque","desc":"Deus usa uma mulher juíza e profetisa. Baraque hesita sem Débora. Sísera morto por Jael com uma estaca. O cântico de Débora (Jz 5) — um dos textos mais antigos do AT."},{"ref":"Jz 6–8","event":"Gideão — 300 contra Midiã","desc":"Chamado enquanto esconde trigo com medo. 300 homens contra exército incontável. Vitória soberana de Deus. Depois fabrica éfode idolátrico. O herói mais glorioso termina em apostasia."},{"ref":"Jz 9","event":"Abimeleque — o rei ilegítimo","desc":"Filho de Gideão, mata 70 irmãos e se proclama rei. Paródia do verdadeiro Rei que há de vir. Jotão e a parábola das árvores. Abimeleque morto por uma mulher — juízo poético."},{"ref":"Jz 10–12","event":"Jefté e o voto trágico","desc":"Filho de prostituta, rejeitado pelos irmãos, chamado na necessidade. Vence os amonitas. Voto precipitado resulta na morte da filha. Está no salão da fé (Hb 11:32) — graça sobre tragédia."},{"ref":"Jz 13–16","event":"Sansão — dom sem caráter","desc":"Nasce como nazireu consagrado. Força sobrenatural do Espírito. Vida de relacionamentos proibidos e impulsos carnais. Traído por Dalila, cego, humilhado. Morte que mata mais do que a vida."},{"ref":"Jz 17–18","event":"Mica e os danitas — idolatria doméstica","desc":"Mica fabrica ídolo e contrata um levita. Os danitas roubam o ídolo e o levita. Idolatria organizada em Israel. \"Naqueles dias não havia rei em Israel\" (17:6)."},{"ref":"Jz 19–21","event":"A atrocidade de Gibeá — ponto mais baixo","desc":"O concubino de um levita é estuprado e morto em Gibeá (Benjamim). Guerra civil quase extermina Benjamim. \"Cada um fazia o que era reto aos seus olhos\" (21:25). Clímax da degeneração."}]},"RT":{"chapters":4,"testament":"AT","context":{"quando":"Eventos situados \"no tempo dos juízes\" (c. 1100 a.C.); livro provavelmente escrito no tempo de Davi","paraquem":"Israel, possivelmente para legitimar e celebrar a linhagem davídica","historico":"Em meio ao caos moral de Juízes, Rute conta uma história silenciosa de fidelidade, lealdade pactual (hesed) e providência divina. É uma luz pessoal em meio à escuridão nacional — e termina apontando diretamente para Davi e, através dele, para Cristo."},"summary":"A pequena grande história da providência de Deus operando nos detalhes comuns da vida. Enquanto Juízes mostra o caos nacional, Rute mostra a fidelidade individual. Uma moabita, estrangeira e viúva, torna-se bisavó de Davi e ancestral de Cristo — prova viva de que a graça de Deus não conhece fronteiras étnicas.","themes":[{"id":"est","order":1,"label":"Estrutura do Livro","color":"#1D9E75","nodes":[{"t":"Perda e decisão (cap. 1)","d":"Fome leva Elimeleque a Moabe. Morte de Elimeleque e dos filhos. Rute escolhe ficar com Noemi: \"Aonde você for, irei eu\" (1:16). Decisão pactual e irrevogável."},{"t":"Provisão no campo (cap. 2)","d":"Rute respiga no campo de Boaz \"por acaso\" — providência disfarçada de coincidência. Boaz a trata com favor extraordinário. Primeiro sinal da redenção que se aproxima."},{"t":"O pedido na eira (cap. 3)","d":"Noemi orienta Rute a pedir a Boaz que exerça o papel de resgatador (goel). Cena de ousadia e pureza simultâneas. Boaz aceita o desafio de resgatar."},{"t":"O resgate e a linhagem (cap. 4)","d":"Boaz resgata legalmente Rute no portão da cidade. Casamento. Nascimento de Obede. Genealogia final: Obede → Jessé → Davi. O livro termina apontando para o rei."}]},{"id":"hesed","order":2,"label":"Hesed — Lealdade Pactual","color":"#993C1D","nodes":[{"t":"Hesed: o coração do livro","d":"Palavra hebraica para amor leal, fidelidade pactual, bondade que vai além da obrigação. Aparece repetidamente: Rute para com Noemi, Boaz para com Rute, e supremamente, Deus para com Seu povo."},{"t":"\"Aonde você for, irei eu\" (1:16-17)","d":"Um dos votos de lealdade mais comoventes da Escritura. Rute abandona pátria, família e deuses por amor a Noemi e ao Deus de Israel. Fé que se traduz em compromisso radical."},{"t":"Boaz: hesed em ação","d":"Boaz vai além da lei ao proteger, prover e honrar Rute. A bondade de Boaz reflete o caráter de Deus — generoso além do que a justiça exige. Modelo de liderança piedosa."},{"t":"Hesed divino por trás de tudo","d":"A providência de Deus opera silenciosamente através da hesed humana. \"Por acaso\" Rute vai ao campo de Boaz (2:3) — não é acaso, é a mão soberana de Deus disfarçada em circunstâncias comuns."}]},{"id":"goel","order":3,"label":"O Resgatador (Goel)","color":"#BA7517","nodes":[{"t":"A instituição do goel","d":"Lei do parente-resgatador (Lv 25:25; Dt 25:5-10): um parente próximo deveria resgatar terras vendidas, redimir parentes escravizados, e casar com a viúva sem filhos para preservar a linhagem."},{"t":"Boaz qualifica-se como goel","d":"Parente de Elimeleque, homem de posses, disposto a agir. Reúne as três qualificações que tornam alguém apto a redimir: parentesco, capacidade e disposição."},{"t":"O parente mais próximo recusa","d":"Há um resgatador mais próximo que Boaz, mas ele recusa por medo de prejudicar sua própria herança (4:6). Sua recusa abre caminho para Boaz — soberania de Deus guiando os detalhes legais."},{"t":"O resgate como redenção integral","d":"Boaz resgata terra, nome e pessoa — redenção completa, não parcial. Tipo da redenção integral de Cristo: corpo, alma, nome e herança restaurados ao Seu povo."}]},{"id":"prov","order":4,"label":"Providência Divina nos Detalhes","color":"#185FA5","nodes":[{"t":"Deus não é mencionado agindo diretamente","d":"Diferente de Êxodo (pragas) ou Josué (sol parado), em Rute Deus opera nos bastidores. Nenhum milagre espetacular — apenas circunstâncias \"comuns\" perfeitamente orquestradas."},{"t":"\"Por acaso\" ela chegou ao campo de Boaz","d":"\"Por acaso\" (2:3) é a chave teológica do livro: o que parece coincidência ao olho humano é providência divina ao olho da fé. Deus governa até os passos aparentemente aleatórios."},{"t":"A fome e o retorno como providência","d":"A fome que expulsa a família para Moabe, e depois o fim da fome que permite o retorno (1:6), são moldados pela mão de Deus para cumprir Seus propósitos redentores através de circunstâncias adversas."},{"t":"Doutrina reformada da providência","d":"Rute ilustra perfeitamente a doutrina reformada: Deus governa soberanamente todos os eventos, grandes e pequenos, sem violar a liberdade humana, para cumprir Seu plano eterno de redenção."}]},{"id":"gen","order":5,"label":"A Genealogia Messiânica","color":"#533AB7","nodes":[{"t":"Obede → Jessé → Davi (4:17-22)","d":"O livro termina com uma genealogia que parece técnica, mas é o clímax teológico: uma moabita se torna bisavó do maior rei de Israel. A linhagem davídica passa por uma estrangeira."},{"t":"Rute na genealogia de Mateus","d":"\"Salmom gerou Boaz, cuja mãe foi Raabe... Obede, cuja mãe foi Rute\" (NAA Mt 1:5). Mateus inclui deliberadamente mulheres estrangeiras na genealogia de Cristo — graça sem fronteiras."},{"t":"Quatro mulheres, um padrão de graça","d":"Tamar, Raabe, Rute e Bate-Seba estão na genealogia de Mateus 1 — todas com histórias marcadas por escândalo, estrangeirice ou pecado. Deus tece graça através de circunstâncias humanamente improváveis."},{"t":"De Moabe ao trono de Davi","d":"Moabe era inimigo histórico de Israel (Nm 22-25; Jz 3:12-30). Que a linhagem real venha de lá é um sinal profético: o Reino de Deus inclui os de fora, antecipando a missão aos gentios."}]},{"id":"tipos","order":6,"label":"Tipos de Cristo","color":"#A32D2D","nodes":[{"t":"Boaz como tipo do Resgatador","d":"Boaz reúne as qualificações do goel: parente (Cristo se fez carne — Hb 2:14), capaz (poder infinito) e disposto (amor voluntário — Jo 10:18). Tipo claro do Redentor que Cristo é."},{"t":"Rute como tipo da Igreja","d":"Estrangeira, sem méritos, trazida para dentro do povo de Deus pela graça e pela fé. A Igreja, composta de judeus e gentios, é \"enxertada\" na promessa (Rm 11:17) como Rute foi enxertada em Israel."},{"t":"O casamento como figura da união com Cristo","d":"A união entre Boaz e Rute prefigura a união entre Cristo e a Igreja (Ef 5:25-32) — o Esposo que resgata e se une à noiva que não tinha direito algum à herança."},{"t":"Davi como ponte para o Messias","d":"O livro termina em Davi não por acaso — Davi é o tipo régio definitivo de Cristo. Rute é o elo silencioso que conecta a graça aos gentios com o trono eterno do Messias (2Sm 7:16; Lc 1:32-33)."}]}],"revelation":{"preceding":["Juízes: o caos moral e nacional de Israel — \"cada um fazia o que era reto aos seus olhos\"","Deuteronômio: leis sobre o resgatador (goel) e o levirato que estruturam toda a trama de Rute","Gênesis: a promessa de bênção a todas as nações através de Abraão (12:3) começa a se cumprir"],"advances":["Mostra fidelidade individual brilhando em meio ao caos nacional de Juízes","Introduz a teologia da redenção pessoal através da figura do goel — preparando a redenção cósmica de Cristo","Demonstra que a graça de Deus inclui estrangeiros — fundamento para a missão aos gentios","Conecta a linha messiânica diretamente: de Judá (Gênesis 49) a Davi (aqui) a Cristo (Evangelhos)","Revela a providência divina operando silenciosamente nos detalhes da vida comum — não apenas em milagres"],"points_to":["Boaz como goel aponta diretamente para Cristo como nosso Resgatador (Gl 3:13; Ef 1:7)","Rute, a estrangeira incluída, aponta para a inclusão dos gentios no povo de Deus (Ef 2:12-13)","A genealogia final aponta para Davi e, através dele, para o Messias prometido (2Sm 7; Lc 1:32-33)","O casamento de resgate aponta para a união nupcial entre Cristo e a Igreja (Ap 19:7-9)","A providência \"escondida\" aponta para a forma como Deus opera na vida do crente hoje — sem milagres visíveis, mas com mão soberana"],"fulfilled_in":["Mt 1:5: Rute explicitamente na genealogia de Cristo","Lc 1:32-33: o trono de Davi, herdado através da linhagem de Rute, dado a Jesus para sempre","Ef 1:7: \"Nele temos a redenção pelo seu sangue\" — Cristo como o goel definitivo","Ef 2:12-13: gentios \"antes longe\" agora trazidos para perto — eco direto da história de Rute","Ap 19:7-9: as bodas do Cordeiro — consumação do tipo do casamento redentor de Boaz e Rute"]},"nt_refs":[{"ot":"Rt 1:16-17","nt":"Lc 9:62","theme":"Compromisso irrevogável de fé — \"aonde você for, irei eu\""},{"ot":"Rt 2:12","nt":"Sl 91:4; Mt 23:37","theme":"Refúgio sob as asas do SENHOR"},{"ot":"Rt 2:20","nt":"Ef 1:7","theme":"O parente-resgatador — Cristo nosso Redentor"},{"ot":"Rt 3:9","nt":"Ez 16:8","theme":"Estender as asas — imagem da aliança nupcial"},{"ot":"Rt 4:1-12","nt":"Gl 4:4-5","theme":"O resgate legal — Cristo \"nascido sob a lei\" para redimir"},{"ot":"Rt 4:13-17","nt":"Mt 1:5-6","theme":"Genealogia de Obede a Davi — cumprida na genealogia de Cristo"},{"ot":"Rt 4:17","nt":"Lc 3:31-32","theme":"Davi na linhagem — confirmado na genealogia de Lucas"}],"timeline":[{"ref":"Rt 1:1-5","event":"Fome e perda em Moabe","desc":"Elimeleque leva a família a Moabe por causa da fome. Morrem Elimeleque e os dois filhos. Noemi fica viúva e sem filhos, junto com as duas noras moabitas, Orfa e Rute."},{"ref":"Rt 1:6-18","event":"O voto de Rute","desc":"Noemi decide voltar a Belém. Orfa retorna para sua família. Rute se recusa a abandonar Noemi: \"Aonde você for, irei eu... o seu povo será o meu povo, e o seu Deus, o meu Deus\" (1:16)."},{"ref":"Rt 1:19-22","event":"Retorno a Belém","desc":"Noemi e Rute chegam a Belém no início da colheita da cevada. Noemi pede para ser chamada de \"Mara\" (amargura) por causa de sua perda. O timing \"por acaso\" é providencial."},{"ref":"Rt 2","event":"Rute no campo de Boaz","desc":"Rute respiga no campo que \"por acaso\" pertencia a Boaz, parente de Elimeleque. Boaz nota sua lealdade a Noemi e a trata com favor extraordinário, além do que a lei exigia."},{"ref":"Rt 3","event":"O pedido na eira","desc":"Noemi orienta Rute a se deitar aos pés de Boaz na eira e pedir que ele estenda sua \"asa\" (proteção matrimonial) sobre ela. Boaz aceita, mas revela que há um parente mais próximo a considerar primeiro."},{"ref":"Rt 4:1-12","event":"O resgate no portão","desc":"Boaz convoca o parente mais próximo perante os anciãos no portão da cidade. O parente recusa resgatar por temer prejudicar sua própria herança. Boaz assume o papel de goel publicamente."},{"ref":"Rt 4:13-17","event":"Casamento e nascimento de Obede","desc":"Boaz se casa com Rute. Nasce Obede. As mulheres de Belém abençoam Noemi: o SENHOR não a deixou sem resgatador. Obede se torna avô de Davi."},{"ref":"Rt 4:18-22","event":"A genealogia final","desc":"De Perez (filho de Judá e Tamar) a Davi: dez gerações. O livro termina apontando deliberadamente para o trono davídico — e, através dele, para o Messias prometido."}]},"1SM":{"chapters":31,"testament":"AT","context":{"quando":"c. 1100–1010 a.C.","paraquem":"Israel na transição do período dos juízes para a monarquia","historico":"Israel pede um rei \"como as outras nações\" (8:5), rejeitando implicitamente o governo direto de Deus. 1 Samuel narra a transição: do último juiz (Samuel) ao primeiro rei rejeitado (Saul) e a ascensão do rei segundo o coração de Deus (Davi)."},"summary":"O livro da transição: de juízes a reis, de rejeição a eleição. 1 Samuel contrasta dramaticamente dois tipos de liderança — Saul, escolhido pela aparência externa e que falha pela desobediência, e Davi, escolhido pelo coração e ungido muito antes de reinar. Um estudo profundo sobre soberania divina na eleição de líderes.","themes":[{"id":"est","order":1,"label":"Estrutura do Livro","color":"#1D9E75","nodes":[{"t":"Samuel: o último juiz (1–7)","d":"Nascimento providencial de Samuel. Queda da casa de Eli. Captura e devolução da arca. Samuel como juiz, profeta e sacerdote — figura de transição."},{"t":"Ascensão e queda de Saul (8–15)","d":"Israel pede um rei. Saul é ungido, mas desobedece repetidamente. Deus o rejeita como rei (15:23) — embora ele continue reinando por mais tempo."},{"t":"Davi e Saul (16–31)","d":"Davi é ungido em segredo (16). Mata Golias. Perseguição implacável de Saul. Davi poupa a vida de Saul duas vezes. Morte de Saul em Gilboa (31)."}]},{"id":"sob","order":2,"label":"Soberania na Eleição de Reis","color":"#993C1D","nodes":[{"t":"\"O SENHOR não vê como o homem vê\" (16:7)","d":"Ao escolher Davi, Deus rejeita os irmãos mais impressionantes externamente. \"O homem olha para a aparência, mas o SENHOR olha para o coração\" — princípio central da eleição divina."},{"t":"Saul: rei escolhido pelo povo, não por Deus","d":"Israel quer um rei \"como as outras nações\" (8:5) — rejeição implícita do governo teocrático. Deus concede o pedido como julgamento e ensino, não como aprovação plena."},{"t":"A unção de Davi muito antes do trono","d":"Davi é ungido em 1Sm 16, mas só reina efetivamente em 2Sm 5 — mais de uma década depois. A eleição divina precede e independe da posse imediata da promessa."},{"t":"Deus levanta e deus rejeita reis","d":"\"O SENHOR o exaltou da multidão... e agora o SENHOR rejeitou você como rei\" (NAA 15:17,23 parafraseado). A monarquia israelita está completamente sob a soberania de Deus, não acima dela."}]},{"id":"obe","order":3,"label":"Obediência Versus Sacrifício","color":"#BA7517","nodes":[{"t":"O pecado de Saul em Gilgal (13)","d":"Saul oferece sacrifício sem esperar Samuel, violando a ordem profética por impaciência e medo. Pequena desobediência aparente, consequência enorme: perda do reino."},{"t":"A desobediência em Amaleque (15)","d":"Saul poupa Agague e o melhor do gado, desobedecendo a ordem explícita de Deus. Justifica-se dizendo que guardou para sacrificar — racionalização da desobediência."},{"t":"\"Obedecer é melhor do que sacrificar\" (15:22)","d":"A resposta de Samuel é um dos princípios teológicos mais citados do AT: ritual sem obediência é rebelião disfarçada. Antecipa a crítica profética posterior (Is 1:11-17; Os 6:6)."},{"t":"Padrão para entender o legalismo","d":"Saul representa a religiosidade externa sem coração transformado — o oposto do que a Reforma chamaria de fé viva que produz obediência genuína, não ritual vazio."}]},{"id":"dav","order":4,"label":"Davi: o Rei segundo o Coração de Deus","color":"#185FA5","nodes":[{"t":"\"Um homem segundo o seu coração\" (13:14)","d":"Não significa perfeição moral — Davi pecará gravemente depois. Significa um coração voltado para Deus, capaz de arrependimento genuíno, em contraste com a obstinação de Saul."},{"t":"Fé diante de Golias (17)","d":"\"Você vem contra mim com espada... mas eu venho contra você em nome do SENHOR dos Exércitos\" (NAA 17:45). Confiança que vem do conhecimento de Deus, não da força própria."},{"t":"Recusa de tomar o trono pela força","d":"Davi poupa Saul duas vezes (24; 26) mesmo tendo oportunidade e justificativa para matá-lo. \"Não estenderei a mão contra o ungido do SENHOR\" (24:6). Respeito à soberania divina sobre o tempo."},{"t":"Paciência na espera da promessa","d":"Anos foragido, perseguido injustamente, vivendo entre os filisteus — Davi espera o tempo de Deus em vez de tomar o reino por usurpação. Padrão de fé que confia no timing soberano de Deus."}]},{"id":"ali","order":5,"label":"Amizade e Aliança: Jônatas e Davi","color":"#533AB7","nodes":[{"t":"A aliança de Jônatas e Davi (18:3)","d":"Jônatas, herdeiro do trono, faz aliança com Davi — sabendo que isso significa abrir mão de sua própria sucessão. Um dos exemplos mais belos de hesed (lealdade pactual) na Escritura."},{"t":"Jônatas despoja-se por Davi","d":"Jônatas dá a Davi sua túnica, espada, arco e cinto (18:4) — sinais de realeza e status militar. Renúncia voluntária ao próprio direito em favor do ungido de Deus."},{"t":"Lealdade que custa caro","d":"Jônatas defende Davi diante de Saul, arriscando a própria vida e posição. Amizade fundamentada em compromisso com o propósito de Deus, não em interesse próprio."},{"t":"Tipo de renúncia cristológica","d":"Jônatas, herdeiro legítimo, cede lugar ao escolhido de Deus — ecoando o princípio de que toda autoridade humana deve, em última instância, ceder ao Rei que Deus escolhe: Cristo."}]},{"id":"tipos","order":6,"label":"Tipos de Cristo","color":"#A32D2D","nodes":[{"t":"Davi: o Rei pastor","d":"Davi era pastor de ovelhas antes de ser rei (16:11) — prefigura Cristo, o Bom Pastor que se torna Rei (Jo 10:11; Ap 19:16). Um pastor humilde elevado ao trono pela escolha soberana de Deus."},{"t":"O Rei rejeitado antes de reinar","d":"Davi é ungido, mas perseguido e rejeitado por anos antes de reinar de fato. Prefigura Cristo: ungido (batismo), rejeitado (cruz) e depois exaltado ao trono eterno (ressurreição e ascensão)."},{"t":"Vitória sobre o gigante representando o povo","d":"Davi enfrenta Golias sozinho, representando todo Israel — vitória que se torna vitória de todos. Tipo de Cristo enfrentando o pecado e a morte sozinho na cruz, em favor de Seu povo."},{"t":"A unção do Espírito (16:13)","d":"\"O Espírito do SENHOR apoderou-se de Davi a partir daquele dia\" (NAA 16:13). Padrão messiânico: o ungido (mashiach) recebe o Espírito permanentemente — cumprido plenamente em Cristo (Lc 4:18; Jo 3:34)."}]}],"revelation":{"preceding":["Juízes: o caos do período sem rei — \"cada um fazia o que era reto aos seus olhos\"","Deuteronômio 17:14-20: Deus já havia previsto e regulado a futura monarquia de Israel","Rute: a genealogia que prepara Davi como o próximo passo na linha messiânica"],"advances":["Inaugura a monarquia israelita — etapa crucial na progressão da revelação rumo ao Rei messiânico","Estabelece o princípio teológico: Deus olha o coração, não a aparência, na eleição de líderes","Demonstra que obediência supera ritual — fundamento para a crítica profética posterior","Apresenta Davi como protótipo do Rei ideal — base para todas as profecias messiânicas davídicas","Mostra que o reino de Deus avança por eleição soberana, não por mérito ou força humana"],"points_to":["Davi, o pastor-rei, aponta para Cristo, o Bom Pastor e Rei eterno (Jo 10; Ap 19:16)","A rejeição de Saul e eleição de Davi prefiguram a rejeição de Israel e eleição do Messias (Mt 21:42)","\"Obedecer é melhor que sacrificar\" aponta para a obediência de Cristo que cumpre toda a lei (Hb 10:5-10)","A unção do Espírito sobre Davi aponta para a unção messiânica plena de Jesus (Lc 4:18)","A vitória de Davi sobre Golias aponta para a vitória de Cristo sobre o pecado e a morte por todo o povo"],"fulfilled_in":["Mt 1:1: Jesus identificado como \"filho de Davi\" — herdeiro da promessa iniciada aqui","Lc 1:32-33: o anjo promete a Maria que Jesus receberá \"o trono de Davi, seu pai\", para sempre","Hb 10:5-10: Cristo cumprindo perfeitamente o princípio de obediência sobre sacrifício","At 13:22: Paulo cita \"um homem segundo o meu coração\" (13:14) aplicando-o tipologicamente a Cristo","Jo 10:11: \"Eu sou o bom pastor\" — Cristo cumprindo o padrão do pastor-rei iniciado em Davi"]},"nt_refs":[{"ot":"1Sm 2:1-10","nt":"Lc 1:46-55","theme":"Cântico de Ana — modelo do Magnificat de Maria"},{"ot":"1Sm 2:35","nt":"Hb 7:24-25","theme":"Sacerdote fiel — cumprido no sacerdócio eterno de Cristo"},{"ot":"1Sm 8:7","nt":"Jo 19:15","theme":"Rejeição do governo de Deus — culminando na rejeição de Cristo"},{"ot":"1Sm 15:22","nt":"Mt 9:13; Hb 10:5-10","theme":"Obediência sobre sacrifício — cumprida em Cristo"},{"ot":"1Sm 16:7","nt":"1Co 1:26-29","theme":"Deus vê o coração, não a aparência"},{"ot":"1Sm 16:13","nt":"Lc 4:18; At 10:38","theme":"Unção do Espírito sobre Davi — unção messiânica de Cristo"},{"ot":"1Sm 17:45-47","nt":"1Co 1:27; Hb 2:14-15","theme":"Vitória pelo fraco em nome do SENHOR"},{"ot":"1Sm 24:6","nt":"1Pe 2:23","theme":"Respeito ao ungido — Cristo não retaliando"}],"timeline":[{"ref":"1Sm 1–3","event":"Nascimento e chamado de Samuel","desc":"Ana ora por um filho e dedica Samuel ao SENHOR. Samuel cresce sob Eli no Tabernáculo. Deus chama Samuel ainda menino — início do ministério profético em meio à corrupção sacerdotal."},{"ref":"1Sm 4–7","event":"Queda da casa de Eli e a arca capturada","desc":"Israel é derrotado, a arca é capturada pelos filisteus, Eli e seus filhos morrem. A arca causa estragos entre os filisteus e é devolvida. Samuel lidera o povo a renovar a fidelidade ao SENHOR."},{"ref":"1Sm 8","event":"Israel pede um rei","desc":"O povo rejeita o governo direto de Deus e pede um rei \"como as outras nações\". Samuel avisa as consequências. Deus instrui Samuel a atender ao pedido como disciplina e ensino."},{"ref":"1Sm 9–11","event":"Unção e primeiras vitórias de Saul","desc":"Saul é ungido secretamente por Samuel, depois publicamente escolhido por sorteio. Vitória inicial sobre os amonitas confirma sua liderança. Início promissor que logo se deteriorará."},{"ref":"1Sm 13","event":"O pecado de Saul em Gilgal","desc":"Saul oferece sacrifício sem esperar Samuel, violando ordem profética. Samuel anuncia: o reino de Saul não permanecerá. Primeira fissura na dinastia de Saul."},{"ref":"1Sm 15","event":"Rejeição definitiva de Saul","desc":"Saul desobedece ao poupar Agague e os melhores rebanhos amalequitas. \"Obedecer é melhor do que sacrificar\" (15:22). Deus rejeita Saul como rei — embora ele continue reinando por anos."},{"ref":"1Sm 16","event":"Unção secreta de Davi","desc":"Samuel é enviado à casa de Jessé. \"O SENHOR não vê como o homem vê\" (16:7). Davi, o mais jovem, é ungido. O Espírito do SENHOR vem sobre ele a partir daquele dia."},{"ref":"1Sm 17","event":"Davi e Golias","desc":"O gigante filisteu desafia Israel por 40 dias. Davi, ainda jovem, enfrenta Golias \"em nome do SENHOR dos Exércitos\" e o vence com uma funda. Vitória que estabelece a fama de Davi."},{"ref":"1Sm 18–20","event":"Amizade com Jônatas e início da perseguição","desc":"Jônatas e Davi fazem aliança de lealdade. Saul, tomado de ciúme e medo, começa a perseguir Davi. Jônatas arrisca a própria vida para proteger o amigo ungido por Deus."},{"ref":"1Sm 21–27","event":"Davi foragido","desc":"Davi foge de Saul por anos, vivendo em cavernas e entre os filisteus. Poupa a vida de Saul duas vezes (24; 26), recusando-se a tomar o trono pela força antes do tempo de Deus."},{"ref":"1Sm 28–31","event":"Morte de Saul em Gilboa","desc":"Saul consulta a médium de En-Dor, desesperado. Os filisteus derrotam Israel em Gilboa. Saul e Jônatas morrem em batalha. O caminho está aberto para o reinado de Davi."}]},"2SM":{"chapters":24,"testament":"AT","context":{"quando":"c. 1010–970 a.C.","paraquem":"Israel sob o reinado consolidado de Davi","historico":"2 Samuel narra o auge e a queda do rei Davi: sua ascensão ao trono unificado, a aliança davídica que estabelece a dinastia messiânica, seu pecado devastador com Bate-Seba, e as consequências que se espalham por sua família e reino pelo resto de sua vida."},"summary":"O livro da aliança davídica e da queda de um grande rei. O clímax teológico do livro é o capítulo 7: Deus promete a Davi um trono eterno — a base de toda esperança messiânica subsequente. Mas o livro também não esconde o pecado de Davi e suas consequências devastadoras, mostrando que mesmo o rei ungido precisa de um Rei maior.","themes":[{"id":"est","order":1,"label":"Estrutura do Livro","color":"#1D9E75","nodes":[{"t":"Ascensão de Davi (1–5)","d":"Lamento por Saul e Jônatas. Guerra civil entre a casa de Saul e Davi. Davi ungido rei de Judá, depois de todo Israel. Conquista de Jerusalém como capital."},{"t":"O auge: a Aliança Davídica (6–10)","d":"A arca trazida a Jerusalém. Davi quer construir um templo — Deus promete construir a Davi uma casa (dinastia) eterna. Vitórias militares consolidam o reino."},{"t":"A queda: pecado e consequências (11–20)","d":"Adultério com Bate-Seba e assassinato de Urias. Natã confronta Davi. Morte do filho. Amnom e Tamar. Rebelião de Absalão. O \"espada nunca se afastará de sua casa\" se cumpre tragicamente."},{"t":"Apêndices finais (21–24)","d":"Fome por causa de Saul. Cântico de Davi (22, paralelo ao Salmo 18). Últimas palavras de Davi. Censo pecaminoso e a praga. Compra da eira de Araúna — local do futuro templo."}]},{"id":"pac","order":2,"label":"A Aliança Davídica (2Sm 7)","color":"#993C1D","nodes":[{"t":"O desejo de Davi de construir um templo","d":"Davi, instalado em palácio de cedro, quer construir uma \"casa\" para Deus. Intenção piedosa — mas Deus tem outro plano: ao invés de Davi construir uma casa para Deus, Deus construirá uma casa (dinastia) para Davi."},{"t":"A promessa central: trono eterno","d":"\"A tua casa e o teu reino serão firmados para sempre diante de ti; o teu trono será estabelecido para sempre\" (NAA 7:16). O clímax teológico de todo o AT histórico — base de toda esperança messiânica."},{"t":"Disciplina sem revogação","d":"\"Quando ele pecar, eu o castigarei... mas a minha misericórdia não se desviará dele\" (NAA 7:14-15). Diferente de Saul, a aliança com Davi é incondicional quanto à dinastia — disciplina não significa rejeição."},{"t":"Pacto incondicional dentro do Pacto da Graça","d":"A aliança davídica não substitui, mas aprofunda o Pacto da Graça iniciado em Gênesis 3:15 e formalizado com Abraão. Agora a semente prometida vem por uma linhagem real específica."}]},{"id":"que","order":3,"label":"A Queda de Davi","color":"#A32D2D","nodes":[{"t":"O pecado com Bate-Seba (11)","d":"\"Na época em que os reis costumavam sair para a guerra\" — Davi fica em casa. Vê Bate-Seba, comete adultério, e depois orquestra o assassinato de Urias para encobrir o pecado."},{"t":"Natã: \"Tu és aquele homem!\" (12:7)","d":"O profeta confronta o rei com uma parábola e depois a aplicação direta. Mesmo o ungido de Deus está sob a lei de Deus — nenhuma autoridade humana está acima do julgamento divino."},{"t":"Arrependimento genuíno (Salmo 51)","d":"Diferente de Saul, que se justificava, Davi se quebranta: \"Pequei contra o SENHOR\" (12:13). O Salmo 51 é a expressão litúrgica desse arrependimento — modelo de contrição genuína na tradição reformada."},{"t":"Consequências que permanecem","d":"O perdão de Deus não anula as consequências temporais: morte do filho, violência dentro da própria família, rebelião de Absalão. Padrão bíblico: perdão e disciplina coexistem."}]},{"id":"fam","order":4,"label":"O Caos na Casa de Davi","color":"#BA7517","nodes":[{"t":"\"A espada nunca se afastará de sua casa\" (12:10)","d":"O julgamento de Natã se cumpre tragicamente: violência sexual (Amnom e Tamar), fratricídio (Absalão mata Amnom), rebelião armada (Absalão contra o próprio pai)."},{"t":"Amnom e Tamar (13)","d":"Amnom estupra sua meia-irmã Tamar. Davi se ira mas não age judicialmente. A inação paterna semeia mais violência — passividade diante do pecado tem consequências geracionais."},{"t":"A rebelião de Absalão (15–18)","d":"Absalão usurpa o afeto do povo e tenta tomar o trono pela força. Davi foge de Jerusalém chorando. Absalão morre pendurado por seus cabelos — ironia trágica de seu próprio orgulho."},{"t":"O lamento de Davi por Absalão (18:33)","d":"\"Meu filho Absalão! Meu filho, meu filho Absalão! Quem me dera que eu tivesse morrido em seu lugar!\" Um dos lamentos mais comoventes da Escritura — amor paternal que sobrevive até a traição."}]},{"id":"rei","order":5,"label":"O Rei Imperfeito que Aponta Além de Si","color":"#185FA5","nodes":[{"t":"Davi: grande mas não suficiente","d":"2 Samuel não esconde os defeitos de Davi — é biografia honesta, não hagiografia. Mesmo o melhor rei humano falha gravemente, demonstrando a necessidade de um Rei perfeito que ainda há de vir."},{"t":"Bondade para com Mefibosete (9)","d":"Davi busca ativamente um descendente de Saul para mostrar hesed \"por amor de Jônatas\" — Mefibosete, aleijado, é trazido à mesa real. Graça imerecida concedida ao inimigo potencial."},{"t":"Justiça e misericórdia em tensão","d":"Davi exerce justiça (vitórias militares, estabelecimento de ordem) e misericórdia (Mefibosete) — mas falha terrivelmente em sua própria casa. O rei ideal precisa unir perfeitamente ambos os atributos."},{"t":"O cântico final de Davi (22)","d":"Davi termina reconhecendo: tudo que alcançou veio do SENHOR, sua rocha e fortaleza. Mesmo o maior rei humano confessa dependência total — apontando para a necessidade de um Salvador."}]},{"id":"tipos","order":6,"label":"Tipos e Profecia de Cristo","color":"#533AB7","nodes":[{"t":"O trono eterno aponta para Cristo","d":"2Sm 7:16 é citado e aludido constantemente no NT como cumprido em Jesus. O \"Filho de Davi\" reina para sempre — não como sucessão dinástica simples, mas como realeza eterna e pessoal de Cristo."},{"t":"\"Eu lhe serei pai, e ele me será filho\" (7:14)","d":"Hebreus 1:5 aplica esta promessa diretamente a Cristo — não apenas a Salomão, mas ao Filho eterno que cumpre definitivamente a relação pai-filho prometida a Davi."},{"t":"Davi como rei que sofre e é restaurado","d":"A fuga de Davi de Absalão, atravessando o Cédron chorando (15:30), ecoa proféticamente a futura travessia de Cristo pelo mesmo vale rumo ao Getsêmani — rei rejeitado por seu próprio povo."},{"t":"Mefibosete como tipo da graça ao pecador","d":"Aleijado, descendente de uma casa rival, sem mérito algum — trazido à mesa do rei \"por amor\" de outro (Jônatas). Tipo da graça que nos traz à mesa de Cristo por amor d'Ele, não por nosso mérito."}]}],"revelation":{"preceding":["1 Samuel: rejeição de Saul e eleição de Davi, \"um homem segundo o coração de Deus\"","Gênesis 49:10: o cetro não se afastaria de Judá — começando a se concretizar na dinastia davídica","Deuteronômio 17:14-20: as leis sobre o rei que Israel deveria ter — agora plenamente em ação"],"advances":["Estabelece a Aliança Davídica — pedra angular de toda a esperança messiânica subsequente","Revela que mesmo o ungido de Deus está sujeito à Sua lei e ao Seu julgamento (Natã confrontando Davi)","Demonstra que disciplina divina e fidelidade ao pacto coexistem — Deus não abandona Sua promessa apesar do pecado","Aprofunda a tensão entre justiça e misericórdia que só será resolvida plenamente na cruz de Cristo","Prepara teológicamente toda a literatura profética posterior sobre o \"filho de Davi\" que há de vir"],"points_to":["O trono eterno prometido a Davi (7:16) aponta diretamente para o reinado eterno de Cristo","A relação pai-filho com o descendente de Davi (7:14) aponta para a filiação eterna de Cristo (Hb 1:5)","O arrependimento de Davi (Salmo 51) aponta para o arrependimento genuíno que a graça produz","A graça a Mefibosete aponta para a graça imerecida que Cristo concede aos pecadores","O sofrimento e exílio de Davi apontam tipologicamente para a rejeição e o sofrimento de Cristo"],"fulfilled_in":["Lc 1:32-33: o anjo Gabriel cita diretamente 2Sm 7 ao anunciar a Maria o reinado eterno de Jesus","At 2:30: Pedro cita a aliança davídica em seu sermão de Pentecostes como cumprida na ressurreição de Cristo","Hb 1:5: a promessa \"eu lhe serei pai\" aplicada diretamente à filiação divina e eterna de Cristo","Rm 1:3-4: Jesus \"nascido da descendência de Davi segundo a carne\" — cumprimento genealógico direto","Ap 22:16: Cristo se identifica como \"a raiz e a geração de Davi\" — síntese final da aliança davídica"]},"nt_refs":[{"ot":"2Sm 7:12-13","nt":"Lc 1:32-33","theme":"Trono eterno prometido — cumprido em Cristo"},{"ot":"2Sm 7:14","nt":"Hb 1:5","theme":"\"Eu lhe serei pai\" — aplicado à filiação de Cristo"},{"ot":"2Sm 7:16","nt":"At 2:30; Ap 22:16","theme":"Casa e reino para sempre — dinastia messiânica eterna"},{"ot":"2Sm 9:7-13","nt":"Ef 2:4-7","theme":"Graça a Mefibosete — figura da graça ao pecador"},{"ot":"2Sm 12:13","nt":"1Jo 1:9","theme":"Confissão e perdão — \"Pequei contra o SENHOR\""},{"ot":"2Sm 15:30","nt":"Jo 18:1","theme":"Davi atravessando o Cédron chorando — eco do Getsêmani"},{"ot":"2Sm 22:2-3","nt":"Hb 2:13","theme":"\"O SENHOR é minha rocha\" — confiança citada por Cristo"},{"ot":"2Sm 23:5","nt":"Hb 13:20","theme":"Aliança eterna e ordenada — cumprida na nova aliança"}],"timeline":[{"ref":"2Sm 1","event":"Lamento por Saul e Jônatas","desc":"Davi recebe a notícia da morte de Saul e Jônatas e compõe um lamento solene — \"Como caíram os poderosos!\" (1:19). Honra os caídos apesar de toda a perseguição que sofreu de Saul."},{"ref":"2Sm 2–4","event":"Guerra civil","desc":"Davi é ungido rei de Judá em Hebrom. Isbosete, filho de Saul, reina sobre o restante de Israel. Anos de guerra entre as duas casas até a morte de Isbosete e a unificação sob Davi."},{"ref":"2Sm 5","event":"Davi rei sobre todo Israel","desc":"As doze tribos ungem Davi rei. Conquista de Jerusalém dos jebuseus, estabelecida como capital política e futura capital religiosa. \"Davi ia crescendo cada vez mais\" (5:10)."},{"ref":"2Sm 6","event":"A arca trazida a Jerusalém","desc":"Davi traz a arca da aliança a Jerusalém com grande celebração. Uzá morre ao tocar a arca indevidamente — santidade de Deus não negociável mesmo em meio à alegria genuína."},{"ref":"2Sm 7","event":"A Aliança Davídica","desc":"Davi deseja construir um templo. Deus, através de Natã, promete construir a Davi uma casa eterna: \"O teu trono será estabelecido para sempre\" (7:16). O clímax teológico do livro."},{"ref":"2Sm 9","event":"Bondade a Mefibosete","desc":"Davi busca um descendente de Jônatas para mostrar hesed. Mefibosete, aleijado dos pés, é trazido à mesa real permanentemente — graça que ultrapassa a lógica política normal."},{"ref":"2Sm 11","event":"Adultério e assassinato","desc":"Davi vê Bate-Seba, comete adultério, e ao descobrir a gravidez, manda matar Urias, seu marido, para encobrir o pecado. O ponto mais baixo da vida de Davi."},{"ref":"2Sm 12","event":"Confronto de Natã e arrependimento","desc":"Natã confronta Davi com a parábola da ovelha. \"Tu és aquele homem!\" Davi se arrepende genuinamente: \"Pequei contra o SENHOR.\" O filho do adultério morre — disciplina dentro do perdão."},{"ref":"2Sm 13","event":"Amnom e Tamar","desc":"Amnom, filho de Davi, estupra sua meia-irmã Tamar. Davi se ira mas não pune. Absalão guarda rancor silenciosamente por dois anos antes de vingar a irmã."},{"ref":"2Sm 15–18","event":"Rebelião e morte de Absalão","desc":"Absalão usurpa o coração do povo e se rebela contra Davi. Davi foge de Jerusalém chorando, atravessando o Cédron. Absalão é morto por Joabe. Lamento devastador de Davi por seu filho."},{"ref":"2Sm 24","event":"O censo pecaminoso","desc":"Davi ordena um censo por orgulho, desafiando a confiança em Deus. Praga atinge Israel. Davi compra a eira de Araúna, oferece sacrifício — o local se tornará o futuro Templo de Salomão."}]},"1RS":{"chapters":22,"testament":"AT","context":{"quando":"c. 970–850 a.C.","paraquem":"Israel sob o reinado de Salomão e depois dividido entre Israel (norte) e Judá (sul)","historico":"1 Reis narra o auge da monarquia unida sob Salomão — incluindo a construção do Templo — seguido pela trágica divisão do reino após sua morte. O livro estabelece o padrão pelo qual todos os reis serão julgados: fidelidade ou infidelidade ao SENHOR."},"summary":"O livro do esplendor e da fragmentação. Salomão constrói o Templo no auge da glória de Israel, mas sua apostasia através de esposas estrangeiras e ídolos divide o reino para sempre. A partir daí, 1 Reis narra reis cada vez mais corruptos no norte, e o ministério extraordinário do profeta Elias confrontando a apostasia de Acabe e Jezabel.","themes":[{"id":"est","order":1,"label":"Estrutura do Livro","color":"#1D9E75","nodes":[{"t":"Salomão: sabedoria e glória (1–11)","d":"Salomão se torna rei. Pede sabedoria. Constrói o Templo. Riqueza e fama internacional (rainha de Sabá). No fim, suas esposas estrangeiras o desviam para a idolatria — apostasia que custará o reino."},{"t":"O reino dividido (12–16)","d":"Roboão, filho de Salomão, perde dez tribos por insensatez política. Jeroboão funda o reino do Norte (Israel) com bezerros de ouro. Sucessão de reis maus em ambos os reinos."},{"t":"O ciclo de Elias (17–22)","d":"Acabe e Jezabel introduzem o culto a Baal em escala nacional. Elias confronta a apostasia: a seca, o Monte Carmelo, Horebe, a vinha de Nabote. Confronto profético no auge da idolatria nacional."}]},{"id":"tem","order":2,"label":"O Templo e a Glória de Deus","color":"#993C1D","nodes":[{"t":"Cumprimento da promessa a Davi","d":"Deus havia dito que o filho de Davi construiria o Templo (2Sm 7:13). Salomão cumpre essa promessa — mas o cumprimento aponta além de si mesmo, pois o verdadeiro Templo eterno ainda está por vir."},{"t":"A glória do SENHOR enche o Templo (8:10-11)","d":"Na dedicação, a nuvem da glória enche o Templo de tal forma que os sacerdotes não conseguem ministrar — eco direto de Êxodo 40. Deus confirma visivelmente Sua presença com Seu povo."},{"t":"A oração de dedicação de Salomão (8)","d":"Salomão reconhece que nem os céus dos céus podem conter a Deus — o Templo é concessão da graça, não limitação divina. Ora pelo perdão futuro de Israel mesmo prevendo sua infidelidade."},{"t":"Condicionalidade da bênção nacional","d":"\"Se você andar diante de mim... então confirmarei o trono do seu reino\" (NAA 9:4-5). Diferente da promessa incondicional da dinastia davídica, a prosperidade do reino depende da fidelidade contínua."}]},{"id":"sab","order":3,"label":"Sabedoria e sua Corrupção","color":"#BA7517","nodes":[{"t":"O pedido de sabedoria (3)","d":"Salomão pede \"um coração sábio e entendido\" em vez de riquezas ou longa vida. Deus se agrada do pedido e concede sabedoria incomparável, além de riqueza e honra não pedidas."},{"t":"O julgamento das duas mães (3:16-28)","d":"A sabedoria de Salomão se manifesta praticamente — discernimento que revela o coração através de uma situação aparentemente impossível. Toda Israel reconhece a sabedoria divina nele."},{"t":"\"O amor por muitas mulheres estrangeiras\" (11:1)","d":"A mesma sabedoria que impressionou nações se corrompe pela desobediência direta à lei (Dt 17:17). Setecentas esposas e trezentas concubinas desviam seu coração para outros deuses."},{"t":"Sabedoria sem guarda do coração é insuficiente","d":"Salomão escreveu Provérbios sobre guardar o coração (Pv 4:23), mas não guardou o próprio. Lição reformada: conhecimento intelectual da verdade não substitui a fidelidade do coração regenerado."}]},{"id":"div","order":4,"label":"A Divisão do Reino","color":"#A32D2D","nodes":[{"t":"Julgamento profetizado e cumprido","d":"Aías, o profeta, já havia anunciado a Jeroboão que dez tribos seriam rasgadas do reino de Salomão por causa da idolatria (11:29-39). A divisão não é acidente político — é juízo divino."},{"t":"A insensatez de Roboão (12)","d":"Roboão rejeita o conselho dos anciãos e segue o conselho dos jovens, aumentando o jugo sobre o povo. Orgulho e imprudência política como instrumentos do juízo soberano de Deus."},{"t":"Os bezerros de ouro de Jeroboão (12:28-30)","d":"Para evitar que o povo voltasse a adorar em Jerusalém, Jeroboão cria um sistema religioso alternativo — pecado que se torna fórmula recorrente: \"o pecado de Jeroboão\" marca todos os reis do Norte."},{"t":"Padrão de avaliação dos reis","d":"A partir daqui, cada rei é avaliado pela mesma régua: \"fez o que era mau aos olhos do SENHOR\" ou ocasionalmente \"o que era reto\". Critério teocêntrico, não pragmático ou político."}]},{"id":"eli","order":5,"label":"Elias: o Profeta Confrontador","color":"#185FA5","nodes":[{"t":"A seca como juízo (17)","d":"Elias anuncia uma seca de três anos e meio sobre Israel por causa da apostasia de Acabe. Deus o sustenta milagrosamente — junto aos corvos, depois com a viúva de Sarepta."},{"t":"O Monte Carmelo (18)","d":"Confronto público entre Elias e 450 profetas de Baal. \"Até quando hesitarão entre dois pensamentos?\" (18:21). O fogo do SENHOR desce e consome o sacrifício — vindicação pública da soberania divina."},{"t":"O \"suave sussurro\" em Horebe (19)","d":"Elias, exausto e desanimado após Carmelo, encontra Deus não no vento, terremoto ou fogo, mas num \"suave e delicado sussurro\" (19:12). Deus às vezes fala não no espetáculo, mas na quietude."},{"t":"A vinha de Nabote (21)","d":"Acabe e Jezabel orquestram o assassinato de Nabote para roubar sua vinha. Elias confronta: \"Você matou e também tomou posse?\" (21:19). Profeta como consciência moral da nação diante do poder corrupto."}]},{"id":"tipos","order":6,"label":"Tipos e Apontamentos para Cristo","color":"#533AB7","nodes":[{"t":"O Templo aponta para Cristo","d":"O Templo onde a glória de Deus habitava prefigura Cristo, em quem \"habita corporalmente toda a plenitude da Divindade\" (Cl 2:9) — e a Igreja como novo templo do Espírito (1Co 3:16)."},{"t":"Salomão e a maior Sabedoria","d":"\"Eis aqui quem é maior do que Salomão\" (NAA Mt 12:42) — Jesus se identifica como cumprimento e superação da sabedoria salomônica. A rainha de Sabá veio ouvir Salomão; multidões vêm ouvir Cristo."},{"t":"Elias como precursor","d":"O ministério de Elias — chamando à conversão, confrontando a apostasia — prefigura João Batista, que viria \"no espírito e poder de Elias\" (Lc 1:17) preparando o caminho do Messias."},{"t":"O reino dividido aponta para a necessidade de unidade em Cristo","d":"A fratura entre Israel e Judá ilustra o efeito do pecado dividindo o que Deus uniu. Cristo, o verdadeiro Rei, reunirá Seu povo disperso em um só rebanho (Jo 10:16; Ef 2:14)."}]}],"revelation":{"preceding":["2 Samuel: a Aliança Davídica prometendo um trono eterno (7:16) — agora testada na sucessão real","Deuteronômio: as leis sobre o rei (17:14-20) explicitamente violadas por Salomão (muitas esposas, riqueza excessiva)","Êxodo: o padrão do Tabernáculo e a glória que o enchia — agora cumprido arquitetonicamente no Templo"],"advances":["Cumpre a promessa de que o filho de Davi construiria a \"casa\" para o nome do SENHOR (2Sm 7:13)","Demonstra que mesmo a maior sabedoria humana é insuficiente sem fidelidade de coração","Revela o padrão teocêntrico pelo qual toda a história subsequente de Israel será julgada","Estabelece o ministério profético como voz de Deus confrontando reis e nações apóstatas","Prepara a necessidade urgente de um Rei que una perfeitamente sabedoria e fidelidade — o que Salomão não conseguiu"],"points_to":["O Templo, lugar da glória de Deus, aponta para Cristo como o verdadeiro Templo (Jo 2:19-21)","A sabedoria de Salomão aponta para Cristo como a Sabedoria de Deus encarnada (1Co 1:24,30)","O ministério de Elias prefigura o ministério de João Batista, precursor do Messias (Ml 4:5-6; Lc 1:17)","A condicionalidade da bênção sob Salomão contrasta com a graça incondicional que Cristo oferece","A divisão do reino aponta para a necessidade de Cristo como o único Rei capaz de unir Seu povo definitivamente"],"fulfilled_in":["Mt 12:42: Jesus declarado maior que Salomão — cumprimento e superação da sabedoria do AT","Jo 2:19-21: Cristo identificando Seu próprio corpo como o verdadeiro Templo","Cl 2:9: \"Nele habita corporalmente toda a plenitude da Divindade\" — cumprimento pleno da glória do Templo","Lc 1:17: João Batista vindo \"no espírito e poder de Elias\" — continuidade tipológica direta","Mt 17:3: Elias aparece com Moisés na Transfiguração, conversando com Cristo sobre Sua partida (cruz)"]},"nt_refs":[{"ot":"1Rs 3:9-12","nt":"Tg 1:5","theme":"Pedir sabedoria a Deus — princípio aplicado universalmente"},{"ot":"1Rs 8:27","nt":"At 7:48-49","theme":"Deus não habita em templos feitos por mãos"},{"ot":"1Rs 8:10-11","nt":"Jo 1:14","theme":"A glória enchendo o Templo — o Verbo habitando entre nós"},{"ot":"1Rs 10:1-13","nt":"Mt 12:42","theme":"Rainha de Sabá e Salomão — eclipsados por Cristo"},{"ot":"1Rs 11:4-8","nt":"1Co 10:6-12","theme":"Apostasia de Salomão como advertência"},{"ot":"1Rs 17:1","nt":"Tg 5:17-18","theme":"Oração de Elias e a seca — exemplo de oração eficaz"},{"ot":"1Rs 18:21","nt":"Mt 6:24","theme":"\"Até quando hesitarão?\" — servir a dois senhores"},{"ot":"1Rs 19:10-18","nt":"Rm 11:2-5","theme":"Os sete mil que não dobraram os joelhos — remanescente fiel"},{"ot":"1Rs 19:12","nt":"1Co 14:33","theme":"O suave sussurro — Deus de paz, não de confusão"}],"timeline":[{"ref":"1Rs 1–2","event":"Salomão se torna rei","desc":"Adonias tenta usurpar o trono. Davi, já idoso, garante que Salomão seja ungido rei. Davi morre, deixando instruções finais. Salomão consolida o poder eliminando rivais."},{"ref":"1Rs 3","event":"O pedido de sabedoria","desc":"Em Gibeão, Deus aparece a Salomão em sonho e pergunta o que ele deseja. Salomão pede sabedoria para governar. Deus concede sabedoria incomparável, além de riqueza e honra."},{"ref":"1Rs 5–8","event":"Construção e dedicação do Templo","desc":"Sete anos de construção com ajuda de Hirão de Tiro. Na dedicação, a glória do SENHOR enche o Templo. Salomão ora pedindo que Deus ouça as orações dirigidas a esse lugar."},{"ref":"1Rs 10","event":"A rainha de Sabá","desc":"A rainha viaja para testar a sabedoria de Salomão com perguntas difíceis. Fica maravilhada com sua sabedoria e riqueza, reconhecendo a bênção do SENHOR sobre Israel."},{"ref":"1Rs 11","event":"Apostasia de Salomão","desc":"Setecentas esposas e trezentas concubinas, muitas estrangeiras, desviam o coração de Salomão para outros deuses. Deus anuncia que o reino será rasgado — mas não no tempo de Salomão, por amor a Davi."},{"ref":"1Rs 12","event":"Divisão do reino","desc":"Roboão segue o conselho insensato dos jovens. Dez tribos se rebelam e seguem Jeroboão, formando o reino do Norte (Israel). Jeroboão estabelece bezerros de ouro em Betel e Dã."},{"ref":"1Rs 16–17","event":"Acabe, Jezabel e o início do ministério de Elias","desc":"Acabe se casa com Jezabel, introduz o culto a Baal em escala nacional — \"fez mais para irritar o SENHOR... do que todos os reis de Israel antes dele\" (16:33). Elias anuncia a seca."},{"ref":"1Rs 18","event":"O Monte Carmelo","desc":"Confronto entre Elias e 450 profetas de Baal. O fogo do SENHOR consome o sacrifício de Elias mesmo encharcado de água. O povo clama: \"O SENHOR é o Deus!\" Os profetas de Baal são executados."},{"ref":"1Rs 19","event":"Elias em Horebe","desc":"Fugindo de Jezabel, exausto e desanimado, Elias encontra Deus não no vento, terremoto ou fogo, mas num suave sussurro. Recebe nova missão e o chamado de Eliseu como sucessor."},{"ref":"1Rs 21","event":"A vinha de Nabote","desc":"Jezabel orquestra falsas testemunhas para condenar Nabote à morte e roubar sua vinha para Acabe. Elias confronta o rei com julgamento divino sobre toda a sua casa."},{"ref":"1Rs 22","event":"Morte de Acabe","desc":"Acabe vai à batalha disfarçado, ignorando a profecia de Micaías, e é morto por uma flecha \"ao acaso\". Os cães lambem seu sangue, cumprindo a palavra de Elias (21:19)."}]},"2RS":{"chapters":25,"testament":"AT","context":{"quando":"c. 850–586 a.C.","paraquem":"Os dois reinos divididos, Israel (norte) e Judá (sul), até suas respectivas quedas","historico":"2 Reis narra o declínio final e a queda de ambos os reinos: Israel cai para a Assíria em 722 a.C.; Judá, apesar de avivamentos pontuais sob Ezequias e Josias, cai para a Babilônia em 586 a.C. O Templo é destruído. O livro termina com Israel no exílio — mas com um lampejo de esperança final."},"summary":"O livro do juízo cumprido. 2 Reis documenta a trágica mas justa queda de ambos os reinos por causa da idolatria persistente. O ministério de Eliseu continua a obra de Elias com sinais de poder e graça. Avivamentos sob Ezequias e Josias atrasam mas não revertem o julgamento. O exílio babilônico cumpre as advertências do pacto desde Deuteronômio — mas o livro termina com um sinal de esperança que aponta para a fidelidade futura de Deus.","themes":[{"id":"est","order":1,"label":"Estrutura do Livro","color":"#1D9E75","nodes":[{"t":"Eliseu e os dois reinos (1–17)","d":"Ministério de Eliseu com numerosos milagres. Reis alternados de Israel e Judá. Queda de Israel (reino do Norte) para a Assíria em 722 a.C. (17). Israel é levado ao exílio permanentemente."},{"t":"Os últimos reis de Judá (18–25)","d":"Reinados de Ezequias e Josias trazem reformas e avivamento. Mas a apostasia de Manassés selou o destino de Judá. Queda final de Jerusalém e do Templo para a Babilônia em 586 a.C."}]},{"id":"eli","order":2,"label":"Eliseu: Graça em Dobro","color":"#993C1D","nodes":[{"t":"\"Porção dobrada do teu espírito\" (2:9)","d":"Eliseu pede uma porção dobrada do espírito de Elias antes de sua partida — não ambição pessoal, mas o direito do primogênito espiritual, pedindo capacidade para continuar a obra profética."},{"t":"Milagres de provisão e cura","d":"Azeite multiplicado para a viúva (4), ressurreição do filho da sunamita (4), cura de Naamã, o leproso sírio (5) — o ministério de Eliseu enfatiza graça, provisão e restauração mais que confronto."},{"t":"Naamã: graça a um estrangeiro inimigo","d":"Um general sírio, inimigo de Israel, é curado de lepra através da fé simples em obedecer (mergulhar sete vezes no Jordão). Jesus cita este episódio (Lc 4:27) como exemplo de graça além das fronteiras de Israel."},{"t":"Os exércitos invisíveis (6:17)","d":"\"SENHOR, abre os olhos dele, para que veja\" — Eliseu mostra ao seu servo os cavalos e carros de fogo cercando-os para proteção. Lembrete da realidade espiritual invisível por trás dos eventos visíveis."}]},{"id":"qui","order":3,"label":"A Queda de Israel (Reino do Norte)","color":"#A32D2D","nodes":[{"t":"O diagnóstico teológico (17:7-23)","d":"O capítulo 17 oferece a explicação teológica mais extensa de toda a Bíblia histórica para a queda de uma nação: idolatria persistente, rejeição dos profetas, endurecimento do coração apesar de repetidos avisos."},{"t":"\"Andaram nos costumes das nações\" (17:8)","d":"Israel adotou os costumes religiosos cananeus que Deus havia explicitamente ordenado evitar (Lv 18:3; Dt 18:9). Sincretismo religioso como causa raiz da apostasia nacional."},{"t":"Nenhum rei bom no Norte","d":"Diferente de Judá, que teve reis como Ezequias e Josias, nenhum dos dezenove reis de Israel (Norte) recebe avaliação positiva. O \"pecado de Jeroboão\" se perpetua até o fim."},{"t":"Cumprimento exato das advertências","d":"A queda de Israel cumpre literalmente as maldições do pacto anunciadas em Levítico 26 e Deuteronômio 28 — exílio, dispersão, perda da terra. Deus é fiel até em Seus juízos anunciados."}]},{"id":"avi","order":4,"label":"Avivamentos: Ezequias e Josias","color":"#BA7517","nodes":[{"t":"Ezequias: reforma e fé na crise (18–20)","d":"Remove os altos, quebra a serpente de bronze que havia se tornado ídolo, confia em Deus diante do cerco assírio de Senaqueribe. \"Não houve outro como ele entre todos os reis de Judá\" (18:5)."},{"t":"A oração de Ezequias e a libertação (19)","d":"Diante da ameaça assíria, Ezequias estende a carta blasfema diante do SENHOR no Templo e ora. Deus responde com a destruição milagrosa do exército assírio em uma única noite (19:35)."},{"t":"Josias: o livro da lei reencontrado (22–23)","d":"Durante reparos no Templo, o Livro da Lei é encontrado, esquecido por gerações. Josias rasga suas vestes em arrependimento e lidera a reforma religiosa mais radical da história de Judá."},{"t":"Avivamento que atrasa mas não reverte o juízo","d":"Apesar da fidelidade pessoal de Josias, Deus já havia decretado o juízo sobre Judá por causa de Manassés (23:26-27). A fidelidade individual não anula consequências corporativas já decretadas — princípio sóbrio sobre pecado nacional."}]},{"id":"exi","order":5,"label":"O Exílio e a Fidelidade do Pacto","color":"#185FA5","nodes":[{"t":"Manassés: o pior rei de Judá (21)","d":"Reverte todas as reformas de Ezequias, derrama sangue inocente, prática feitiçaria e até sacrifica seu próprio filho. Sua apostasia é identificada como causa decisiva da queda futura de Judá."},{"t":"A queda de Jerusalém (25)","d":"Nabucodonosor sitia Jerusalém. O Templo de Salomão é incendiado e destruído. O rei Zedequias é cegado após ver seus filhos mortos. O povo é levado ao exílio babilônico — fim da monarquia davídica visível."},{"t":"Cumprimento da maldição do pacto","d":"O exílio cumpre exatamente as maldições anunciadas séculos antes em Deuteronômio 28:36-37,49-68. Deus não falha em cumprir nem as bênçãos nem as maldições prometidas — Sua palavra é absolutamente confiável."},{"t":"Disciplina, não abandono final","d":"O exílio é disciplina dentro do Pacto da Graça, não revogação. A Aliança Davídica permanecia incondicional quanto à dinastia (2Sm 7:14-15) — disciplina temporal não anula promessa eterna."}]},{"id":"esp","order":6,"label":"O Sinal de Esperança Final","color":"#533AB7","nodes":[{"t":"Joaquim libertado da prisão (25:27-30)","d":"O livro termina com o rei exilado Joaquim sendo libertado da prisão babilônica e recebendo honra na mesa do rei Evil-Merodaque. Pequeno sinal de que a linhagem davídica não foi extinta."},{"t":"A linhagem real preservada no exílio","d":"Mesmo no cativeiro, a \"casa de Davi\" continua existindo — preparando o terreno genealógico para o retorno e, em última instância, para o nascimento do verdadeiro Filho de Davi, o Messias."},{"t":"Esperança em meio ao juízo","d":"2 Reis termina de forma sombria mas não desesperançada. O Deus que cumpriu as maldições do pacto é o mesmo Deus que prometeu restauração através dos profetas (Jr 31; Ez 36-37)."},{"t":"Preparação para o exílio e retorno","d":"2 Reis prepara teológicamente toda a literatura profética do exílio (Jeremias, Ezequiel, Daniel) e pós-exílio (Esdras, Neemias, Ageu, Zacarias) — e, em última análise, a vinda do verdadeiro Rei."}]}],"revelation":{"preceding":["1 Reis: o início da divisão do reino e a apostasia institucionalizada por Jeroboão","Deuteronômio 28: as bênçãos e maldições do pacto que agora se cumprem literalmente","2 Samuel 7: a Aliança Davídica incondicional que sustenta a esperança apesar do juízo nacional"],"advances":["Demonstra exaustivamente que Deus cumpre fielmente tanto bênçãos quanto maldições do pacto","Aprofunda a teologia da graça através do ministério gracioso de Eliseu, incluindo a gentios como Naamã","Revela que avivamentos pessoais (Ezequias, Josias) não revertem juízo corporativo já decretado","Prepara a literatura profética subsequente sobre exílio, juízo e esperança de restauração","Mantém viva, mesmo no exílio, a expectativa messiânica através da preservação da linhagem davídica"],"points_to":["A cura de Naamã aponta para a graça de Cristo alcançando além das fronteiras de Israel (Lc 4:27)","Os exércitos invisíveis de fogo apontam para a proteção angélica que cerca o povo de Cristo (Hb 1:14)","A destruição do Templo aponta para a necessidade de um Templo que não pode ser destruído — o corpo de Cristo","A preservação da linhagem davídica no exílio aponta para o nascimento do Messias mesmo em circunstâncias humildes","O juízo sobre a idolatria persistente aponta para a necessidade de um coração novo que só Cristo pode dar (Ez 36:26)"],"fulfilled_in":["Lc 4:27: Jesus cita a cura de Naamã como precedente da graça de Deus aos gentios","Mt 1:11-12: a genealogia de Cristo passa explicitamente pelo exílio babilônico, confirmando a preservação da linhagem","Jo 2:19-21: Cristo identificando Seu corpo como o Templo verdadeiro e indestrutível","Hb 8:8-12: a profecia da Nova Aliança que resolve definitivamente o ciclo de apostasia narrado em 2 Reis","Ap 21:22: na Nova Jerusalém não há Templo, \"pois o Senhor Deus Todo-Poderoso e o Cordeiro são o seu templo\""]},"nt_refs":[{"ot":"2Rs 2:11","nt":"Mt 17:3; Lc 9:30-31","theme":"Elias levado ao céu — aparece na Transfiguração"},{"ot":"2Rs 4:42-44","nt":"Mt 14:19-21","theme":"Multiplicação de pães — prefiguração da multiplicação de Cristo"},{"ot":"2Rs 5:1-14","nt":"Lc 4:27","theme":"Cura de Naamã — graça de Deus aos gentios"},{"ot":"2Rs 6:17","nt":"Hb 1:14","theme":"Exércitos invisíveis de proteção — ministério angélico"},{"ot":"2Rs 18:4","nt":"Jo 3:14-15","theme":"Serpente de bronze destruída — tipo cumprido, não objeto de culto"},{"ot":"2Rs 19:14-19","nt":"Fp 4:6-7","theme":"Oração de Ezequias na crise — modelo de confiança em Deus"},{"ot":"2Rs 22:8-13","nt":"2Tm 3:16-17","theme":"Redescoberta da Palavra — poder transformador da Escritura"},{"ot":"2Rs 25:27-30","nt":"Mt 1:11-12","theme":"Joaquim no exílio — linhagem davídica preservada até Cristo"}],"timeline":[{"ref":"2Rs 1–2","event":"Translação de Elias e início de Eliseu","desc":"Elias é levado ao céu em um redemoinho, em carro e cavalos de fogo. Eliseu recebe porção dobrada do espírito de Elias e assume o ministério profético, abrindo as águas do Jordão como sinal de confirmação."},{"ref":"2Rs 4–5","event":"Milagres de Eliseu","desc":"Azeite multiplicado para a viúva endividada. Ressurreição do filho da sunamita. Cura de Naamã, o general sírio leproso, através da simples obediência de mergulhar sete vezes no Jordão."},{"ref":"2Rs 6–7","event":"Cerco de Samaria e libertação","desc":"Os exércitos invisíveis de fogo protegem Eliseu e seu servo. Cerco sírio causa fome extrema em Samaria. Deus dispersa milagrosamente o exército sírio, trazendo abundância repentina."},{"ref":"2Rs 9–10","event":"Jeú e o juízo sobre a casa de Acabe","desc":"Jeú é ungido para destruir a dinastia de Acabe. Mata Jorão, Jezabel é jogada da janela e devorada por cães — cumprindo literalmente a profecia de Elias sobre a vinha de Nabote."},{"ref":"2Rs 17","event":"Queda de Israel (Reino do Norte)","desc":"Samaria cai para a Assíria sob Salmaneser. Israel é deportado permanentemente. O capítulo oferece o diagnóstico teológico completo: idolatria persistente apesar de repetidos avisos proféticos."},{"ref":"2Rs 18–19","event":"Ezequias e a invasão assíria","desc":"Senaqueribe sitia Jerusalém e blasfema contra o SENHOR. Ezequias ora no Templo. Deus envia Seu anjo que mata 185.000 soldados assírios em uma noite — libertação miraculosa."},{"ref":"2Rs 20","event":"Doença e cura de Ezequias","desc":"Ezequias adoece de morte, ora, e Deus acrescenta quinze anos à sua vida com o sinal da sombra retrocedendo no relógio solar. Posteriormente erra ao mostrar tesouros aos enviados babilônicos."},{"ref":"2Rs 21","event":"Manassés: a pior apostasia","desc":"Reverte as reformas de Ezequias, reconstrói os altos, prática feitiçaria, derrama sangue inocente em Jerusalém. Sua apostasia é identificada como a causa decisiva do juízo final sobre Judá."},{"ref":"2Rs 22–23","event":"Josias e a grande reforma","desc":"O Livro da Lei é redescoberto durante reparos no Templo. Josias rasga as vestes, lidera a maior reforma religiosa da história de Judá, celebra a Páscoa \"como não se celebrava desde os dias dos juízes\"."},{"ref":"2Rs 24–25","event":"Queda final de Jerusalém","desc":"Nabucodonosor sitia e destrói Jerusalém em três fases (605, 597, 586 a.C.). O Templo de Salomão é incendiado. Zedequias é cegado. O povo é deportado para a Babilônia — fim da monarquia visível."},{"ref":"2Rs 25:27-30","event":"Libertação de Joaquim","desc":"Após 37 anos de prisão, o rei exilado Joaquim é libertado e honrado na mesa do rei babilônico. Sinal final de esperança: a linhagem davídica sobrevive, preparando o caminho para o Messias."}]},"1CR":{"chapters":29,"testament":"AT","context":{"quando":"Eventos: c. 1010–970 a.C.; escrito provavelmente no período pós-exílico (c. 450-400 a.C.)","paraquem":"A comunidade judaica retornada do exílio babilônico, reconstruindo sua identidade nacional e religiosa","historico":"Escrito séculos depois de 2 Samuel, 1 Crônicas reconta a história de Davi para uma geração pós-exílica que precisa de esperança: o Templo será reconstruído, o culto restaurado, e a promessa davídica ainda permanece válida apesar do exílio."},"summary":"A releitura sacerdotal e teológica da história davídica. Onde Samuel-Reis narra com honestidade brutal os pecados de Davi, Crônicas seleciona, enfatiza e relê a mesma história focando no culto, no Templo e na fidelidade da aliança — uma mensagem de esperança para um povo que precisava acreditar que a promessa de Deus a Davi continuava de pé mesmo após o exílio.","themes":[{"id":"est","order":1,"label":"Estrutura do Livro","color":"#1D9E75","nodes":[{"t":"Genealogias (1–9)","d":"Nove capítulos de genealogias, de Adão até o retorno do exílio. Não é lista árida — é teologia: conecta a comunidade pós-exílica à totalidade da história redentora desde a criação."},{"t":"Reinado de Davi (10–29)","d":"Morte de Saul (resumida). Davi rei sobre Israel. A arca trazida a Jerusalém. A Aliança Davídica (17). Preparativos extensos para o Templo que Salomão construirá."}]},{"id":"gen","order":2,"label":"Genealogias como Teologia","color":"#993C1D","nodes":[{"t":"De Adão a Israel: continuidade da história redentora","d":"As genealogias conectam deliberadamente a comunidade pós-exílica a toda a história bíblica anterior — desde a criação, passando pelos patriarcas, até a monarquia. Identidade fundamentada na continuidade do pacto."},{"t":"Destaque à tribo de Judá e à linhagem davídica","d":"Judá recebe atenção especial (cap. 2-4) — a tribo da promessa messiânica (Gn 49:10). As genealogias preparam estruturalmente o foco em Davi que dominará o restante do livro."},{"t":"Os levitas e o sacerdócio (cap. 6)","d":"Atenção extensa à linhagem levítica e sacerdotal — reflete a preocupação central de Crônicas com o culto apropriado, fundamental para a reconstrução religiosa pós-exílica."},{"t":"Esperança através da memória","d":"Para um povo que perdeu terra, templo e monarquia, lembrar a genealogia completa era um ato de fé: Deus não esqueceu Seu povo, e a linha da promessa continua intacta apesar do exílio."}]},{"id":"cul","order":3,"label":"Ênfase no Culto e na Adoração","color":"#BA7517","nodes":[{"t":"Organização levítica detalhada (23–26)","d":"Davi organiza extensivamente os levitas, sacerdotes, músicos e porteiros do Templo antes mesmo de sua construção — ênfase crônica em adoração ordenada e centralizada conforme a vontade de Deus."},{"t":"A música e os músicos do Templo","d":"Crônicas dedica atenção incomum aos músicos levitas (Asafe, Hemã, Jedutum) — a adoração com música era vista como ministério sagrado, não mero ornamento, refletindo a centralidade do louvor na vida do pacto."},{"t":"O cântico de ação de graças de Davi (16)","d":"Quando a arca chega a Jerusalém, Davi compõe um salmo de louvor extenso (paralelo aos Salmos 105, 96, 106) — adoração centrada na fidelidade histórica de Deus às Suas promessas."},{"t":"Davi como organizador do culto, não apenas guerreiro","d":"Diferente de Samuel-Reis, que enfatiza as batalhas de Davi, Crônicas o retrata primariamente como o grande organizador da adoração — moldando como a geração pós-exílica deveria pensar sobre liderança piedosa."}]},{"id":"sel","order":4,"label":"Seleção Teológica: O que Crônicas Omite","color":"#A32D2D","nodes":[{"t":"O pecado com Bate-Seba: omitido","d":"Crônicas não menciona o adultério e assassinato de Urias — não para encobrir o pecado (a Escritura já o registrou em 2 Samuel), mas porque o propósito teológico aqui é diferente: focar na fidelidade do pacto, não repetir tudo."},{"t":"A rebelião de Absalão: omitida","d":"Da mesma forma, o caos familiar de 2 Samuel 13-20 não aparece. Crônicas seleciona criteriosamente o material que serve ao seu propósito: encorajar uma comunidade fragilizada com a fidelidade de Deus."},{"t":"Princípio hermenêutico de seleção bíblica","d":"A omissão não é desonestidade — é seleção teológica legítima. Cada autor bíblico, sob inspiração, escolhe e organiza material conforme o propósito que Deus lhe revelou para aquele público específico."},{"t":"Complementaridade com Samuel-Reis","d":"Crônicas não substitui, complementa Samuel-Reis. Lendo os dois juntos, temos tanto a honestidade brutal do pecado humano quanto a ênfase teológica na fidelidade inabalável de Deus ao pacto."}]},{"id":"pac","order":5,"label":"A Aliança Davídica Reafirmada (1Cr 17)","color":"#185FA5","nodes":[{"t":"Paralelo direto com 2 Samuel 7","d":"1 Crônicas 17 repete quase verbatim a promessa de 2 Samuel 7 — propositalmente. Para a geração pós-exílica sem rei davídico reinante, essa repetição é reafirmação: a promessa continua válida."},{"t":"\"Edificarei tua casa\" reafirmado ao exílio","d":"Mesmo sem trono visível, sem dinastia reinante, a comunidade pós-exílica recebe a confirmação literária de que a promessa do trono eterno de Davi não foi anulada pelo exílio — apenas adiada em seu cumprimento visível."},{"t":"Davi reconhece a grandeza do pacto (17:16-27)","d":"A resposta de adoração de Davi à promessa é registrada com ênfase: humildade diante da graça imerecida de uma promessa que ultrapassa toda compreensão humana sobre o que ele merecia."},{"t":"Fundamento de esperança messiânica pós-exílica","d":"Ao reler esta promessa séculos depois, sem rei davídico no trono, a comunidade é apontada implicitamente para um cumprimento futuro — preparando teológicamente a esperança messiânica que floresceria nos profetas e culminaria em Cristo."}]},{"id":"tipos","order":6,"label":"Tipos e Apontamentos para Cristo","color":"#533AB7","nodes":[{"t":"A genealogia como preparação para Mateus 1","d":"As extensas genealogias de Crônicas fornecem a base estrutural para a genealogia de Cristo em Mateus 1 — conectando explicitamente Jesus à linhagem davídica através de Judá, cumprindo Gênesis 49:10."},{"t":"O Templo idealizado aponta para Cristo","d":"Os preparativos minuciosos de Davi para o Templo (mesmo sem poder construí-lo) prefiguram a preparação de toda a história do AT para a vinda de Cristo, o verdadeiro Templo (Jo 2:21)."},{"t":"Davi como organizador da adoração aponta para Cristo, o Sumo Sacerdote","d":"A preocupação de Davi com adoração ordenada e centralizada aponta para Cristo, que organiza e medeia perfeitamente a adoração de Seu povo no Templo celestial (Hb 8:1-2)."},{"t":"A reafirmação do pacto ao exílio aponta para a fidelidade de Deus em Cristo","d":"Assim como Crônicas reafirma a aliança davídica a um povo exilado e sem rei, o evangelho reafirma a fidelidade de Deus a Seu povo disperso — cumprida definitivamente no reinado eterno de Cristo (Lc 1:32-33)."}]}],"revelation":{"preceding":["2 Samuel: a narrativa original da Aliança Davídica e do reinado de Davi, com toda sua complexidade moral","2 Reis: o exílio babilônico que parecia ter encerrado a esperança da dinastia davídica","Gênesis 49:10: a promessa de que o cetro não se afastaria de Judá — fundamento genealógico que Crônicas detalha"],"advances":["Reafirma teológicamente, para uma geração pós-exílica, que a Aliança Davídica permanece válida","Estabelece a centralidade da adoração ordenada e do culto como prioridade para a comunidade restaurada","Conecta toda a história de Israel, desde Adão, em uma narrativa coerente de propósito redentor","Prepara estruturalmente a genealogia que o NT usará para estabelecer a legitimidade messiânica de Cristo","Demonstra que a seleção teológica de ênfase, sob inspiração, serve a propósitos pastorais legítimos e complementares"],"points_to":["A reafirmação da Aliança Davídica (17) aponta para o cumprimento final no reinado eterno de Cristo","As genealogias detalhadas apontam para a genealogia de Cristo em Mateus 1, fundamentando Sua legitimidade messiânica","A ênfase na adoração organizada aponta para Cristo como mediador perfeito da adoração de Seu povo","A esperança oferecida a um povo sem rei visível aponta para a fé que sustenta a Igreja na espera do retorno de Cristo","Os preparativos de Davi para o Templo, que ele não pôde construir, apontam para Cristo como o verdadeiro construtor e fundamento do Templo eterno (Ef 2:20-22)"],"fulfilled_in":["Mt 1:1-17: a genealogia de Cristo construída sobre a estrutura genealógica estabelecida em 1 Crônicas","Lc 1:32-33: o cumprimento final da promessa reafirmada em 1Cr 17 — o trono eterno dado a Jesus","Hb 8:1-2: Cristo como Sumo Sacerdote do verdadeiro santuário, cumprindo o que os preparativos de Davi apenas prefiguravam","Ef 2:20-22: a Igreja edificada sobre o fundamento dos apóstolos e profetas, tendo Cristo como pedra angular — Templo vivo e eterno","Ap 22:16: Cristo identificado como \"a raiz e a geração de Davi\" — síntese final de toda a teologia genealógica e davídica de Crônicas"]},"nt_refs":[{"ot":"1Cr 1–9","nt":"Mt 1:1-17; Lc 3:23-38","theme":"Genealogias — base estrutural para a genealogia de Cristo"},{"ot":"1Cr 16:34","nt":"2Co 9:15","theme":"\"Porque o SENHOR é bom\" — gratidão pela graça inefável"},{"ot":"1Cr 17:11-14","nt":"Lc 1:32-33","theme":"Aliança Davídica reafirmada — cumprida no reinado eterno de Cristo"},{"ot":"1Cr 17:13","nt":"Hb 1:5","theme":"\"Eu lhe serei pai\" — aplicado à filiação divina de Cristo"},{"ot":"1Cr 21:1","nt":"Tg 1:13-14","theme":"Satanás incita o censo — origem espiritual da tentação ao pecado"},{"ot":"1Cr 28:9","nt":"1Co 4:5","theme":"Deus examina o coração — princípio aplicado ao juízo final"},{"ot":"1Cr 29:11","nt":"Mt 6:13","theme":"\"Teu é o reino, o poder e a glória\" — eco na Oração do Senhor"},{"ot":"1Cr 29:14","nt":"2Co 8:9","theme":"\"Tudo vem de ti\" — princípio da graça precedendo toda dádiva"}],"timeline":[{"ref":"1Cr 1–9","event":"Genealogias de Adão a Israel","desc":"Nove capítulos conectando a comunidade pós-exílica a toda a história redentora desde a criação. Destaque para Judá (linhagem messiânica) e Levi (linhagem sacerdotal)."},{"ref":"1Cr 10","event":"Morte de Saul (resumida)","desc":"Crônicas narra brevemente a morte de Saul, com avaliação teológica direta: \"Saul morreu por causa da infidelidade que cometeu contra o SENHOR\" (10:13). Transição rápida para Davi."},{"ref":"1Cr 11–12","event":"Davi se torna rei sobre todo Israel","desc":"Todas as tribos se reúnem para ungir Davi rei, reconhecendo que o SENHOR já o havia designado. Lista extensa dos \"valentes de Davi\" — ênfase no apoio unânime e providencial ao novo rei."},{"ref":"1Cr 13–16","event":"A arca trazida a Jerusalém","desc":"Primeira tentativa falha (morte de Uzá). Segunda tentativa bem-sucedida, com grande celebração. Davi compõe um extenso cântico de ação de graças (16) centrado na fidelidade histórica de Deus."},{"ref":"1Cr 17","event":"A Aliança Davídica reafirmada","desc":"Davi deseja construir o Templo; Deus promete construir a Davi uma casa eterna. Paralelo quase literal com 2 Samuel 7 — reafirmação intencional para a geração pós-exílica sem rei reinante."},{"ref":"1Cr 21","event":"O censo pecaminoso","desc":"Satanás incita Davi a fazer um censo por orgulho. Praga atinge Israel. Davi compra a eira de Araúna e oferece sacrifício — o local se tornará o futuro Monte do Templo."},{"ref":"1Cr 22","event":"Preparativos para o Templo","desc":"Embora proibido de construir o Templo por ter derramado sangue em guerra, Davi reúne materiais extensos — ouro, prata, bronze, ferro, madeira — e instrui Salomão a completar a obra."},{"ref":"1Cr 23–26","event":"Organização levítica e do culto","desc":"Davi organiza detalhadamente os levitas, sacerdotes, músicos e porteiros para o serviço do Templo. Ênfase extensa na adoração ordenada — característica central da teologia de Crônicas."},{"ref":"1Cr 28–29","event":"Últimas palavras de Davi e morte","desc":"Davi exorta Salomão publicamente a construir o Templo com coração íntegro. Oferendas voluntárias abundantes do povo. Oração final de Davi (29:10-19). Salomão é ungido rei; Davi morre em paz, \"cheio de dias, riquezas e honra\"."}]},"2CR":{"chapters":36,"testament":"AT","context":{"quando":"Eventos: c. 970–538 a.C.; escrito no período pós-exílico (c. 450-400 a.C.), provavelmente pelo mesmo autor de 1 Crônicas e Esdras","paraquem":"A comunidade judaica retornada do exílio, precisando de modelo de reforma religiosa e esperança de restauração","historico":"2 Crônicas narra do reinado de Salomão até o decreto de Ciro permitindo o retorno do exílio — cobrindo o mesmo período de 1-2 Reis, mas com lente sacerdotal: foco quase exclusivo em Judá, no Templo, e nos reis que buscaram ou abandonaram o SENHOR."},"summary":"A história de Judá pela lente do Templo e da busca sincera de Deus. Diferente de Reis, que narra ambos os reinos com ênfase profética, Crônicas foca quase inteiramente em Judá e oferece um padrão teológico claro: reis que \"buscaram o SENHOR\" prosperaram; os que O abandonaram, caíram. O livro termina, surpreendentemente, com esperança — o decreto de Ciro abrindo o caminho de volta.","themes":[{"id":"est","order":1,"label":"Estrutura do Livro","color":"#1D9E75","nodes":[{"t":"Salomão e o Templo (1–9)","d":"Reinado de Salomão quase inteiramente focado na construção, dedicação e glória do Templo. Paralelo com 1 Reis, mas com ênfase litúrgica ainda maior."},{"t":"Os reis de Judá (10–36)","d":"Sucessão completa dos reis de Judá, do cisma até o exílio — sem o material paralelo sobre Israel (Norte) que ocupa boa parte de Reis. Atenção concentrada na linhagem davídica."},{"t":"O decreto de Ciro (36:22-23)","d":"O livro termina abruptamente com o decreto persa permitindo a reconstrução do Templo — ponte direta para Esdras, que continua a narrativa de restauração."}]},{"id":"bus","order":2,"label":"\"Buscar o SENHOR\": o Padrão Teológico Central","color":"#993C1D","nodes":[{"t":"A fórmula recorrente de Crônicas","d":"A expressão \"buscar o SENHOR\" (darash) aparece dezenas de vezes — funciona como critério teológico central: reis que buscaram a Deus prosperaram; os que O abandonaram, sofreram consequências diretas."},{"t":"Rejaboão: buscou e depois abandonou (12)","d":"\"Quando o reino de Roboão se fortaleceu... ele abandonou a lei do SENHOR\" (12:1). O padrão se repete constantemente: prosperidade tentando à autossuficiência, que leva ao abandono de Deus."},{"t":"Asa: fé na crise, mas fraqueza depois (14–16)","d":"Confia em Deus contra um exército etíope massivo (\"Não há para ti diferença em ajudar o poderoso ou o sem força\" 14:11), mas depois confia em aliança humana em vez de Deus contra Baasa."},{"t":"Princípio reformado de perseverança ativa","d":"O padrão de Crônicas ilustra que a fé genuína não é evento único, mas busca contínua e renovada — eco do chamado reformado à perseverança e vigilância espiritual ao longo de toda a vida."}]},{"id":"reis","order":3,"label":"Reis Bons e Maus: Estudo de Caráter","color":"#BA7517","nodes":[{"t":"Josafá: aliança imprudente, fé genuína (17–20)","d":"Reforma religiosa significativa, envia levitas para ensinar a Lei pelo reino. Mas se alia perigosamente com Acabe. Na crise com Moabe e Amom, ora: \"Não sabemos o que fazer, mas os nossos olhos estão postos em ti\" (20:12)."},{"t":"Joás: fidelidade sob tutela, apostasia depois (24)","d":"Restaura o Templo sob a influência do sacerdote Joiada. Após a morte de Joiada, abandona o SENHOR e ordena a morte do profeta Zacarias — ilustra como influência piedosa externa não substitui transformação interior."},{"t":"Ezequias: a maior reforma antes de Josias (29–32)","d":"Reabre e purifica o Templo no primeiro mês de seu reinado. Celebra a Páscoa mais memorável desde Salomão, convidando até remanescentes do Norte. \"Fez o que era reto aos olhos do SENHOR\" sem reserva (29:2)."},{"t":"Manassés: o pior rei que se arrepende (33)","d":"Único relato em toda a Bíblia histórica do arrependimento de um rei extremamente ímpio sendo registrado com detalhe — preso pelos assírios, se humilha, ora, e Deus o restaura. Graça mesmo para o pior pecador."}]},{"id":"tem2","order":4,"label":"O Templo como Centro Teológico","color":"#A32D2D","nodes":[{"t":"Proporção desigual dedicada ao Templo","d":"Nove dos primeiros nove capítulos de 2 Crônicas tratam de Salomão, com foco quase exclusivo no Templo — desproporção que revela a prioridade teológica do autor: o lugar da presença de Deus é central."},{"t":"A oração de dedicação ampliada (6–7)","d":"Crônicas preserva e até expande a oração de Salomão, incluindo a resposta direta de Deus: \"Se o meu povo, que se chama pelo meu nome, se humilhar... eu ouvirei dos céus\" (7:14) — versículo central da teologia de avivamento."},{"t":"Reformas sempre centradas na purificação do Templo","d":"Cada avivamento registrado em Crônicas (Asa, Joás, Ezequias, Josias) começa pela purificação ou restauração do Templo — sinal de que adoração correta é o termômetro da saúde espiritual da nação."},{"t":"Profanação do Templo como ápice da apostasia","d":"A pior acusação contra os reis ímpios é a profanação do Templo — ídolos instalados no próprio santuário (Manassés, Acaz). A glória de Deus habitando entre Seu povo é o bem supremo que pode ser perdido."}]},{"id":"7-14","order":5,"label":"2 Crônicas 7:14: O Versículo-Chave","color":"#185FA5","nodes":[{"t":"O texto completo em contexto","d":"\"Se o meu povo, que se chama pelo meu nome, se humilhar, orar, buscar a minha face e se converter dos seus maus caminhos, eu ouvirei dos céus, perdoarei os seus pecados e sararei a sua terra\" (NAA 7:14)."},{"t":"Quatro condições, uma promessa","d":"Humilhar-se, orar, buscar a face de Deus, converter-se dos maus caminhos — não é fórmula mágica, mas descrição do arrependimento genuíno que sempre encontra a misericórdia de Deus disponível."},{"t":"Dirigido a Israel, princípio aplicável amplamente","d":"O contexto imediato é o pacto nacional com Israel — mas o princípio teológico de que Deus responde à humildade e ao arrependimento genuíno ecoa por toda a Escritura como caráter constante de Deus."},{"t":"Cuidado hermenêutico reformado","d":"Não deve ser aplicado de forma descontextualizada como promessa de prosperidade nacional automática para qualquer nação — o contexto é especificamente o povo do pacto, Israel, sob a aliança mosaica."}]},{"id":"tipos","order":6,"label
